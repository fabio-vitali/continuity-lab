      the exact candidate identity below. No alternate, reconstructed, or
      partially copied candidate is admissible.
    required_candidate_identity:
      pack: nestfolio.level-1@1.0.0
      procedure: nestfolio.backlog-next@1.0.0
      claude_code_entry_point: /backlog-next
      behavior_authority: .claude/skills/backlog-next/**
