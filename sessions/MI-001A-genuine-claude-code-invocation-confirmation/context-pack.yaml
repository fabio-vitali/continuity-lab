      - CONTINUITY-NEXT-STEPS.md
    rule: >
      Append execution closure to this contract without rewriting its original
      authorization terms. Replace the unused handoff placeholder with the
      evidence-linked final handoff.
  nestfolio:
    temporary_or_restored:
      - continuity/level-1/activation.json
    create:
      - continuity/evidence/mi-001a/**
    rule: >
      No implementation, Skill, Pack, Procedure, binding, adapter, service,
      test, backlog, check, journal, or runtime content may change. Activation
      must be restored to its delivered active state before closure. Evidence
      files must contain only MI-001A command/provenance/result records and must
      not become Work, Run, Assurance, or completion authority.
  everything_else: prohibited

required_outputs:
  continuity_lab:
    - completed MI-001A context pack with appended result
    - preserved executable prompt
    - completed evidence-linked session handoff
    - canonical MI-001A implementation-validation report
    - updated Program State
    - updated Artifact Index
    - updated next-step instructions
  nestfolio:
    - genuine active-boundary invocation evidence
    - genuine direct-current invocation evidence after disable
    - exact command and Claude Code output captures
    - repository, executor, timestamp, manifest, hash, and provenance records
    - restored active Level 1 state
  return:
    - complete updated ZIP archives for every modified repository
    - exact changed-file manifests
    - validation commands and results
    - unconditional PASS or FAIL
    - exactly one selected next iteration

next_iteration_rule:
  on_pass: >
    Record that MI-001 plus MI-001A jointly satisfy the Level 1 evidence
    obligation. Select exactly one next iteration. MI-002 may be selected only
    as selected-contract-required when the accepted evidence justifies it; it is
    not pre-authorized by this contract.
  on_fail: >
    Select exactly one narrowly corrective MI-001 follow-up or architecture
    review. Do not select MI-002.

blocked_until_completion:
  - MI-002 through MI-007
  - all broader implementation and migration
  - Console, hosted services, universal integrations, and commercial work
  - broad or unrelated Nestfolio changes

