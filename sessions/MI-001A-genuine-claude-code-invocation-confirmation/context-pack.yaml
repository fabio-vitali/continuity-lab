  continuity_lab:
    contract_authoring_baseline_revision: 43491958e67bb07b9f4aad776f83375b3fda8a55
    required_execution_revision: >
      The exact clean user-reviewed commit containing the MI-001 FAIL closure and
      these MI-001A contract files. Record the full Git revision, branch, remote,
      worktree status, and archive provenance before execution. Do not execute
      from this uncommitted generated ZIP as though it were already reviewed.
