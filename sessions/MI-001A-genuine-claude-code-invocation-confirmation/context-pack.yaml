  authored_on: 2026-07-14
  authority:
    - docs/90-state/program-state.md
    - docs/60-migration/migration-plan.md
    - decisions/DR-0023-cumulative-strangler-migration-by-guarantee-level.md
    - docs/70-implementation/mi-001-procedure-first-adoption.md
    - sessions/MI-001-procedure-first-adoption/context-pack.yaml
    - sessions/MI-001-procedure-first-adoption/session-handoff.md
  result: pending
  effective_authorization_rule: >
    Contract authoring does not execute MI-001A and does not itself prove review
    or commit. MI-001A may execute only from a clean committed continuity-lab
    revision containing these exact contract files after user review. The
    executor must record that revision before inspecting Nestfolio.
  canonical_memory_rule: >
    continuity-lab is the only canonical product and program memory. Nestfolio
    is permitted during MI-001A execution only as the exact retained MI-001
    implementation candidate and bounded evidence target defined below.
  contradiction_rule: >
    If any authorization fact, repository binding, candidate identity, asset
    digest, or authority statement conflicts with another canonical artifact,
    stop without modification, report the contradiction, and identify the
    owning artifacts.

iteration:
  id: MI-001A
  name: Genuine Claude Code Invocation Confirmation
  type: corrective-executor-validation
  design_level: L7
  product_experience_level: 1
  status: authorized-not-started
  completion_gate: unconditional-mi-001a-decision
  sole_purpose: >
    Close only the genuine Claude Code executor evidence missing from MI-001 C1
    and C3 without redesigning, reimplementing, or expanding the retained Level
    1 slice.

objective:
  primary_question: >
    Can a real installed and authenticated Claude Code executor invoke the exact
    retained nestfolio.backlog-next Level 1 boundary and, after Level 1 is
    disabled, invoke the existing /backlog-next Skill directly while preserving
    the implementation candidate, current repository content, and all truthful
    Level 1 authority boundaries?
  missing_obligations:
    C1: genuine Level 1 Claude Code invocation with normal visible Skill result
    C3: genuine direct current Skill invocation after Level 1 disable or permitted removal

canonical_authorization_preconditions:
  - MA-001 completed with unconditional PASS and G5 remains passed and valid.
  - docs/60-migration/migration-plan.md is accepted and canonical.
  - DR-0023 is validated and active.
  - MI-001 completed with unconditional FAIL.
  - the MI-001 implementation candidate is retained.
  - MI-001 failed only because genuine Claude Code executor evidence required by C1 and C3 was unavailable.
  - MI-001A is the sole authorized execution iteration with status authorized-not-started.
  - MI-001A has not executed and its result is pending.
  - MI-002 through MI-007 and all broader work remain blocked.

