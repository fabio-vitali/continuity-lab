prohibited_actions:
  - execute MI-002-R1 during contract authoring, review, or publication
  - modify Nestfolio before a separate explicit execution instruction
  - modify production Level 2 implementation, package routes, Pack declarations, Procedure declarations, locks, activation, or history
  - modify Level 1 assets, tests, activation, identity, or evidence
  - change dependencies or create package-lock.json
  - change the meaning, breadth, or expected outcome of C7 or any other MI-002 test
  - regenerate or rewrite unaffected MI-002 evidence
  - create new Pack, Work, Scope, Context, Run, Assurance, Decision, Learning, registry, remote source, or Level 3-6 state
  - execute a selected backlog item or invoke any Skill
  - author, authorize, select anew, or execute MI-003
  - inspect or modify Nestfolio paths outside the stated read and write boundary
  - commit, push, fetch, pull, merge, rebase, reset, checkout, restore, stash, clean, or rewrite history during correction execution

verdict:
  type: conjunctive-unconditional-single-result
  pass_rule: >
    Issue MI-002-R1 UNCONDITIONAL PASS only if the exact pre-edit discrepancy is
    reproduced, the fixture is bound and digest-verified exactly as contracted,
    all required validation passes, final Nestfolio and continuity-lab changes
    stay within exact scope, all immutable bytes remain exact, and no prohibited
    action occurs.
  fail_rule: >
    Any missing, different, ambiguous, skipped, drifted, out-of-scope, or failed
    required condition after valid execution start is MI-002-R1 UNCONDITIONAL
    FAIL. Restore exact published Nestfolio bytes before closure. No qualified
    PASS or silent evidence repair is permitted.

next_iteration_rule:
  on_pass: >
    Record MI-002 as publication-corrected and fully validated at the new exact
    published candidate bindings. MI-003 may return only to
    selected-contract-required; this selection is not authorization, and R1 may
    not author or authorize MI-003.
  on_fail: >
    Keep MI-003 blocked and select only another bounded MI-002 correction or an
    architecture review. Do not broaden implementation scope.

completion_criteria:
  - finalized reviewed authorized-not-started MI-002-R1 contract
  - no correction execution and no Nestfolio modification
  - exact contract-authoring changed-file manifest
  - publication handoff that requires a new control session
