    required_state: clean and exactly aligned with local origin/main and remote main
    mutation: prohibited
  continuity_lab:
    required_branch: main
    contract_authoring_start_revision: eb49bf54acb97ef2aca32afafaec25985820f41b
    execution_authorization_revision: exact-final-committed-and-pushed-contract-revision
    required_state: clean and exactly aligned with local origin/main and remote main
  nestfolio:
    required_branch: main
    published_mi002_revision: cc4e772f0a74886caebd07cff9b5d69d8f12ab48
    exact_parent_revision: 8f923240b6be1e0373b25b090f6be76139e4b256
    required_state: clean and exactly aligned with local origin/main and remote main
    parent_rule: >
      The published MI-002 revision must have the exact single parent above.
      Any history, tree, branch, cleanliness, upstream, or remote mismatch
      blocks execution before repository content is read.
  unresolved_binding_blocks_execution: true

established_discrepancy:
  original_execution_head: 8f923240b6be1e0373b25b090f6be76139e4b256
  original_condition: uncommitted MI-002 changes above execution HEAD
  fixture_expression: git show HEAD:package.json
  original_selected_bytes:
