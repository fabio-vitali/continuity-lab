    path: package.json
    bytes: 6945
    sha256: 07b935ab66c83752ebffdeea942a57abac598b18c568b39c027534c6edd2357c
    role: active Level 2 package route
  published_failure:
    suite: node --test tests/continuity-level-2.test.mjs
