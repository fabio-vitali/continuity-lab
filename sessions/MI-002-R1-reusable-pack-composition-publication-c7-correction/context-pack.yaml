iteration:
  id: MI-002-R1
  name: Reusable Pack Composition Publication-Dependent C7 Correction
  type: bounded-validation-fixture-and-evidence-correction
  status: authorized-not-started
  correction_only: true

objective:
  primary_question: >
    Can the published MI-002 C7 rollback/reapply test be made independent of
    execution HEAD by binding its isolated recovery fixture to the exact
    immutable Level 1 predecessor bytes, restoring 23/23 validation after
    publication without changing any Level 2 production implementation or any
    retained Level 1 or Pack identity?
  completion_boundary: >
    Correct one publication-dependent test fixture, rerun bounded MI-002
    validation, regenerate only directly affected MI-002 evidence, and correct
    canonical publication bindings and program state.

canonical_read_order:
  - docs/90-state/program-state.md
  - sessions/MI-002-reusable-pack-composition/context-pack.yaml
  - docs/70-implementation/mi-002-reusable-pack-composition.md
  - sessions/MI-002-reusable-pack-composition/session-handoff.md
  - sessions/MI-002-reusable-pack-composition/changed-files.txt
  - Nestfolio continuity/evidence/mi-002/commands/04-final-changed-files.json
  - Nestfolio continuity/evidence/mi-002/01-composition-and-preservation.json
  - Nestfolio continuity/evidence/mi-002/02-success-scenarios.json
  - Nestfolio continuity/evidence/mi-002/04-test-attempts.json
  - Nestfolio continuity/evidence/mi-002/05-criterion-matrix-and-verdict.json
  - Nestfolio continuity/evidence/mi-002/commands/01-final-level2-tests.json
  - Nestfolio tests/continuity-level-2.test.mjs C7 tests

