immutable_recovery_binding:
  source_revision: 8f923240b6be1e0373b25b090f6be76139e4b256
  package_json:
    git_object_expression: 8f923240b6be1e0373b25b090f6be76139e4b256:package.json
    bytes: 6467
    sha256: b69da6f561a3ca51b80511efc7cc615412e6e98ba16339f1944218b96e059677
  level_1_activation:
    git_object_expression: 8f923240b6be1e0373b25b090f6be76139e4b256:continuity/level-1/activation.json
    bytes: 196
    sha256: d8d011c6d672cda725f039ddfffb26b9157bb95462538423ac473bb3b37a0650
  aggregate_lock_digest: 376c1d5aff39a1477af1b49362f681d246b721b30c1e73b4f6ede247b0c9ffe4
  rule: >
    The isolated test must read both recovery files from the exact immutable
    source revision, never from HEAD, a relative revision, the working tree, or
    an inferred parent. Before either byte sequence is written to the temporary
    recovery fixture, the test must independently require its exact SHA-256 and
    byte size above. Missing object or identity mismatch fails closed.

correction_design:
  pre_edit_reproduction:
    - require the exact published Nestfolio binding and clean tree
    - run the Level 2 suite once before editing
    - require exactly 22 pass and 1 fail
    - require the sole failure and diagnostic recorded above
    - stop on any additional or different failure
  only_test_change: >
    In tests/continuity-level-2.test.mjs, replace both recovery reads that use
    HEAD with the immutable source revision and add exact digest and byte-size
    assertions before constructing the recovery fixture. Do not change test
    intent, rollback expectations, production behavior, or any other scenario.
  no_production_fix: >
    Do not edit continuity/level-2/**, package.json, CLAUDE.md, either Pack or
    Procedure, activation or lock material, dependencies, or Level 1 content.
  failure_recovery: >
    Before mutation, keep a verified external copy of every permitted modified
    Nestfolio path. If the correction cannot satisfy the contract, restore the
    exact published Nestfolio bytes, retain diagnostics outside both canonical
    repositories, and close MI-002-R1 with UNCONDITIONAL FAIL in continuity-lab.

required_validation:
  - exact three-repository Git bindings before content read and again at closure
  - exact parent relation from published MI-002 revision to predecessor revision
  - exact pre-edit 22/23 reproduction and sole typed diagnostic
  - immutable predecessor Git objects exist and match both locked identities
  - node --test tests/continuity-level-2.test.mjs returns 23/23
  - node --test tests/continuity-level-1.test.mjs returns 14/14
  - node --test .claude/skills/backlog-next/test/*.test.mjs returns 68/68
  - composed Pack verification, resolution, comparison, and active guarantee inspection pass
  - all fifteen mandatory failure scenarios still pass-failed-closed
  - package.json, package-lock.json absence, CLAUDE.md, continuity/level-1/**, both Pack identities, lock material, activation, and production Level 2 bytes equal the published start
  - no Level 3-6 state, selected backlog execution, repository write by the reusable Procedure, or network request
  - temporary recovery and fixture directories deleted with absence proof

