    implementation_boundary must complete, with its recorded rebuild proofs,
    after the docs/backlog source path closes and before the first
    writable-boundary path opens. Boundary paths that the derivation names
    but that do not exist at the bound revision are recorded as
    to-be-created paths and are excluded from the read sequence instead of
    blocking it.
  rule_for_missing_named_path: >
    A missing non-boundary named path, unexpected path form, non-regular
    file, path collision, inability to establish bytewise order, or
    inability to prove any complete logical-path session blocks execution
    before mutation. Do not infer or substitute another source.

