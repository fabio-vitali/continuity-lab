    requirement: every bound Level 4 digest verifies and the digest-matched adapter view of authorized Context Pack version 1 is recorded as the sole execution input
  - id: S2
    requirement: the writable boundary derives deterministically from the bound Scope and Working Set, respects boundary_scope_rule, and rebuilds byte-identically across three derivations before mutation
  - id: S3
    requirement: the implementation satisfies every completion criterion carried by the bound Context Pack for the selected effort, each mapped to observable recorded evidence
  - id: S4
    requirement: the gap-demonstrating validation fails at the exact start revision in an isolated temporary copy and passes after implementation in the working tree
  - id: S5
    requirement: Level 4, Level 3, Level 2, retained Level 1, and backlog-next suites return 23/23, 23/23, 23/23, 14/14, and 68/68 after implementation without invoking any Skill
  - id: S6
    requirement: every changed path lies inside the recorded writable boundary or the exact evidence create set and the final manifest is exact
  - id: S7
    requirement: the backlog source, every Level 1-4 artifact, all MI evidence, package.json, dependency state, and every other pre-existing byte outside the boundary remain byte-identical
  - id: S8
    requirement: SE-001 reports Level 4 as the active guarantee level and records that Run, Assurance, completion, and Learning authority are absent, with no completion state change in any canonical artifact
  - id: S9
    requirement: return and cancel are proven source-preserving in isolated temporary copies — removing the implementation delta restores the byte-identical start revision
  - id: S10
    requirement: the evidence set is complete, deterministic, canonically serialized, and the execution delta remains uncommitted and unstaged with a recorded SHA-256 manifest

mandatory_failure_scenarios:
  - id: F1
    condition: changed digest in any bound Context Pack source, Scope, route, lock, or Level 3-4 artifact
    diagnostic: STALE_CONTEXT_DEPENDENCY
  - id: F2
    condition: required bound source missing, unreadable, or unresolvable
    diagnostic: CONTEXT_SOURCE_UNAVAILABLE
  - id: F3
    condition: attempt to execute from a draft, non-authorized, stale, rejected, or revoked Context Pack version
    diagnostic: UNAUTHORIZED_CONTEXT_DELIVERY
  - id: F4
    condition: adapter view digest does not match the authorized Context Pack
    diagnostic: CONTEXT_DELIVERY_MISMATCH
  - id: F5
    condition: writable-boundary derivation empty, ambiguous, out-of-scope, or non-deterministic
    diagnostic: SCOPE_BOUNDARY_UNRESOLVED
  - id: F6
    condition: attempted mutation of any path outside the recorded writable boundary and evidence set
    diagnostic: SCOPE_BOUNDARY_VIOLATION
  - id: F7
    condition: attempt to edit any Level 4 artifact or authorized Context Pack version in place
    diagnostic: CONTEXT_IMMUTABILITY_VIOLATION
  - id: F8
    condition: attempt to mutate the backlog source or any Level 3 artifact, status, priority, dependency, or rank
    diagnostic: SOURCE_MUTATION_PROHIBITED
  - id: F9
    condition: dependency installation, removal, upgrade, or package-lock.json creation required or attempted
    diagnostic: DEPENDENCY_OPERATION_PROHIBITED
  - id: F10
    condition: attempt to invoke Claude Code, any Skill, slash command, /backlog-next, continuity:invoke, or any nested executor
    diagnostic: EXECUTOR_DELEGATION_PROHIBITED
  - id: F11
    condition: claim or creation of Session, Run, Checkpoint, Handoff, effect, Assurance, completion, Decision, Learning, or Level 5-6 authority
    diagnostic: FORBIDDEN_HIGHER_LEVEL_CLAIM
  - id: F12
    condition: final manifest contains a path outside the recorded writable boundary and exact evidence set
    diagnostic: MANIFEST_SCOPE_MISMATCH

preservation_and_rollback:
  before_write: >
    Record exact Git metadata, the complete tracked-tree identity, all
    critical Level 1-4 and MI evidence digests, the frozen writable
    boundary with per-path pre-change digests, absence of every evidence
    create path, and a verified external recovery ledger outside all
    repositories. Do not copy backlog content or secrets into the recovery
    ledger.
  success_rollback_proof: >
    In isolated temporary copies only, prove that removing the SE-001
    implementation delta and evidence restores the byte-identical start
    revision, that the Level 3 and Level 4 representations remain valid and
    unchanged throughout, and that no false guarantee or completion state
    survives. Do not mutate the real Level 3-4 artifacts or backlog source.
  execution_failure: >
    If any actual execution condition fails after mutation, restore every
    writable-boundary path to its recorded pre-change bytes, remove only the
    newly created SE-001 evidence paths, verify Nestfolio is byte-identical
    and clean at the exact published start revision, retain diagnostics
    outside all repositories, and close SE-001 as UNCONDITIONAL FAIL in
    continuity-lab. Never retain a partial implementation after a failed
    execution.

permitted_continuity_lab_execution_closure:
  modify:
    - README.md
    - CONTINUITY-NEXT-STEPS.md
    - docs/70-implementation/README.md
    - docs/90-state/artifact-index.md
    - docs/90-state/program-state.md
    - sessions/SE-001-selected-effort-execution-dashboard-bff-awaiting-confirmation-activity-gap/context-pack.yaml
    - sessions/SE-001-selected-effort-execution-dashboard-bff-awaiting-confirmation-activity-gap/session-handoff.md
  create:
    - docs/70-implementation/se-001-selected-effort-execution-dashboard-bff-awaiting-confirmation-activity-gap.md
    - sessions/SE-001-selected-effort-execution-dashboard-bff-awaiting-confirmation-activity-gap/execution-changed-files.txt
  rule: >
    A later separately authorized execution closure may record only the one
    SE-001 result and exact execution facts. All MI-002 through MI-004
    artifacts and the SE-001 prompt and contract-authoring manifest remain
    immutable.

explicitly_immutable:
  continuity_workspace: [all content and Git state]
  continuity_lab_during_execution:
    - all MI-002, MI-002-R1, MI-002-R2, MI-003, MI-003-R1, MI-003-R2, and MI-004 artifacts and reports
    - SE-001 prompt and contract-authoring manifest
    - every path outside the exact SE-001 execution-closure scope
    - all historical session artifacts and implementation reports
  nestfolio:
    - every pre-existing tracked path outside the recorded writable boundary
    - package.json
    - package-lock.json absence
    - CLAUDE.md
    - docs/backlog/**
    - .claude/skills/**
    - continuity/level-1/**
    - continuity/level-2/**
    - continuity/level-3/**
    - continuity/level-4/**
    - continuity/evidence/mi-001*/**
    - continuity/evidence/mi-002/**
    - continuity/evidence/mi-003/**
    - continuity/evidence/mi-004/**
    - tests/continuity-level-1.test.mjs
    - tests/continuity-level-2.test.mjs
    - tests/continuity-level-3.test.mjs
    - tests/continuity-level-4.test.mjs

prohibited_actions:
  - execute SE-001 during contract authoring, review, finalization, authorization, or publication
  - inspect or modify Nestfolio content before a separate explicit SE-001 execution instruction and valid gates
  - commit, push, fetch, pull, merge, rebase, reset, checkout, restore, stash, clean, or rewrite history during SE-001 execution
  - modify, repair, relabel, qualify, supersede, re-grade, or reinterpret any MI-002, MI-003, MI-003-R1, MI-003-R2, or MI-004 artifact or result
  - form, refresh, re-validate, re-authorize, version, or edit any Context Pack or Level 4 artifact
  - execute from any non-authorized, stale, rejected, or revoked Context Pack version
  - mutate the backlog source, any Level 3 artifact, status, priority, dependency, rank, or external object
  - mutate any path outside the recorded writable boundary and exact evidence create set
  - invoke Claude Code, any Skill, /backlog-next, continuity:invoke, or another executor procedure
  - spawn a nested Claude Code instance, sub-agent, background task, workflow, Skill, or slash command as a sub-executor
  - install, remove, or upgrade dependencies, modify package.json, or create package-lock.json
  - create automatic bidirectional synchronization or external writes
  - claim completion, record completion state, or create a Session, Run, Checkpoint, Handoff, effect record, Assurance Plan, Evidence authority, Guard, Waiver, Decision, Observation, Lesson, Change Proposal, Level 5-6 state, registry, remote source, universal ranking, Epic orchestration, intake, or themes migration
  - promote Nestfolio behavior into reusable Pack or Framework Core authority
  - inspect or modify paths outside the exact read and write boundaries
  - treat incomplete, truncated, summarized, omitted, elided, or clipped tool output as a complete chunk or path
  - interleave, batch, parallelize, reorder, skip, or substitute canonical path reads; recovery re-reads must remain forward-contiguous within the same open logical-path session
  - execute MI-005 through MI-007 or any broader or unrelated implementation, or scope MI-005 or later slices

verdict:
  type: conjunctive-unconditional-single-result
  criteria:
    - C1 exact repository bindings, segmented canonical complete-read proof, and digest-matched authorized-context delivery authority
    - C2 deterministic frozen writable boundary with recorded three-derivation rebuild and complete pre-mutation preservation ledger
    - C3 implementation satisfies every bound completion criterion with recorded fail-before/pass-after gap proof
    - C4 every mandatory failure blocks with the exact typed diagnostic
    - C5 backlog source, Level 1-4 artifacts, MI evidence, dependencies, and every pre-existing byte outside the recorded boundary remain exact
    - C6 authority, route, active Level 4 guarantee, and absent Level 5-6 state are observable, truthful, and unambiguous
    - C7 deterministic rebuilds, source-preserving return and cancel proofs, cleanup, exact final manifest, and the uncommitted unstaged delta with recorded SHA-256 manifest pass
  pass_rule: >
    Issue SE-001 UNCONDITIONAL PASS only if C1-C7, S1-S10, F1-F12, every
    precondition, every path and segment proof, validation, preservation,
    rollback, cleanup, and exact-manifest requirement passes conjunctively
    and no prohibited action occurs.
  fail_rule: >
    Any missing, skipped, ambiguous, stale, reordered, interleaved,
    truncated, clipped, mismatched, out-of-scope, non-deterministic,
    partial, or failed condition after valid execution start is SE-001
    UNCONDITIONAL FAIL. No qualified PASS, partial PASS, inferred
    authorization, silent repair, evidence-only override, historical
    reinterpretation, or history rewrite is permitted.

next_iteration_rule:
  on_pass: >
    Preserve MI-002-R2, MI-003, MI-003-R1, and MI-003-R2 as four separate
    immutable results and MI-004 as a separately recorded result. Record
    SE-001 separately. The implementation delta becomes publishable only
    through the separately authorized publication with the exact subject
    "Publish SE-001 selected effort implementation and evidence".
    Completion, Assurance, Run, and Learning authority remain absent;
    MI-005 remains unauthorized until separately contracted, reviewed,
    published, and explicitly executed.
  on_fail: >
    Preserve all separate results and keep MI-005 blocked. Select only a
    newly bounded correction or explicit architecture review supported by
    the failure evidence. Do not broaden scope.

completion_criteria:
  - finalized reviewed internally consistent SE-001 contract publication candidate
  - contract authorization recorded without publication or execution
  - the published Level 3 and Level 4 artifacts, the authorized Context Pack version 1, and the active route are bound as read-only inputs by exact digest
  - implementation occurs only in a separately authorized execution session under this contract
  - MI-002-R2 PASS, MI-003 FAIL, MI-003-R1 FAIL, and MI-003-R2 PASS remain four separate immutable results and MI-004 PASS remains separately recorded
  - the amended executor_identity clause and segmented canonical complete-read protocol carry forward, including the harness-injected CLAUDE.md session-environment clause
  - no Nestfolio content inspection, mutation, Skill, Claude Code invocation, dependency operation, external write, commit, or push occurs in the authoring session
  - exact nine-path uncommitted and unstaged continuity-lab contract-authoring manifest
  - publication handoff for a fresh control session
