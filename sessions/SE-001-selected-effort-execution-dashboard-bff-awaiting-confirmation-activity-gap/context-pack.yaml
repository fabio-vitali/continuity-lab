canonical_complete_read_protocol:
  protocol_basis: >
    SE-001 carries forward the MI-003-R2 segmented canonical complete-read
    protocol as completed by MI-004, unchanged in substance and adapted only
    in its path lists. Complete consumption of one logical path must be
    proved before another path opens; tool-output truncation never counts as
    completion.
  metadata_phase: >
    Before any repository content read, complete every required Git metadata
    and contract-identity gate separately for all three repositories.
    Metadata inspection must not open tracked or untracked file content. Any
    failed or contradictory gate stops before content read and before
    execution starts.
  logical_path_session: >
    A logical-path read session begins when one exact canonical file is
    opened for plan or payload access and ends only after its completion
    proof passes. During that session every content-bearing, planning,
    counting, sizing, digesting, or verification operation may address only
    that same path. No other repository path may be listed, opened,
    previewed, diffed, hashed, counted, or batched before the session
    closes. Directory expansion may occur only at its listed order position
    and yields individual file paths in bytewise order; each file then
    receives its own logical-path session.
  program_state_first_rule: >
    After all metadata gates pass, the first logical repository path opened
    must be continuity-lab docs/90-state/program-state.md. It must be the
    sole logical repository path addressed until every chunk and its
    whole-path completion proof pass. The first content operation may
    establish the plan for Program State only; it may not open the SE-001
    contract or any other path in the same call or in parallel.
  canonical_source: >
    Read the exact bytes of each named path from the bound clean revision.
    Record the repository role, revision, path, Git blob object identity,
    total byte count, total LF count, total logical-line count, whole-path
    SHA-256, and whether the final byte is LF. A logical line is an
    LF-terminated byte record or the non-empty final byte record after the
    last LF. Empty files have zero logical lines. Require well-formed UTF-8;
    invalid encoding is CANONICAL_PATH_ENCODING_INVALID and fails C1 before
    another path opens.
  read_operation:
    algorithm_id: claude-code-contiguous-read-coverage-v1
    rule: >
      Read the exact bytes of the path from the clean working tree at the
      bound revision using the session executor's file-read tool, in
      contiguous, ordered, non-overlapping, forward-only line-range chunks.
      Read the whole path in one call whenever it fits the tool's response
      limits. Never read any other path between the chunks of an open
      logical-path session.
  output_completeness_gate: >
    A chunk is consumed only when the tool response presents the requested
    line range directly and completely, with no truncation, clipping,
    omission, elision, summarization, or persisted-to-file substitution
    reported or observable. Any such condition is
    CANONICAL_SEGMENT_INCOMPLETE. It never counts as completion and the
    executor must not advance past it.
  incomplete_chunk_recovery: >
    After CANONICAL_SEGMENT_INCOMPLETE, the executor may re-read starting at
    the exact first unconsumed line with a smaller line limit, within the
    same open logical-path session. Recovery must remain forward-contiguous
    and non-interleaved and never skips, reorders, or substitutes content.
    Unrecoverable truncation fails C1 before another path opens.
  whole_path_completion_proof: >
    Close a logical-path session only after the consumed chunks form one
    contiguous line coverage from the first line to the recorded final
    logical line with no gap or overlap; the covered line count equals the
    recorded logical-line count; and a final same-path verification proves
    the working-tree bytes still match the recorded byte count, whole-path
    SHA-256, and bound Git blob identity. No narrative assertion can replace
    these machine-verifiable facts.
  serial_sequence_rule: >
    After Program State closes, open every remaining logical path one at a
    time, completely, in the exact order below. Do not parallelize or
    interleave path sessions. Any earlier, missing, partial, reordered,
    parallel, batched, extra, or unproved read is SE-001 UNCONDITIONAL FAIL
    and requires stop before Nestfolio mutation.
  required_continuity_lab_order:
    - docs/90-state/program-state.md
    - sessions/SE-001-selected-effort-execution-dashboard-bff-awaiting-confirmation-activity-gap/context-pack.yaml
    - sessions/SE-001-selected-effort-execution-dashboard-bff-awaiting-confirmation-activity-gap/prompt.md
    - docs/70-implementation/mi-004-authorized-context-introduction.md
    - sessions/MI-004-authorized-context-introduction/session-handoff.md
