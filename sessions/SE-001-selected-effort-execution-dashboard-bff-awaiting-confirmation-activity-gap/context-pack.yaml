    - .claude/skills/backlog-next/SKILL.md
    - continuity/level-1/** in bytewise path order, one logical file path at a time
    - continuity/level-2/** in bytewise path order, one logical file path at a time
    - continuity/level-3/** in bytewise path order, one logical file path at a time
    - continuity/level-4/** in bytewise path order, one logical file path at a time
    - tests/continuity-level-4.test.mjs
    - continuity/evidence/mi-004/00-repository-bindings.json
    - docs/backlog/dashboard-bff-awaiting-confirmation-activity-gap.md
    - every writable-boundary path from the recorded boundary derivation, in bytewise path order, one logical file path at a time
  boundary_paths_read_rule: >
