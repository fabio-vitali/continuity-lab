verdict:
  type: conjunctive-unconditional-single-result
  criteria:
    - C1 exact repository bindings, canonical read order, and explicit human selection authority
    - C2 deterministic complete candidate derivation with exact inclusion and exclusion rationale
    - C3 internally exact WorkSelection, Work, Working Set, Scope, criteria, and Work Brief
    - C4 every mandatory failure blocks with the exact typed diagnostic
    - C5 current backlog, all pre-existing bytes, MI-002, Level 2, Level 1, dependencies, and direct paths remain exact
    - C6 planning, local execution, route, Git, Procedure, and absent-guarantee authority is observable and unambiguous
    - C7 deterministic rebuild, source-preserving return and cancel, cleanup, and exact final manifest pass with no Level 4-6 authority
  pass_rule: >
    Issue MI-003 UNCONDITIONAL PASS only if C1-C7, S1-S10, F1-F12, every
    precondition, all required validation, preservation, rollback, cleanup, and
    exact-manifest requirements pass conjunctively and no prohibited action
    occurs.
  fail_rule: >
    Any missing, skipped, ambiguous, stale, reordered, mismatched, out-of-scope,
    non-deterministic, partially successful, or failed required condition after
    valid execution start is MI-003 UNCONDITIONAL FAIL. Restore exact Nestfolio
    start state after any real mutation. No qualified PASS, partial PASS,
    inferred selection, silent repair, evidence-only override, or history
    rewrite is permitted.

next_iteration_rule:
  on_pass: >
    Preserve the selected Level 3 representation as a bounded candidate and
    select MI-004 only as contract-required. MI-004 remains unauthorized until
    a separate contract is authored, reviewed, finalized, published, and later
    explicitly authorized for execution.
  on_fail: >
    Keep MI-004 blocked. Select only a bounded MI-003 correction or an explicit
    architecture review supported by the failure evidence. Do not broaden scope.

