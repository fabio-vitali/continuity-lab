    Can one coherent current Nestfolio backlog effort be selected through an
    explicit human decision and represented as exact local Work, WorkSelection,
    Working Set, Scope, criteria, route, and Work Brief artifacts, while the
    current backlog remains planning authority, target state owns only the local
    execution representation, candidate projections rebuild deterministically,
    and rollback is source-preserving and reversible?
  completion_boundary: >
    Implement and validate only the Level 3 selection and local-authority
    boundary for one explicitly selected effort. Do not perform the selected
    effort, mutate its backlog source, form or authorize a Context Pack, create
    durable Run or Assurance authority, or begin MI-004 or broader work.

