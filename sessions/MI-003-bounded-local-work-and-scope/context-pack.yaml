    selected Work artifact before a human selection is received.
  human_selection_rule: >
    The user must explicitly identify exactly one candidate by source path,
    stable source-local identity, Nestfolio source revision, and source SHA-256.
    The selection may be supplied in the initial execution instruction or in a
    later message after candidate review. The executor must verify an exact
    match to the candidate projection. Absence, multiplicity, mismatch, or an
    inferred substitute blocks selection. Human selection authorizes only the
    Level 3 representation and route; it never authorizes implementation of the
    selected backlog effort.
  target_authority_after_selection: >
    The current backlog remains authority for planning content and status.
    Target Work owns only the immutable local execution representation. No
    automatic source write-back or bidirectional synchronization exists.

