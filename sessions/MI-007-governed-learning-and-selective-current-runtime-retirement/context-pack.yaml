    Exactly five Observation artifacts are created at the fixed ids below
    via the pinned store API (expectedRevision 0, revision 1, status
    recorded, with source provenance by exact path/digest and evidence
    references by id/digest). The four factual Observations are then
    advanced exactly once each (expectedRevision 1, revision 2) to record
    the owner-confirmed review outcome with reviewer, verbatim quoted
    confirmation, machine-captured UTC, and rationale. The historical import
    (observation 05) is never advanced, reviewed into a target Lesson, or
    promoted. No other Observation is created and no pre-existing
    observation artifact (the two VS-001 records) is touched.
  fixed_artifacts:
    - id: observation-mi007-01-deterministic-evidence-sourcing
      statement: >
        The MI-006 contract bound the dashboard-bff integration suite as
        deterministic Evidence for Level 3 criteria 2 and 3, but that suite
        targets real deployed AWS and cannot execute inside a bounded local
        session; MI-006 recorded this as the owner-authorized secondary
        finding (machine-captured UTC 2026-07-18T11:38:34.000Z) and
        MI-006-R1 corrected the deterministic Evidence to the dashboard-bff
        unit suite plus a byte-identity non-regression proof of the
        integration-suite files.
      sources: MI-006 execution closure at 893f7e04…; run-mi006-r1 Evidence mi006r1-c3-non-regression a3e3ab81… and mi006r1-c2-cdc-sourcing 05d23141…
      contracted_review_outcome: accepted (proceeds to lesson-mi007-01 and the separate Change Proposal)
    - id: observation-mi007-02-dead-handler-guard-duplicate
      statement: >
        The condition that the removed dead USER_CONFIRMATION_REQUESTED
        handler must not be reintroduced was surfaced again by
        run-mi006-r1's criterion-3 Evidence; the condition is already
        governed by the classified target Guard
        nestfolio-dashboard-bff-no-dead-user-confirmation-requested-handler
        (definition 74008f12…), referenced by the completed Work Item and
        evaluated true.
      sources: run-mi006-r1 Evidence mi006r1-c3-non-regression a3e3ab81…; Guard definition 74008f12…
      contracted_review_outcome: duplicate (already governed by the classified Guard; no new Lesson, Proposal, or Guard is created from it)
    - id: observation-mi007-03-run-mi005-staleness
      statement: >
        After the effort's Work Item advanced past revision 2, run-mi005
        became permanently non-resumable by staleness (its final Checkpoint
        pins work_item revision 2; the engine's freshness validation returns
        STALE_RUN); MI-006-R1 recorded this as an accepted, documented
        consequence with no byte change to any run-mi005 record.
      sources: MI-006-R1 report accepted-documented-consequence section; MI-005 byte-identity evidence
      contracted_review_outcome: deferred (no action in this bound; any staleness-recovery capability is a separately contracted future slice; not a defect)
    - id: observation-mi007-04-occupied-work-item-conflict
      statement: >
        MI-006 closed UNCONDITIONAL FAIL with ENGINE_POLICY_MISMATCH because
        the pinned engine keys exactly one Work Item per work_id and the
        effort's id was occupied by an immutable in_progress MI-005 record;
        selectWork returned REVISION_CONFLICT (expected_revision 0,
        actual_revision 2) and no engine path existed without engine
        modification or an immutability violation.
      sources: MI-006 execution closure at 893f7e04…; MI-006-R1 contract immutability_exception
      contracted_review_outcome: rejected (the derived candidate lesson-mi007-02 is unsafe; see lessons)
    - id: observation-mi007-05-historical-import-f30
      statement: >
        Historical import from the current lesson dossier
        .claude/skills/backlog-next/LESSONS.md (SHA-256 eea79ec7…), entry
        "F-30 — always stamp `closed: <today>` at ship": the explicit
        closed: stamp is the authoritative ship date and the only one immune
        to across-midnight drift. For target-routed work this behavior is
        already provided by the pinned engine's truthful completion
        write-back, proven by run-mi006-r1 (backlog b656733… advanced to
        ea565c07… with status shipped and closed 2026-07-18).
      sources: .claude/skills/backlog-next/LESSONS.md eea79ec7… (exact heading quoted); run-mi006-r1 completion evidence
      contracted_review_outcome: none — status historical at revision 1 permanently; provenance-preserving import only, never promoted

lessons:
  rule: >
    Exactly two Lesson artifacts are created at the fixed ids below via the
    pinned store API. Lessons carry no rule authority; promotion fields
    always record automatic false, and the only path from lesson-mi007-01 to
    any canonical change is the separate Change Proposal below.
  fixed_artifacts:
    - id: lesson-mi007-01-deterministic-evidence-boundary
      derived_from: observation-mi007-01-deterministic-evidence-sourcing (by id/revision/digest)
      statement: >
        Before binding a validator as deterministic Evidence for a
        completion criterion, verify the validator is executable within the
        boundary of the session that must produce the Evidence; a validator
        that depends on external infrastructure may enter a bounded contract
        only as a byte-identity/non-regression subject or as separately
        produced, provenance-recorded external Evidence.
      lifecycle: created revision 1 status candidate with safety_review pending-human-review; advanced once (expectedRevision 1, revision 2) to status accepted recording the owner's verbatim confirmation with machine-captured UTC; promotion remains {status proposal-created, target_changes [change-proposal-mi007-01 by id], automatic false} — the Lesson itself never applies anything
    - id: lesson-mi007-02-automatic-rebinding-rejected
      derived_from: observation-mi007-04-occupied-work-item-conflict (by id/revision/digest)
      statement: >
        Candidate (rejected): on an occupied work-item id the engine should
        automatically rebind or advance the existing record so completion
        can proceed.
      lifecycle: created revision 1 status rejected with safety_review {status unsafe, rationale "An automatic immutability exception would let any Run mutate immutable records without owner authorization; the safe path is a contracted, owner-approved, bounded exception as MI-006-R1 performed."}; promotion {status not_promoted, target_changes [], automatic false}; never advanced

decision_and_change_proposal:
  rule: >
    Exactly one durable Decision and one Change Proposal are created at the
    fixed ids below via the pinned store API. The Decision is the target
    Durable Decision object (migration plan "introduce" row): it records the
    owner's explicit decision to accept change-proposal-mi007-01 for
    application by the target artifact owner, with the verbatim quoted
    authorization and machine-captured UTC. The Change Proposal is a
    separate artifact from the Lesson (DR-0017): created revision 1 status
    proposed; advanced (expectedRevision 1, revision 2) to status accepted
    referencing the Decision by id/revision/digest; advanced once more
    (expectedRevision 2, revision 3) to status applied referencing the
    applied file by path and digest. No other Decision or Change Proposal is
    created; neither artifact ever mutates any target artifact itself.
  fixed_artifacts:
    - id: decision-mi007-01-accept-deterministic-evidence-boundary-change
      content: decision to accept change-proposal-mi007-01 and authorize the target artifact owner to apply it through the Nestfolio binding's own lifecycle; decided_by fabio.vitali (human program owner); verbatim quoted authorization; machine-captured UTC; supporting refs to observation-mi007-01, lesson-mi007-01, and the bound Evidence digests
    - id: change-proposal-mi007-01-deterministic-evidence-boundary-rule
      content: >
        target_artifact
        continuity/bindings/nestfolio/decisions/mi007-deterministic-evidence-boundary-rule.json
        (a NEW additive accepted-decision record in the Nestfolio project
        binding); supporting evidence observation-mi007-01 and lesson-mi007-01
        by id/revision/digest plus the bound run-mi006-r1 Evidence digests;
        expected benefit (prevents rebinding non-executable validators as
        deterministic Evidence — the defect class that cost the MI-006
        iteration); risk (none to runtime behavior: an additive,
        non-executable governance record); validation plan (the
        deterministic learning suite validates schema, provenance chain,
        ordering, and digest bindings; the derived index rebuild lists the
        new record); required authority (the target artifact owner,
        fabio.vitali); rollback (remove the added file — no other byte
        depends on it).

applied_change:
  rule: >
    Exactly ONE accepted project-level change is applied, by the target
    artifact owner's explicit authorization, as the NEW file
    continuity/bindings/nestfolio/decisions/mi007-deterministic-evidence-boundary-rule.json
    (canonical JSON): schema_version, id
    mi007-deterministic-evidence-boundary-rule, status accepted, the rule
    statement (the lesson-mi007-01 statement as a project-binding rule for
    future target-routed criterion Evidence binding), applies_to (criterion
    Evidence binding for target-routed Nestfolio work; explicitly
    non-executable — future contracts cite it, nothing enforces it
    automatically), authority fabio.vitali (human program owner), the
    verbatim application authorization with machine-captured UTC, and the
    full provenance chain (change-proposal, decision, lesson, observation,
    and source Evidence by id/revision/digest). The file is created ONLY
    after the Decision artifact and the Change Proposal's accepted revision
    exist, and the ordering is proven by the audit ledger sequence and the
    machine-captured UTCs recorded in the evidence. Application through the
    binding's own lifecycle means exactly this owner-authorized additive
    record with provenance and validation; it changes no existing byte, so
    no Pack lock, Level 1-6 artifact, or suite is touched, and rollback is
    file removal restoring the exact start tree.
  no_auto_promotion_proof: >
    The executor proves by SHA-256 comparison that .claude/skills/** and
    .claude/settings.json, continuity/packs/**, runtime/**, all
    tests/continuity-level-*.test.mjs published suites, every pre-existing
    continuity/bindings/** file (including the Guard definition 74008f12…
    and the VS-001 accepted-decision records), and every pre-existing
    continuity/artifacts/** and .continuity/** file except the two
    permitted modify paths are byte-identical to the bound revision for the
    whole execution, and that before the Decision and accepted-proposal
    records exist no target-artifact byte anywhere has changed. The one
    applied file is the sole binding addition and appears only after the
    recorded approvals.

retirement_inventory:
  rule: >
    continuity/level-6/retirement-inventory.json (canonical JSON) classifies
    exactly the six current backward-edge mechanisms below, each with: the
    mechanism, its current implementation reference, the migration-plan row
    it instantiates, the classification (retained / deferred / rejected for
    target-routed use), the no-active-dependency basis (route facts recorded
    read-only: the one target-routed effort is completed; no active target
    Run exists; the current journal serves current-routed work only), and
    the explicit statement that NOTHING is retired, disabled, or deleted in
    this bound. Exact retirement timing remains with later sustained
    dogfooding per the migration plan's open-questions register.
  classifications:
    - mechanism: ship-time mint consideration (backlog-next SKILL.md step 6.4b; run-backward.mjs consider)
      classification: retained for current-routed work; REJECTED for target-routed work — the completed effort's Level 6 completion flowed through the pinned engine with no mint consideration, and automatic check promotion for target-routed work is prohibited (proven by the no-auto-promotion proof and fixture F-TARGET-ROUTED-MINT)
    - mechanism: check minting/ratification with human floor (run-backward.mjs mint)
      classification: retained for current-routed work; for target-routed work its function is REPLACED by the governed Observation-Lesson-Change-Proposal-owner-application loop this contract proves end-to-end
    - mechanism: check keep/retire/supersede curation (run-backward.mjs curate; retire/supersede/keep decisions)
      classification: retained — human authority and history preserved; target-lifecycle adaptation DEFERRED
    - mechanism: finding-to-backlog intake (backlog-add hot-path router)
      classification: retained current; target migration DEFERRED — MI-007 references findings as Observations but does not automate backlog creation
    - mechanism: registry loading and check lifecycle YAML
      classification: retained — current YAML remains invocable as a validator; target Guard activation only by explicit classification (proven by MI-006-R1); broad migration DEFERRED
    - mechanism: deploy and affected-integration gate
      classification: retained as project-specific; migration DEFERRED — referenced as external Evidence only
  out_of_scope_confirmations: themes, intake breadth, Epic orchestration, and deploy behavior remain in the Nestfolio binding or current route per the migration-plan exclusions; no universal registry and no hosted service exist or are claimed

session_gates:
  rule: >
    Per DR-0024, before execution starts: continuity-workspace,
    continuity-lab, and Nestfolio are on main with clean working trees;
    continuity-lab HEAD is the exact published revision containing this
    contract (same-session execution uses the revision just pushed;
    later-session execution uses the revision named by the launch handoff);
    Nestfolio HEAD is 6229bb010d76723aaec0385c923b157762ee512e, the
    published MI-006-R1 Level 6 assurance revision (subject "Publish
    MI-006-R1 evidence-bound completion Level 6 assurance"). Every
    published artifact and every recorded historical result is a read-only
    input except the exact permitted mutation sets of this contract. A
    wrong branch, dirty tree, or missing contract stops the session before
    any Nestfolio mutation. No multi-way alignment gates, remote-ref
    checks, or byte-level authoring manifests apply.

executor_identity:
  session_executor: >
    The MI-007 execution session is conducted directly by Claude Code
    operating under authorization_rule. It orchestrates the store writes,
    the owner review capture, the applied change, the retirement inventory,
    the failure scenarios, evidence, and closure with its own tools,
    driving the pinned store API directly as a library.
  sub_agent_rule: >
    Per DR-0024 the orchestrating executor may use its own sub-agents and
    tools for mechanical work at its discretion. Delegating contracted work
    to the product's executor procedures — any Skill, /backlog-next,
    continuity:invoke, run-backward.mjs — remains prohibited and is a
    mandatory failure (F10). Running node for tests, the pinned store API,
    and the published continuity tooling's own checks is direct work, not
    delegation.
  owner_interaction_rule: >
    The owner review is captured live during execution: the executor
    presents each contracted outcome (the four review outcomes, the Lesson
    acceptance, the Decision, and the application authorization) to the
    human program owner in the session, records each verbatim reply with
    machine-captured UTC, and embeds the quotes in the corresponding
    artifacts and evidence. Silence, refusal, or contradiction on any item
    is REVIEW_AUTHORIZATION_WITHHELD: execution stops fail-closed, the
    rollback rule applies, and MI-007 closes UNCONDITIONAL FAIL — outcomes
    are never inferred, defaulted, or narrated into existence.

