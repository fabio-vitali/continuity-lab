  create_engine_write_set_classes: >
    The only additional permitted creates are records the pinned adapter or
    store produces itself as a side effect of the contracted operations
    (executor-session records under .continuity/executor-sessions/**, if
    any). NO run, checkpoint, handoff, session, context-pack,
    formation-trace, pack-lock, validation-plan, validation-result,
    evidence, scope, working-set, or work-item store artifact is created;
    the appearance of any such artifact is MANIFEST_SCOPE_MISMATCH.
  modify_exactly:
    - ".continuity/audit.ndjson — append-only via the pinned appendAudit: one typed record per contracted store write, review capture, application, and rebuild; the recorded pre-execution bytes must remain the exact unmodified prefix of the final file, proven by prefix digest comparison"
    - ".continuity/derived/index.json — derived non-authoritative projection, rewritten only by the pinned engine's deterministic rebuildIndex (which discovers the new decisions and change-proposals kinds); the pre-execution snapshot remains recoverable from Git history"
  scope_rule: >
    On PASS the Nestfolio diff from the exact start revision must contain
    exactly: the fixed create paths, any adapter-produced
    executor-session records, and the two permitted modified paths — with
    no staged path and no other modified, deleted, renamed, or additional
    path. Every other pre-existing tracked byte is byte-immutable for the
    whole execution. The delta remains uncommitted and unstaged at
    execution close; publication is separately authorized.
  path_absence_rule: >
    Any pre-existing fixed create path (including the decisions and
    change-proposals kind directories containing any conflicting id) is a
    collision and blocks execution; it must not be overwritten, adopted,
    repaired, or deleted.

write_set_rehearsal: >
  Before any real-tree mutation, the orchestrating executor rehearses the
  complete mechanics — every store creation and contracted advancement in
  order, the audit appends, the applied change with its ordering proof, the
  learning binding, the retirement inventory, the new learning suite
  passing, the derived index rebuild over the new kinds, and byte-exact
  rollback to the start state — in an isolated temporary copy outside all
  three repositories, driving the pinned store API directly. The rehearsal
  freezes the exact write-set (every created path and the two modified
  paths with before/after digests); the real execution must produce exactly
  the frozen write-set, and any deviation is MANIFEST_SCOPE_MISMATCH. The
  owner-review capture is NOT rehearsed with fabricated quotes: rehearsal
  artifacts carry the fixed placeholder REHEARSAL-PENDING-OWNER-CAPTURE in
  the authorization fields, and the real execution replaces them only with
  the genuinely captured owner statements. The copy is removed with absence
  proof.

required_preconditions:
  - the session gates in session_gates pass before any Nestfolio mutation
  - every engine file and .claude/settings.json verify against the recorded engine-lock digests at the bound revision (ENGINE_ASSET_MISMATCH otherwise)
  - every bound learning source verifies byte-identical to its pinned digest, and every byte_identity_guarantees record verifies at start
  - the bound Level 2 lock aggregate 73bbb7c9…, Level 3 scope db7a4527…, and Level 4 Context Pack e58c9bc1… digests verify read-only
  - run-mi006-r1 is completed and run-mi005 is closed; no active target Run and no active current-journal Run exists (route facts recorded read-only; the journal tree digest is recorded at start)
  - all fixed create paths are absent, including the decisions and change-proposals kind directories containing no conflicting id
  - the human program owner is available in-session for the live review capture (owner_interaction_rule); execution does not start otherwise
  - before mutation, without invoking any Skill: Level 6 10/10, Level 5 7/7, Level 4 23/23, Level 3 23/23, Level 2 23/23, Level 1 14/14, engine 9/9, backlog-next 68/68 (the tree is clean at the published revision, so all run in the real tree)
  - the write-set rehearsal completed in the isolated copy, its frozen write-set satisfies nestfolio_scope exactly, and the learning suite passed there
  - package-lock/pnpm-lock changes and dependency operations are not needed (pnpm-lock.yaml is byte-immutable)

bounded_success_scenarios:
  - id: S1
    requirement: session gates, engine-lock digests, every bound learning-source digest, every byte-identity record, the route facts, and the fixed-path absences verify fail-closed before any mutation, and the baseline suites are green
  - id: S2
    requirement: the five Observations are created at the fixed ids through the pinned store API with expectedRevision 0, each carrying exact source provenance by path/digest and evidence references by id/digest
  - id: S3
    requirement: the four factual Observations are advanced exactly once each to the contracted review outcomes (accepted, duplicate, deferred, rejected) with the owner's verbatim confirmations and machine-captured UTCs; the historical import remains at revision 1 status historical, never reviewed or promoted
  - id: S4
    requirement: lesson-mi007-01 is created as candidate pending-human-review and advanced to accepted on the owner's confirmation; lesson-mi007-02 is created rejected with safety_review unsafe and never advanced; both record promotion automatic false and neither mutates anything
  - id: S5
    requirement: decision-mi007-01 records the owner's durable Decision with the verbatim quoted authorization and machine-captured UTC, and change-proposal-mi007-01 advances proposed-to-accepted-to-applied with the Decision and applied-file references by id/revision/digest at the contracted revisions
  - id: S6
    requirement: the one applied change exists as the contracted additive binding record with the full provenance chain, created strictly after the Decision and accepted-proposal records (proven by audit order and machine-captured UTCs), and the learning suite validates it deterministically
  - id: S7
    requirement: the no-auto-promotion proof passes — every pre-existing Skill, Pack, engine, suite, binding, store, and lock byte is proven byte-identical, and no target-artifact byte changed before the recorded approvals; the one applied file is the sole binding addition
  - id: S8
    requirement: the retirement inventory classifies exactly the six mechanisms with the contracted classifications and no-active-dependency bases, records the out-of-scope confirmations, and states explicitly that nothing is retired, disabled, or deleted
  - id: S9
    requirement: the audit ledger's pre-execution bytes are the exact prefix of its final bytes with one typed record per contracted operation; the derived index rebuilds deterministically discovering the decisions and change-proposals kinds with zero canonical loss; the journal tree digest is byte-identical at close
  - id: S10
    requirement: all required suites pass post-execution (the learning suite and Level 6/5/2/1, engine, and backlog-next in the real tree; Level 4 23/23 and Level 3 23/23 in an isolated committed validation copy per the SE-001-R3/MI-005 mechanics); the evidence set is complete, deterministic, and canonically serialized; all isolated fixtures and the rehearsal copy are removed with absence proof; the execution delta remains uncommitted and unstaged with a recorded SHA-256 manifest matching scope_rule exactly

mandatory_failure_scenarios:
  - id: F-AUTO-PROMOTION
    condition: an attempt to create or modify any file under continuity/bindings/**, continuity/packs/**, .claude/skills/**, runtime/**, or any published suite as a consequence of an Observation or Lesson without the accepted Change Proposal and recorded owner Decision
    diagnostic: AUTOMATIC_PROMOTION_PROHIBITED
  - id: F-LESSON-AUTHORITY
    condition: an attempt to treat an Observation or Lesson (accepted or otherwise) as executable authority for any rule, Guard, validator, Pack, or binding mutation
    diagnostic: LEARNING_RECORD_HAS_NO_RULE_AUTHORITY
  - id: F-REVIEW-WITHHELD
    condition: the owner withholds, refuses, or contradicts any contracted review outcome, the Lesson acceptance, the Decision, or the application authorization
    diagnostic: REVIEW_AUTHORIZATION_WITHHELD; execution stops fail-closed and MI-007 closes UNCONDITIONAL FAIL under the rollback rule
  - id: F-REVIEW-CONFLICT
    condition: a store creation finds its fixed path occupied, or a contracted advancement finds an unexpected revision
    diagnostic: IMMUTABLE_ARTIFACT_EXISTS or REVISION_CONFLICT; execution blocks fail-closed before any further mutation
  - id: F-IMPORT-PROVENANCE
    condition: a historical import without the exact source path, digest, and quoted entry provenance
    diagnostic: IMPORT_PROVENANCE_MISSING
  - id: F-OUTCOME-PROMOTION
    condition: an attempt to derive a Change Proposal or applied change from an Observation reviewed duplicate, deferred, or rejected, or from the historical import
    diagnostic: REVIEW_OUTCOME_PROHIBITS_PROMOTION
  - id: F-TARGET-ROUTED-MINT
    condition: an attempt to run the current backward-edge mint/consider/curate path (run-backward.mjs) for the target-routed completed effort or any MI-007 learning record
    diagnostic: TARGET_ROUTED_AUTOMATIC_CHECK_PROMOTION_PROHIBITED
  - id: F-RETIRE-ACTIVE
    condition: an attempt to mark any current mechanism retired, disabled, or deleted (in the inventory or on disk) in this bound, or any inventory claim lacking its no-active-dependency basis
    diagnostic: RETIREMENT_BLOCKED_ACTIVE_DEPENDENCY
  - id: F-UNAUTHORIZED-APPLY
    condition: the applied-change file exists or is written without the recorded owner Decision, accepted proposal, and verbatim application authorization with machine-captured UTC
    diagnostic: UNAUTHORIZED_TARGET_CHANGE
  - id: F-CORE-PROMOTION
    condition: an attempt to promote any learning record, rule, or mechanism into Framework Core (runtime/continuity/**) or to claim cross-project generality
    diagnostic: FRAMEWORK_CORE_PROMOTION_PROHIBITED (cross-project evidence and a Decision would be required; neither exists)
  - id: F10
    condition: attempt to delegate contracted work to any Skill, slash command, /backlog-next, continuity:invoke, run-backward.mjs, or other product executor procedure
    diagnostic: EXECUTOR_DELEGATION_PROHIBITED
  - id: F11
    condition: claim or creation of any MI-008-or-later state — sustained-dogfooding scope, themes/intake/Epic/deploy migration, universal registry, remote source, hosted service, Console, automated backlog creation from Observations, or any new Run, Work Item, Checkpoint, Handoff, or Context Pack
    diagnostic: FORBIDDEN_HIGHER_LEVEL_CLAIM
  - id: F12
    condition: any executor or engine write outside the frozen write-set, fixed create paths, permitted adapter records, and two permitted modify paths (including any modification of the pinned engine, hooks, Skills, any published suite, any backlog item, or any pre-existing store or binding record)
    diagnostic: MANIFEST_SCOPE_MISMATCH
  fixture_rule: >
    F-REVIEW-CONFLICT, F-IMPORT-PROVENANCE, F-OUTCOME-PROMOTION,
    F-UNAUTHORIZED-APPLY, and F-RETIRE-ACTIVE are exercised in isolated
    temporary fixtures outside all three repositories with exact
    expected/observed diagnostics, exit codes, fixture digests, and cleanup
    proof (the store's own typed REVISION_CONFLICT and
    IMMUTABLE_ARTIFACT_EXISTS demonstrated against a fixture store; the
    contracted diagnostics demonstrated by the executor's own fail-closed
    checks). F-AUTO-PROMOTION, F-LESSON-AUTHORITY, F-TARGET-ROUTED-MINT,
    F-CORE-PROMOTION, F-REVIEW-WITHHELD, F10, F11, and F12 are standing
    prohibitions verified structurally (the no-auto-promotion digest proof,
    the audit-order proof, the final manifest, and the absence of any
    run-backward.mjs invocation in the recorded commands); F-REVIEW-WITHHELD
    additionally documents the stop-and-fail semantics without fabricating a
    withheld reply.

deterministic_evidence:
  rules:
    - every JSON evidence file uses canonical JSON with recursively sorted object keys, UTF-8, two-space indentation, and one LF terminator
    - every command record contains argv, cwd role, start and end UTC, exit code, stdout SHA-256, stderr SHA-256, and parsed result
    - repository bindings include branch, HEAD, clean state, and observed time for all three repositories, plus the journal tree digest
    - engine-lock evidence records every engine-lock digest verification
    - observation evidence records, per artifact, the full bytes digest at each revision, the source provenance, and the evidence references
    - review evidence records each verbatim owner quote with its machine-captured UTC and the artifact revision it advanced
    - decision/proposal evidence records the full revision chains with per-revision digests and cross-references
    - applied-change evidence records the file digest, the provenance chain, and the audit-order proof (the Decision and accepted-proposal audit records strictly precede the application record)
    - no-auto-promotion evidence records every compared digest set with before/after values
    - retirement evidence records the six classifications with their route-fact bases
    - scenario evidence records expected diagnostic, observed diagnostic, exit code, fixture digest, and cleanup result
    - no chat transcript, hidden manual copy, timestamp-dependent artifact ordering, or unrecorded inference is admissible; narrative alone proves nothing
    - temporary fixtures and copies are outside all three repositories and are removed with absence proof
  required_validation:
    - node --test tests/continuity-level-6-learning.test.mjs returns all tests passing
    - node --test tests/continuity-level-6.test.mjs returns 10/10 after execution
    - node --test tests/continuity-level-5.test.mjs returns 7/7 after execution
    - node --test tests/continuity-level-4.test.mjs returns 23/23 after execution in an isolated committed validation copy (working-tree purity guards; SE-001-R3/MI-005 mechanics)
    - node --test tests/continuity-level-3.test.mjs returns 23/23 after execution in the same isolated committed validation copy
    - node --test tests/continuity-level-2.test.mjs returns 23/23 after execution
    - node --test tests/continuity-level-1.test.mjs returns 14/14 after execution
    - node --test runtime/continuity/test/*.test.mjs exits 0 with zero failures after execution
    - node --test .claude/skills/backlog-next/test/*.test.mjs returns 68/68 after execution without invoking the Skill
    - all S1-S10 success scenarios pass
    - all mandatory failure scenarios are demonstrated per fixture_rule
    - the journal tree digest after execution equals the recorded pre-execution digest
    - final Git and digest comparison proves every pre-existing tracked path other than the two permitted modify paths equals the exact start revision
    - the final Nestfolio manifest contains exactly the paths permitted by scope_rule, uncommitted and unstaged, with a recorded SHA-256 manifest

preservation_and_rollback:
  before_write: >
    Record exact Git metadata for all three repositories, the complete
    Nestfolio tracked-tree identity, the journal tree digest, the
    pre-execution bytes and digests of the two permitted modify paths,
    every byte_identity_guarantees digest, absence of every fixed create
    path, and a verified external recovery ledger outside all
    repositories.
  execution_failure: >
    If any condition fails after mutation starts (including
    REVIEW_AUTHORIZATION_WITHHELD), restore the two permitted modify paths
    to their recorded pre-execution bytes, remove every newly created
    MI-007 path, verify Nestfolio is byte-identical and clean at the exact
    published start revision, retain diagnostics outside all repositories,
    and close MI-007 as UNCONDITIONAL FAIL in continuity-lab. Never retain
    partial learning state, never leave a Change Proposal accepted or
    applied without its recorded authorizations, and never write into the
    current journal.

