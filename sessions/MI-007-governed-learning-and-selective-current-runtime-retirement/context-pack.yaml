    - the entire Git common directory journal/ tree
    - package.json, pnpm-lock.yaml, CLAUDE.md, .claude/settings.json, .claude/skills/**
    - runtime/** including the entire pinned engine runtime/continuity/**
    - docs/backlog/** without exception (MI-007 performs no backlog write-back)
