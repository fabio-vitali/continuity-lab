objective:
  primary_question: >
    Can Evidence-backed findings from the completed target Work be reviewed —
    under explicit human authority — into reusable target learning records
    (factual Observations, a candidate Lesson, a durable Decision, and a
    separate Change Proposal), with exactly one accepted project-level change
    applied by the target artifact owner through that artifact's own
    lifecycle and everything else left unpromoted, such that no learning
    record ever directly mutates a Skill, Guard, validator, Pack, or binding,
    automatic check promotion is proven prohibited for target-routed work, a
    provenance-preserving historical import from the current lesson dossier
    is demonstrated, and a retirement inventory classifies the current
    backward-edge mechanisms explicitly (retained/deferred/rejected, none
    retired) — while the pinned engine, every published record including
    every run-mi006-r1 and VS-001 learning artifact, and every current
    mechanism remain byte-identical?
  completion_boundary: >
    Implement and validate only the Level 6 Decision-and-Learning portion for
    learning material sourced from the one completed target-routed effort.
    All target learning records are NEW artifacts direct-authored through the
    pinned store API at fixed contracted paths; the one applied change is a
    NEW additive file under continuity/bindings/nestfolio/decisions/. The
    only pre-existing paths that change are the append-only audit ledger and
    the derived index rebuild. Do not create or complete any Run, Work Item,
    Checkpoint, Handoff, or Context Pack; do not mutate any backlog item, any
    published suite, the pinned engine, any Skill, any Pack, any Guard, any
    validator, or any pre-existing store or binding record; do not use the
    engine's recordLesson (it would advance the published run-mi006-r1
    record); do not invoke the current backward-edge mint/consider/curate
    path for anything; do not retire, disable, or delete any current
    mechanism; do not promote anything into Framework Core; do not begin
    MI-008, sustained-dogfooding scope, or broader work.

engine_binding:
  rule: >
    The store engine is the pinned read-only implementation at
    runtime/continuity/** together with the hook registration in
    .claude/settings.json, exactly as pinned by MI-005 and re-verified by
    MI-006 and MI-006-R1 (aggregate engine digest
    7e31ff56a10ca6b1715b29f02132e66c80e321921b41dcb55329db2e0f320a38; hook
    registration digest
    73387f347f43d0f6a154f83ed54c3bdaee0e0b6ba6dbf3120ebf5b8c28834378;
    settings digest
    999e828d22fcf1cf1e66eb81260a4f8ff3a36b2387adf117ca84602e65c2c6b7).
    MI-007 introduces no engine code and changes no engine byte. The engine's
    own store API (createStore(root) from the pinned
    runtime/continuity/lib/store.mjs, imported unmodified as a library) is
    the sole permitted mechanism for every contracted store write:
    writeArtifact with expectedRevision 0 for each creation and with the
    exact prior revision for each contracted advancement (REVISION_CONFLICT
    and IMMUTABLE_ARTIFACT_EXISTS abort fail-closed), appendAudit for the
    audit trail, and rebuildIndex for the derived index. The engine's
    recordLesson function is explicitly NOT used: it appends
    observation/lesson references to the owning Run artifact, and
    run-mi006-r1 is a published immutable record that must remain
    byte-identical; the direct store-API authoring below is the same
    contracted preparation mechanism MI-005 and MI-006-R1 used and
    evidenced. Before any mutation the executor verifies every engine file
    and .claude/settings.json against the recorded engine-lock digests at
    the bound revision; a mismatch blocks fail-closed with
    ENGINE_ASSET_MISMATCH.
  engine_verified_in_authoring: >
    The authoring session verified against the pinned engine source at the
    bound revision that: the store API is kind-generic (writeArtifact
    resolves continuity/artifacts/<kind>/<id>.json for any kind, so the new
    decisions and change-proposals kinds require no engine change);
    rebuildIndex auto-discovers new kind directories; expectedRevision
    conflicts fail closed with the typed REVISION_CONFLICT and immutable
    collisions with IMMUTABLE_ARTIFACT_EXISTS (both raised on the error's
    typed code); recordLesson writes to the owning Run artifact and is
    therefore excluded; and no published suite enumerates the observations,
    lessons, decisions, or change-proposals directories, so the contracted
    creations break no published assertion. The store mechanics (creation,
    contracted advancement, both fail-closed codes, audit append, and index
    rebuild over the new kinds) were proven empirically in an isolated
    scratch store outside all three repositories, since removed.
  level_6_learning_binding_artifact: >
    continuity/level-6/learning-binding.json declares, in canonical JSON:
    the bound Nestfolio revision and the engine-lock digests; every bound
    learning source by path and digest; the five Observation, two Lesson,
    one Decision, and one Change Proposal artifacts by fixed id with their
    contracted statuses and revision chains; the one applied change by path
    with its required provenance chain; the ordering rule (Decision and
    accepted Change Proposal strictly before the applied file exists); the
    no-auto-promotion digest sets; the retirement-inventory reference; and
    the explicit statement that no Run, Work Item, Checkpoint, Handoff, or
    Context Pack is created and no current mechanism is retired.
    tests/continuity-level-6-learning.test.mjs validates this binding
    deterministically against the repository and the produced artifacts.

learning_lifecycles:
  rule: >
    Per DR-0017 the four lifecycles are separate and none carries rule
    authority by itself. An Observation is a raw evidence-linked finding
    with no rule authority. A Lesson is a reviewed reusable statement that
    may be accepted, rejected, superseded, retired, or proposed for
    promotion — never executed. A Change Proposal is an explicit proposal to
    modify a Skill, Procedure, validator, Guard, Pack, or project binding,
    identifying supporting Evidence, expected benefit, risk, validation
    plan, and required authority. Only a reviewed and accepted change,
    applied by the target artifact owner through that artifact's own
    lifecycle, updates a canonical rule or binding. Deterministic checks,
    agent review, and human review remain distinct modes (DR-0017);
    Goal-shaped completion criteria and Guard-shaped standing conditions
    remain separate entities (DR-0005). No current or target learning record
    can directly mutate a Skill, Guard, validator, Pack, or binding; current
    findings and lessons remain historical source artifacts; target-routed
    work cannot use automatic check promotion; current backward-edge flows
    remain available for current-routed work only.
  human_floor: >
    Every review outcome, the Lesson acceptance, the Decision, and the
    application authorization are explicit acts of the human program owner
    (fabio.vitali), captured verbatim during execution with machine-captured
    UTC (date -u at capture; the MI-004/MI-006-R1 authorization precedent)
    and recorded inside the corresponding artifact. The contracted outcomes
    below are the owner-reviewed design of this contract; at execution the
    owner explicitly confirms each one. A withheld or contradicting
    confirmation blocks fail-closed with REVIEW_AUTHORIZATION_WITHHELD and
    MI-007 closes UNCONDITIONAL FAIL without forcing any outcome.

