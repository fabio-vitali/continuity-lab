    - runtime/** including the entire pinned engine runtime/continuity/**
    - continuity/level-1/** through continuity/level-6/** pre-existing files
    - continuity/artifacts/** pre-existing files, continuity/bindings/** pre-existing files, continuity/packs/**, continuity/dogfood/**
    - .continuity/** pre-existing files except the two permitted modify paths
    - continuity/evidence/** pre-existing trees
    - docs/backlog/** (read-only; no completion write-back or any other mutation occurs in MI-007)
    - tests/continuity-level-1.test.mjs through tests/continuity-level-6.test.mjs (published suites; never edited)
