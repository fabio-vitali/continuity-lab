    continuity/artifacts/scopes/scope-mi006-r1-completion.json and
    continuity/artifacts/working-sets/ws-mi006-r1.json (the two contracted
    formation writes), and the engine's own new artifacts for run-mi006-r1
    under continuity/artifacts/** (runs, sessions, context-packs,
    formation-traces, pack-locks, validation-plans, validation-results,
    evidence, checkpoints — NO observations and NO lessons, which are MI-007,
    and NO handoffs, which would indicate an uncontracted interrupt),
    .continuity/runs/run-mi006-r1/**, the run-mi006-r1 execution view under
    .continuity/derived/execution-views/, and the MI-006-R1 executor session
    records under .continuity/executor-sessions/. The exact paths are frozen
    by the write-set rehearsal and recorded in the final manifest.
  modify_exactly:
    - "continuity/artifacts/work-items/dashboard-bff-awaiting-confirmation-activity-gap.json — the single immutability_exception record: advanced from the pinned revision-2 base only through the three contracted transitions (rebinding write, engine startRun, engine completeRun), each revision's bytes and digests recorded"
    - "docs/backlog/dashboard-bff-awaiting-confirmation-activity-gap.md — the single permitted canonical planning mutation: the engine's atomic completion write-back of the item's tracking fields only (status shipped, closed date, validation_gate); the planning narrative is otherwise byte-identical and pre-write bytes are recorded for rollback"
    - "tests/continuity-level-4.test.mjs and tests/continuity-level-5.test.mjs — the bounded completion-aware correction of exactly the four assertions per published_suite_correction"
