  scope_rule: >
    On PASS the Nestfolio diff from the exact start revision must contain
    exactly: the fixed create paths, the contracted formation and frozen
    engine write-set creates, and the six permitted modified paths — with no
    staged path and no other modified, deleted, renamed, or additional path.
    Every other pre-existing tracked byte, including every Level 1-5 artifact
