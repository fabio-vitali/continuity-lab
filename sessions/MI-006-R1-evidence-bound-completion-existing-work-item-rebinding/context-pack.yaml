rebinding_write:
  rule: >
    The revision 2-to-3 rebinding write changes EXACTLY these Work Item
    fields, leaves every other field byte-equal, and appends one history
    entry; the executor records the full before and after bytes and digests in
    the evidence:
    - objective: the contracted MI-006-R1 completion objective (Evidence-bound
      completion of the shipped effort through the pinned engine);
    - scope_ref: { id: scope-mi006-r1-completion, revision: 1 };
    - exclusions: the contracted completion exclusions (no effort
      re-implementation; no mutation of any other backlog item or any
      MI-005/VS-001/VS-001A record; no MI-007 state);
    - constraints: the contracted completion constraints (pinned engine
      unmodified; completion only through the engine's completion gate);
    - expected_outputs: formed Assurance Plan carrying the three criteria;
      three linked immutable Evidence artifacts spanning the three modes; the
      atomic Evidence-bound completion with the truthful backlog write-back;
    - completion_criteria: exactly the three criteria defined in
      assurance_plan.criteria, statuses pending;
    - required_evidence: the three contracted Evidence descriptions;
    - guards: exactly one entry referencing the classified Guard binding by
      id, version 1, and path (the fixed create path under
      continuity/bindings/nestfolio/guards/);
    - active_run_refs: [] (truthful: no active Run exists for the effort;
      run-mi005 is closed);
    - history: one appended entry recording action mi006-r1-rebinding, the
      machine-captured UTC, the human program owner authorization, and this
      contract identity.
    UNCHANGED fields (byte-equal): id, schema_version, status (in_progress),
    source (the exact MI-005 source record — its sha256
    b656733991c96c4275d11e9a9f2bff7f5ac72cdd298cbc68a4b94b6799dc742d is what
    completeRun's write-back verifies against the live backlog bytes), type,
    project_binding, dependencies, blockers, completed_run_refs,
    evidence_refs, required_capabilities (work-selection, run-start,
    checkpoint, fresh-session-resume — they resolve at the pinned Level 2 lock
    exactly as MI-005 proved).

