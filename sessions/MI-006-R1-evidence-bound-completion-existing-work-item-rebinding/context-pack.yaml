    validation, Evidence production, completion, failure scenarios, evidence,
    and closure with its own tools, driving the pinned adapter CLI and the
    pinned engine directly.
  sub_agent_rule: >
    Per DR-0024 the orchestrating executor may use its own sub-agents and
    tools for mechanical work at its discretion. Delegating contracted work to
    the product's executor procedures — any Skill, /backlog-next,
    continuity:invoke — remains prohibited and is a mandatory failure (F10).
    Running node for tests, validation, the pinned engine's CLI, the pinned
    store API for the three contracted writes, and the published continuity
    tooling's own checks is direct work, not delegation.
  no_separate_genuine_session_rule: >
    MI-006-R1 does NOT require a separately launched human-provenanced Claude
    Code validation Session (the resume-genuineness claim was intrinsic to
    MI-005 only; run-mi006-r1 is started, validated, and completed within one
    executor session holding the single-writer lease). The completion gate's
    rigor comes from the engine, which requires every criterion to be status
    passed with a linked immutable Evidence artifact of the declared type; a
    narrative that does not produce the required typed Evidence cannot flip a
    criterion to passed. The orchestrating executor produces the deterministic
    Evidence directly (real suite runs and byte-identity checks) and the
    agent-review Evidence as its own typed artifact recorded with the
    executor's provenance; the human-review Evidence is an explicit
    program-owner authorization record with machine-captured UTC (MI-004
    authorization precedent). Agent-review and human-review Evidence remain
    distinct typed modes and are never collapsed into the deterministic mode
    or into one opaque score (DR-0017).

assurance_plan:
  formation_rule: >
    The Assurance Plan (validation plan) is formed by the pinned engine's
    startRun from the rebound Work Item: each criterion is mapped to exactly
    one typed engine validator and one required Evidence mode, and the
    completion policy is the engine's
    all-required-criteria-pass-with-evidence. The plan binds the exact effort
    source digest, the Level 3 scope digest, the Level 4 Context Pack
    version 1 digest, and the Level 2 lock aggregate through the Level 6
    completion binding and the run-level formed context.
  criteria:
    - id: mi006r1-c1-investigation
      statement: investigation determines expected-versus-actual recent-activity behavior for L2 AWAITING_CONFIRMATION decisions
      validation_mode: agent-review plus human-review
      engine_validator: >
        type file over continuity/level-6/criterion-1-investigation-review.json
        with a contains gate on the fixed marker "mode": "human-review-authorization".
        The file is a fixed create path authored BEFORE validateRun and is the
        typed review record itself: it carries the executor's agent-review
        investigation finding (expected behavior, actual behavior, whether a
        real gap exists, with exact source references) AND the program owner's
        explicit human-review authorization accepting the finding, quoted
        verbatim with machine-captured UTC. Neither a commit message nor an
        unrecorded narrative satisfies this criterion; an absent, malformed,
        or marker-less record fails the validator deterministically.
      required_evidence_type: agent-and-human-review-record
    - id: mi006r1-c2-cdc-sourcing
      statement: if a real gap is confirmed, the signal is sourced from the DecisionPacket AWAITING_CONFIRMATION status via the existing row CDC, never from the removed dead event
      validation_mode: deterministic plus agent-review
      engine_validator: >
        type command running the dashboard-bff unit suite (npx nx test
        dashboard-bff, exit 0 required), whose
        test/unit/handlers/awaiting-confirmation-activity-gap.test.ts
        (SHA-256 c3724e16986a1751330ea02040b4716619beada67b0c12e7cefc5f6e574ec5f0)
        and test/unit/transforms/awaiting-confirmation-activity.test.ts
        (SHA-256 a2203511920c20903fc80086ecdf5c6ef963a60fc894c2f88bcf370da2580a66)
        assert the awaiting-confirmation projection is sourced from the
        DecisionPacket status CDC path. This CORRECTS the MI-006 wording that
        named the integration suite. A distinct typed agent-review Evidence
        artifact additionally confirms the sourcing is the existing CDC row
        path and not the removed dead event.
      required_evidence_type: deterministic-suite-run
    - id: mi006r1-c3-non-regression
      statement: the dashboard-bff unit suite remains green, the integration-suite files are byte-identical (non-regression), and the removed USER_CONFIRMATION_REQUESTED handler is not reintroduced
      validation_mode: deterministic
      engine_validator: >
        type command running node
        continuity/level-6/checks/criterion-3-non-regression-check.mjs (a
        fixed create path; deterministic, dependency-free node script) which
        exits 0 only if: the two integration-suite files are byte-identical to
        their bound-revision digests
        (test/integration/dashboard-bff.integration.test.ts
        aa7c11fc1e975deecb8cd5329a2c831aef5dd36e2374473831141f2d1999fc50;
        test/integration/read-model-projection.integration.test.ts
        bad65ddec03bffb7fdf78031e42d8fc69c53a3cdccee63024f990e3664b2f8e8), the
        two unit projection test files are byte-identical to their
        bound-revision digests (c3724e16... and a2203511... above), and no
        non-comment occurrence of USER_CONFIRMATION_REQUESTED exists under
        services/investor/dashboard-bff/src. This CORRECTS the MI-006 wording:
        the integration suite targets real deployed AWS (createTestContext to
        EventBridge/DynamoDB/AppSync/Cognito, us-east-1, prefix dev) and is
        deliberately NOT run in a bounded local session; its non-regression is
        proven by byte-identity, the SE-001 precedent.
      required_evidence_type: deterministic-non-regression-proof
  external_evidence_reference: >
    The Git published-implementation revision (363283bc) and the current
    commit/ship gate results are referenced once, read-only, as an
    external-authority provenance record (locator, digest, freshness) inside
    the coexistence route record. MI-006-R1 declares no second Git or CI
    verdict, duplicates no external object, and never treats an unavailable
    external result as a pass.
  mode_distinctness_rule: >
    Deterministic, agent-review, and human-review Evidence are recorded as
    distinct typed modes with separate provenance and authority and are never
    merged into one score (DR-0017). The completion matrix must cover at least
    the deterministic mode and at least one of agent-review or human-review;
    this contract requires all three across the three criteria.

guard_classification:
  rule: >
    MI-006-R1 classifies the relevant current checks explicitly. The
    dashboard-bff unit and integration suites are classified as validators /
    project rules (Evidence sources referenced by the Assurance Plan — the
    unit suite as a deterministic command validator, the integration suite as
    a byte-identity non-regression subject); they keep their own authority and
    are NOT automatically Guards. The current Git commit and ship gates remain
    the underlying authorities for their own results and are referenced once
    with exact provenance; they are not converted into Guards. To prove the
    target Guard classification mechanism, MI-006-R1 classifies exactly one
    concrete condition as a target Guard with full metadata following the
    existing guard-binding schema (schema_version, id, version, status,
    condition, rationale, applicability, evaluation_mode, severity, owner,
    exception_policy) and stores it as the fixed create path under
    continuity/bindings/nestfolio/guards/. The Guard binding is referenced by
    the rebound Work Item's guards array so the engine snapshots its
    definition digest into the formed run context and validation plan. No
    current check is automatically minted into a Guard; any attempt to convert
    a check to a Guard without this explicit classification is a mandatory
    failure (F-AUTO-GUARD).
  classified_guard:
    id: nestfolio-dashboard-bff-no-dead-user-confirmation-requested-handler
    binding_path: continuity/bindings/nestfolio/guards/mi006-r1-dashboard-bff-no-dead-user-confirmation-requested-handler.json
    condition: >
      The dashboard-bff service does not reintroduce the removed dead
      USER_CONFIRMATION_REQUESTED event handler; the awaiting-confirmation
      signal, if surfaced, is sourced only from the DecisionPacket
      AWAITING_CONFIRMATION status via the existing row CDC.
    rationale: >
      This is a condition that must REMAIN true over time (a Guard per
      DR-0005), distinct from the completion criteria that must BECOME true.
      Reintroducing the dead event is a regression the effort's whole point
      was to prevent.
    applicability: Work Item dashboard-bff-awaiting-confirmation-activity-gap and the dashboard-bff service
    evaluation_mode: deterministic
    severity: blocking
    owner: fabio.vitali (human program owner)
    exception_policy: >
      No automatic exception. A temporary exception requires an explicit
      authorized, scoped, evidence-linked Waiver; expiry reopens the block.
  goal_versus_guard_note: >
    The three completion criteria are Goal-shaped (conditions to make true for
    this Work Item). The classified Guard is Guard-shaped (a condition to keep
    true). DR-0005 forbids collapsing them into one entity or lifecycle;
    MI-006-R1 keeps completion criteria and the Guard as separate objects with
    separate authority.

waiver_path:
  rule: >
    MI-006-R1 demonstrates the distinct authorized Waiver path WITHOUT waiving
    any real effort criterion (all three real criteria must be satisfied by
    accepted Evidence for the genuine completion). The Waiver mechanism is
    exercised in an isolated temporary fixture outside all three repositories,
    on a synthetic criterion, proving that a Waiver: is explicit and
    authorized by a declared human authority; is scoped and time-bounded; is
    evidence-linked; is recorded as DISTINCT from a pass (never rendered as
    passing Evidence); and, on expiry, reopens the blocked criterion. A Waiver
    is never created automatically (auto-waiver is a mandatory failure).

published_suite_correction:
  rule: >
    Four published suite assertions pin the CURRENT working-tree bytes of the
    effort's backlog source to its pre-completion digest and therefore encode
    that the effort can never be truthfully completed — a publication- and
    completion-dependent suite defect of exactly the class MI-004-R1 corrected
    (a published suite that self-invalidates when the program legitimately
    advances). The authoring session proved empirically, in an isolated copy
    outside all three repositories with the completion delta committed, that
    after the truthful write-back exactly these fail and nothing else fails:
    tests/continuity-level-4.test.mjs S7 (adapter-view rebuild reads the
    current backlog bytes and blocks F1), S8 (fresh-fixture staleness check
    copies the current backlog bytes), S9 (the pinned lower-level identity map
    entry for the backlog source), and tests/continuity-level-5.test.mjs
    "run-binding: bound effort source is byte-identical to the recorded
    digest" (lines 58-63); Level 1 14/14, Level 2 23/23, Level 3 23/23, and
    the engine suite 9/9 remain green. MI-006-R1 therefore authorizes a
    bounded completion-aware correction of EXACTLY these four assertions in
    EXACTLY these two published test files, with this fixed semantics: each
    corrected assertion verifies the recorded digest
    b656733991c96c4275d11e9a9f2bff7f5ac72cdd298cbc68a4b94b6799dc742d against
    the bound-revision committed bytes of
    docs/backlog/dashboard-bff-awaiting-confirmation-activity-gap.md obtained
    from Git (the permanent historical truth), and, whenever the current
    working-tree bytes differ from that digest, additionally requires that
    continuity/level-6/completion-binding.json exists and records the
    completion write-back transition with before_sha256 equal to the recorded
    digest and after_sha256 equal to the current bytes (fixtures that formerly
    copied the current backlog bytes use the Git-restored bound-revision
    bytes). No product or engine code is modified — the correction is
    contained in the two test files; the suite totals remain exactly 23 and 7;
    the corrected suites must pass BOTH in the pre-completion state and in the
    post-completion state, proven in the rehearsal and again in the real tree.
    Any edit beyond these four assertions' minimal correction is
    MANIFEST_SCOPE_MISMATCH.
  corrected_paths:
    - tests/continuity-level-4.test.mjs
    - tests/continuity-level-5.test.mjs

completion_execution:
  scope: >
    On PASS, MI-006-R1 performs the first real Evidence-bound Work completion
    of the program through the pinned engine in the real Nestfolio working
    tree (human program owner authorization carried over from MI-006 Q1 and
    re-confirmed by the option (b) approval: complete the effort for real).
    The completion is atomic: the engine's completeRun transitions the
    existing Work Item to completed (the third and final exception
    transition), the working set ws-mi006-r1 to completed, records the final
    verified Checkpoint, links every accepted Evidence artifact, and writes
    back the one backlog item's tracking fields (status shipped, closed date,
    validation gate referencing run-mi006-r1 and the final Checkpoint). This
    and the immutability_exception advancement are the sole permitted
    mutations of canonical planning or store state.
  preconditions_for_completion: >
    Completion runs only after: every criterion is status passed with a linked
    immutable Evidence artifact of the declared type; the classified Guard
    evaluates true; no effect is out of Scope (no recordFileEffect is ever
    invoked; the completion Scope's allowed_write_paths are empty); no
    Decision is unresolved; the active mutating lease is held by the
    completing session; and the backlog item's current bytes equal the Work
    Item's declared source.sha256
    b656733991c96c4275d11e9a9f2bff7f5ac72cdd298cbc68a4b94b6799dc742d (a
    mismatch blocks fail-closed as REVISION_CONFLICT). Any unmet precondition
    blocks with the engine's COMPLETION_GATE_BLOCKED (or the exact typed
    diagnostic) and MI-006-R1 does not force completion.
  backlog_writeback_truthfulness: >
    The backlog write-back is truthful: the effort's implementation genuinely
    shipped at Nestfolio 363283bc and its evidence is published. The
    write-back updates only the tracking fields the engine writes (status,
    closed, validation_gate); it does not rewrite the planning narrative,
    re-rank, or synchronize any other backlog item, and it is fully reversible
    during execution (the whole delta stays uncommitted and the pre-write
    backlog bytes are recorded for byte-exact rollback).

target_run:
  rule: >
    MI-006-R1 creates one new bounded Level 6 target Run run-mi006-r1 in the
    DR-0014 target operational store via the pinned engine's startRun on
    ws-mi006-r1, with session session-mi006-r1-1, bound to the rebound Work
    Item at revision 3, the completion Scope at revision 1, the resolved pack
    lock at the Level 2 aggregate
    73bbb7c9199a79e00208115f1f7ba469be7e42e1bd20d1d72bfc726ac048df26, and the
    bound repository revision and working-tree fingerprint. run-mi006-r1 is a
    distinct Run with a new identity; run-mi005 is closed and is never
    reopened, reused, resumed, converted, or completed. The dual-run route
    check proves no active current-journal Run and no other active target Run
    exists for the effort before the rebinding write (the revision-2 record's
    stale active_run_refs field naming the closed run-mi005 is part of the
    immutable base bytes and does not count as an active Run; activity is
    defined by run/head status and lease state). run-mi006-r1's contracted
    work is exactly the Assurance and completion of the effort: it performs no
    effort re-implementation, no file effects, and no material side effect
    beyond the contracted Assurance, Evidence, and completion records. The Run
    is started, validated, and completed within one executor session holding
    the single-writer lease; no resume, interrupt, or Handoff is contracted,
    and the appearance of any handoff or additional session artifact for
    run-mi006-r1 is MANIFEST_SCOPE_MISMATCH.
  lease_and_audit: >
    Completion requires the single-writer lease (LEASE_REQUIRED otherwise);
    the lease is released at completion. The audit ledger is append-only: the
    recorded pre-execution bytes remain the exact prefix of the final file.
    The derived index is a rebuildable non-authoritative projection.

write_set_rehearsal: >
  Before any real-tree mutation, the orchestrating executor rehearses the
  complete mechanics — Guard and level-6 authoring, the published suite
  correction, the rebinding write, the two formation writes, Run creation,
  Assurance Plan formation, validation, Evidence production, the
  classified-Guard evaluation, the completion including the backlog
  write-back, index rebuild, the corrected suites passing in both
  pre-completion and post-completion states, and rollback — in an isolated
  temporary copy of Nestfolio outside all three repositories, driving the
  pinned store API, adapter CLI, and engine directly. The rehearsal records
  the exact produced write-set: every created path and every modified path
  with before/after digests, including the Work Item revision chain and the
  backlog write-back path. The write-set is frozen and must satisfy
  nestfolio_scope exactly; a rehearsal write outside the permitted classes
  blocks the real execution fail-closed with ENGINE_POLICY_MISMATCH. The real
  execution must produce exactly the frozen write-set plus the contracted
  evidence records; any deviation is MANIFEST_SCOPE_MISMATCH. The copy is
  removed with absence proof.

required_preconditions:
  - the session gates in session_gates pass before any Nestfolio mutation
  - every engine file and .claude/settings.json verify against the recorded engine-lock digests at the bound revision (ENGINE_ASSET_MISMATCH otherwise)
  - the published Level 4 artifacts verify against every bound digest, record valid 18/18, and carry no stale, rejected, or revoked disposition
  - the published Level 3 artifacts verify internally and the route remains active for the bound selected effort
  - the bound selected-effort backlog source is byte-identical to b656733991c96c4275d11e9a9f2bff7f5ac72cdd298cbc68a4b94b6799dc742d and equals the Work Item's declared source.sha256
  - the Level 2 lock verifies with aggregate 73bbb7c9199a79e00208115f1f7ba469be7e42e1bd20d1d72bfc726ac048df26
  - the existing Work Item artifact is byte-identical to the pinned revision-2 base 313af5905dbb3fda35dc9c193502df667812f0044c91f6c3b3691d136313aa60 (REBASE_MISMATCH otherwise; the rebinding write additionally enforces expectedRevision 2 fail-closed)
  - every byte-identity record in immutability_exception.byte_identity_guarantees verifies at start
  - the published Level 5 run-binding and engine-lock verify and run-mi005 is closed (status interrupted, head interrupted, lease inactive; no active target Run for the effort)
  - the read-only route check records no active current-journal Run for the bound effort and no other active target Run, and records the current journal tree digest
  - all fixed create paths under nestfolio_scope are absent at the published start and no path under .continuity/runs/run-mi006-r1, continuity/level-6, continuity/evidence/mi-006-r1, the new Scope, the new Working Set, or the classified Guard binding exists
  - package-lock.json changes and dependency operations are not needed (pnpm-lock.yaml is byte-immutable)
  - before mutation, without invoking any Skill: Level 5 tests 7/7, engine suite 9/9 (exit 0), Level 4 23/23, Level 3 23/23, Level 2 23/23, retained Level 1 14/14, and backlog-next 68/68
  - the dashboard-bff unit suite runs green at the bound revision and is recorded as the deterministic Evidence source; the integration-suite files verify byte-identical to their pinned digests
  - the write-set rehearsal completed in the isolated copy, its frozen write-set satisfies nestfolio_scope exactly, and the corrected Level 4/5 suites passed there in both pre-completion and post-completion states

