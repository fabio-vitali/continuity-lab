    close; publication is separately authorized.
  path_absence_rule: >
    Any pre-existing fixed create path is a collision and blocks execution; it
    must not be overwritten, adopted, repaired, or deleted.

bounded_success_scenarios:
  - id: S1
    requirement: the pinned engine digests, hook registration, and Level 6 binding verify exactly and are recorded in engine-lock.json and completion-binding.json; the Level 1-5 artifacts, the run-mi005 closure, the revision-2 Work Item base digest, and every byte-identity record verify read-only
  - id: S2
    requirement: the rebinding write advances the Work Item 2-to-3 with expectedRevision 2, changing exactly the contracted fields; the two formation writes create the completion Scope and the ready Working Set with expectedRevision 0; the classified Guard is authored with full metadata; the route check proves no active current-journal or target dual Run for the effort
  - id: S3
    requirement: run-mi006-r1 is created by the pinned engine's startRun on ws-mi006-r1 binding the rebound Work reference, Scope, formed run context, resolved pack lock at the Level 2 aggregate, repository fingerprint, and lease policy, and the Assurance Plan is formed from the rebound Work Item carrying exactly the three criteria with completion policy all-required-criteria-pass-with-evidence
  - id: S4
    requirement: each criterion is validated by the pinned engine and produces a linked immutable Evidence artifact of the declared type; the deterministic Evidence comes from the real green dashboard-bff unit suite and the real non-regression check, the agent-review Evidence is a distinct typed artifact, and the human-review Evidence is the program owner's explicit authorization record with machine-captured UTC inside the criterion-1 review record
  - id: S5
    requirement: the criterion-to-Evidence matrix covers the deterministic, agent-review, and human-review modes as distinct typed modes with separate provenance and authority, never collapsed into one score
  - id: S6
    requirement: the dashboard-bff suites are classified as validators (unit suite deterministic command; integration suite byte-identity non-regression subject) and the one classified Guard evaluates true; the current Git commit/ship gates and the published implementation revision are referenced once with exact provenance and no second verdict; the coexistence route record is written
  - id: S7
    requirement: with every criterion passed and Evidence-linked, the classified Guard true, no out-of-Scope effect, no unresolved Decision, and the lease held, the engine atomically completes the Work Item (the third exception transition), records the final verified Checkpoint, links all Evidence, and performs the truthful backlog completion write-back; the completion is the program's first Evidence-bound Work completion
  - id: S8
    requirement: the derived index is rebuilt deterministically with zero canonical loss, and the audit ledger's pre-execution bytes are proven to be the exact prefix of its final bytes
  - id: S9
    requirement: the current journal tree is byte-identical before and after execution (digest comparison over every journal run), no dual writer existed at any point, no current journal Run was read into, converted, or completed, and every MI-005/VS-001/VS-001A byte-identity record verifies after execution
  - id: S10
    requirement: the corrected Level 4/5 suites pass in the post-completion real tree (23/23 and 7/7) with the correction bounded to exactly the four assertions; the evidence set is complete, deterministic, and canonically serialized; all isolated fixtures and the rehearsal copy are removed with absence proof; the execution delta remains uncommitted and unstaged with a recorded SHA-256 manifest matching scope_rule exactly

mandatory_failure_scenarios:
  - id: F1
    condition: a criterion has failing, stale, missing, invalid, unsupported, or unavailable Evidence, or Evidence bound to a mismatched repository fingerprint or effort revision
    diagnostic: COMPLETION_GATE_BLOCKED (with the specific typed cause STALE_EVIDENCE, MISSING_EVIDENCE, INVALID_EVIDENCE, UNSUPPORTED_EVIDENCE_MODE, or UNAVAILABLE_EVIDENCE as applicable); completion prohibited
  - id: F2
    condition: an attempt to complete the Work while any criterion is not status passed
    diagnostic: COMPLETION_GATE_BLOCKED; Work returns to validation_failed or blocked, never completed
  - id: F3
    condition: an attempt to complete with a criterion marked passed but no linked immutable Evidence artifact
    diagnostic: COMPLETION_GATE_BLOCKED (missing_evidence)
  - id: F4
    condition: a file effect or completion action outside the bound completion Scope (whose allowed_write_paths are empty)
    diagnostic: OUT_OF_SCOPE_EFFECT blocks the effect and completion
  - id: F5
    condition: an unresolved Decision required by the effort or context blocks completion
    diagnostic: UNRESOLVED_DECISION_BLOCKS_COMPLETION
  - id: F6
    condition: the classified blocking Guard evaluates false (for example a reintroduced dead handler) at completion
    diagnostic: GUARD_BLOCKS_COMPLETION
  - id: F-REBIND-CONFLICT
    condition: the rebinding write finds the Work Item not at revision 2, or its bytes differ from the pinned base digest, or a formation write finds its target path already existing
    diagnostic: REVISION_CONFLICT (or IMMUTABLE_ARTIFACT_EXISTS); execution blocks fail-closed before any further mutation
  - id: F-EXCEPTION-OVERREACH
    condition: any write advancing the Work Item outside the three contracted transitions, or any write to any other pre-existing record under continuity/artifacts/** or .continuity/** (including every byte-identity-listed MI-005 record), or any attempt to resume, reopen, or complete run-mi005
    diagnostic: IMMUTABLE_RECORD_ADVANCEMENT_PROHIBITED; treated as MANIFEST_SCOPE_MISMATCH and UNCONDITIONAL FAIL
  - id: F-AUTO-GUARD
    condition: an attempt to treat a current check as a target Guard, or to mint a Guard from an agent suggestion, without the explicit owner/scope/severity/exception/lifecycle classification
    diagnostic: AUTOMATIC_GUARD_MINTING_PROHIBITED
  - id: F-AUTO-WAIVER
    condition: an attempt to create a Waiver automatically or to render a Waiver as passing Evidence
    diagnostic: AUTOMATIC_OR_DISGUISED_WAIVER_PROHIBITED
  - id: F-NARRATIVE
    condition: an attempt to complete the Work on the strength of a commit message or model narrative alone, without the required typed Evidence
    diagnostic: COMPLETION_GATE_BLOCKED; proves a commit or narrative alone cannot complete Work
  - id: F-STALE-CONTEXT
    condition: start, validate, or complete against a non-authorized, stale, rejected, revoked, or digest-mismatched Context Pack version, adapter view, Level 2 lock, Level 3 scope, or engine asset
    diagnostic: STALE_RUN or UNAUTHORIZED_CONTEXT_DELIVERY
  - id: F-WAIVER-EXPIRY
    condition: a scoped Waiver reaches expiry
    diagnostic: the waived criterion's block reopens; a completion relying on the expired Waiver is blocked
  - id: F10
    condition: attempt to delegate contracted work to any Skill, slash command, /backlog-next, continuity:invoke, or other product executor procedure
    diagnostic: EXECUTOR_DELEGATION_PROHIBITED
  - id: F11
    condition: claim or creation of any MI-007 or Level 6 Decision-and-Learning state — Observation, Lesson, Change Proposal, learning promotion, automatic rule/Guard/Skill/Pack mutation, universal registry, remote source, or Console
    diagnostic: FORBIDDEN_HIGHER_LEVEL_CLAIM
  - id: F12
    condition: any executor or engine write outside the frozen write-set, fixed create paths, and permitted modify set (including any modification of the pinned engine, hooks, Skills, any suite edit beyond the four corrected assertions, or any backlog item other than the one permitted completion write-back)
    diagnostic: MANIFEST_SCOPE_MISMATCH
  fixture_rule: >
    F1 through F6, F-REBIND-CONFLICT, F-AUTO-GUARD, F-AUTO-WAIVER,
    F-NARRATIVE, F-STALE-CONTEXT, and F-WAIVER-EXPIRY are exercised in
    isolated temporary fixtures outside all three repositories with exact
    expected/observed diagnostics, exit codes, fixture digests, and cleanup
    proof; they never mutate the real Run, the real Work Item completion, or
    the repositories. F-EXCEPTION-OVERREACH and F10 through F12 are standing
    prohibitions whose fail-closed behavior is verified structurally.

coexistence:
  rule: >
    Current gates continue independently. The dashboard-bff unit and
    integration suites and the Git commit/ship gates remain the sole
    authorities for their own underlying results. Target Assurance invokes or
    observes them at most once and records exact provenance (argv, cwd role,
    exit code, stdout/stderr digests, revision, freshness). There is no second
    Git or CI verdict, no duplicated external object, and no current check is
    retired by MI-006-R1. A current check retires only after target coverage
    and project authority accept replacement — deferred beyond MI-006-R1.

deterministic_evidence:
  rules:
    - every JSON evidence file uses canonical JSON with recursively sorted object keys, UTF-8, two-space indentation, and one LF terminator
    - every command record contains argv, cwd role, start and end UTC, exit code, stdout SHA-256, stderr SHA-256, and parsed result
    - repository bindings include branch, HEAD, clean state, and observed time for all three repositories, plus the current journal tree digest
    - engine-lock evidence records every engine-lock digest verification and the hook registration digest
    - rebinding-and-formation evidence records the revision-2 base bytes digest, the exact rebinding before/after bytes and field diff, the two formation artifacts by digest, and the formed validation plan by digest
    - criterion evidence records, per criterion, the engine validator, the produced immutable Evidence artifact id/revision/digest, the mode, and the repository fingerprint binding
    - guard evidence records the classified Guard by digest, the validator-versus-Guard classification, and the coexistence route record with each referenced current check's provenance
    - completion evidence records the atomic completion - the final Checkpoint, the three-transition Work Item revision chain with per-revision digests, the linked Evidence set, and the backlog write-back before/after digests
    - published-suite-correction evidence records the four corrected assertions with before/after excerpts and digests and the both-states pass proof
    - scenario evidence records expected diagnostic, observed diagnostic, exit code, fixture digest, and cleanup result
    - waiver evidence records the isolated-fixture Waiver demonstration - authority, scope, expiry, evidence link, distinctness from a pass, and reopen-on-expiry proof
    - criterion evidence references exact source and artifact digests; narrative alone cannot pass a criterion
    - no chat transcript, hidden manual copy, timestamp-dependent artifact ordering, or unrecorded inference is admissible
    - temporary fixtures and copies are outside all three repositories and are removed with absence proof
  required_validation:
    - node --test tests/continuity-level-6.test.mjs returns all tests passing
    - node --test runtime/continuity/test/*.test.mjs exits 0 with zero failures after execution
    - node --test tests/continuity-level-5.test.mjs returns 7/7 after execution with the corrected suite in the real post-completion tree
    - node --test tests/continuity-level-4.test.mjs returns 23/23 after execution with the corrected suite in the real post-completion tree
    - node --test tests/continuity-level-3.test.mjs returns 23/23 after execution
    - node --test tests/continuity-level-2.test.mjs returns 23/23 after execution
    - node --test tests/continuity-level-1.test.mjs returns 14/14 after execution
    - node --test .claude/skills/backlog-next/test/*.test.mjs returns 68/68 after execution without invoking the Skill
    - the dashboard-bff unit suite returns green after execution and the integration-suite files verify byte-identical (recorded as deterministic Evidence)
    - all S1-S10 success scenarios pass
    - all mandatory failure scenarios fail closed with the exact typed diagnostic
    - the current journal tree digest after execution equals the recorded pre-execution digest
    - final Git and digest comparison proves every pre-existing tracked path other than the permitted modify paths equals the exact start revision, and each modified path satisfies its modify_exactly rule
    - the final Nestfolio manifest contains exactly the paths permitted by scope_rule, uncommitted and unstaged, with a recorded SHA-256 manifest
  suite_environment_rule: >
    Because the permitted mutations touch tracked files, any published suite
    that carries a working-tree purity guard runs its after-execution
    validation in an isolated committed validation copy exactly per the
    SE-001-R3 / MI-005 corrected-validation-environment mechanics (throwaway
    commit in a temporary copy outside all three repositories, per-path delta
    digest equality, clean copy status, removal with absence proof); the
    pre-mutation runs and all purity-guard-free suites run in the real working
    tree, and the corrected Level 4/5 suites must ADDITIONALLY pass directly
    in the real post-completion working tree as required above.

preservation_and_rollback:
  before_write: >
    Record exact Git metadata for all three repositories, the complete
    Nestfolio tracked-tree identity, the current journal tree digest, the
    pre-execution bytes and digests of every permitted modify path (including
    the revision-2 Work Item base and the backlog item), all critical
    Level 1-5 and VS-001/VS-001A/MI-005 digests including the full
    byte-identity list, absence of every fixed create path, and a verified
    external recovery ledger outside all repositories. Do not copy backlog
    planning content or secrets into the recovery ledger beyond the digests
    needed for rollback.
  completion_rollback_proof: >
    In an isolated temporary copy only, prove that the full correction is
    reversible before applying it in the real tree: perform the rebinding,
    formation, run lifecycle, and completion in the copy, then restore the
    Work Item to its exact revision-2 base bytes, the backlog item, the two
    corrected suites, and every created path to absence, and show the tree is
    byte-identical to the start revision, no unknown effect is retried, and
    nothing is written into the current journal. The real mutations are
    applied only after this proof.
  execution_failure: >
    If any actual execution condition fails after mutation, restore every
    permitted modify path (including the Work Item to its exact revision-2
    base bytes and the backlog item) to its recorded pre-execution bytes,
    remove only the newly created MI-006-R1 paths, verify Nestfolio is
    byte-identical and clean at the exact published start revision, retain
    diagnostics outside all repositories, and close MI-006-R1 as UNCONDITIONAL
    FAIL in continuity-lab. Never retain partial Level 6 completion authority,
    never leave the Work Item half-advanced (any revision above 2 without the
    completed terminal state is rolled back to the base), and never write into
    the current journal.

permitted_continuity_lab_execution_closure:
  modify:
    - README.md
    - CONTINUITY-NEXT-STEPS.md
    - docs/70-implementation/README.md
    - docs/90-state/artifact-index.md
    - docs/90-state/program-state.md
    - scripts/generate-program-indices.mjs (queue tail text only, if the recorded blocked tail requires it)
    - sessions/MI-006-R1-evidence-bound-completion-existing-work-item-rebinding/context-pack.yaml
    - sessions/MI-006-R1-evidence-bound-completion-existing-work-item-rebinding/session-handoff.md
  create:
    - docs/70-implementation/mi-006-r1-evidence-bound-completion-existing-work-item-rebinding.md
    - sessions/MI-006-R1-evidence-bound-completion-existing-work-item-rebinding/execution-changed-files.txt
  rule: >
    The execution closure records only the one MI-006-R1 result and exact
    execution facts, and performs the DR-0025 closure obligations
    (queue_summary update, index regeneration, --check). All MI-002 through
    MI-006 artifacts and every VS-001/VS-001A/MI-005 record remain immutable.
    Per DR-0024 the closure may be committed and pushed in the executing
    session with a concise subject-only message; the Nestfolio execution delta
    stays uncommitted pending its separate publication authorization.

explicitly_immutable:
  continuity_workspace: [all content during execution]
  continuity_lab_during_execution:
    - all MI-002 through MI-006 artifacts and reports
    - all VS-001 and VS-001A artifacts and reports
    - the MI-006-R1 prompt and contract-authoring manifest
    - every path outside the exact MI-006-R1 execution-closure scope
  nestfolio:
    - every pre-existing tracked path except the permitted modify paths under their modify_exactly rules
    - the entire Git common directory journal/ tree
    - package.json, pnpm-lock.yaml, CLAUDE.md, .claude/settings.json, .claude/skills/**
    - runtime/** including the entire pinned engine runtime/continuity/**
    - docs/backlog/** except the one permitted completion write-back to docs/backlog/dashboard-bff-awaiting-confirmation-activity-gap.md
    - continuity/level-1/** through continuity/level-5/**
    - continuity/evidence/mi-001*/** through continuity/evidence/mi-005/** and continuity/evidence/se-001/** and continuity/evidence/vs001a/**
    - every pre-existing continuity/artifacts/** file except the one immutability_exception record, every pre-existing continuity/bindings/**, continuity/packs/**, continuity/dogfood/**, and .continuity/** file except the two permitted modify paths
    - tests/continuity-level-1.test.mjs through tests/continuity-level-3.test.mjs
    - the dashboard-bff service source and tests (read-only Evidence sources; never modified)

prohibited_actions:
  - execute MI-006-R1 outside authorization_rule
  - inspect or modify Nestfolio content before execution validly starts and session gates pass
  - commit or push the Nestfolio execution delta during execution (isolated-copy throwaway commits under suite_environment_rule and the rehearsal are not real-repository commits); fetch, pull, merge, rebase, reset, checkout, restore, stash, clean, or rewrite history in any real repository during execution
  - modify, repair, relabel, qualify, supersede, re-grade, or reinterpret any recorded historical result or artifact (the MI-006 UNCONDITIONAL FAIL and the MI-005 PASS remain immutable; the immutability_exception advancement is a forward transition, never a rewrite of recorded history)
  - reopen, reuse, resume, convert, re-key, or complete run-mi005 or any VS-001/VS-001A record
  - advance, rewrite, or delete any pre-existing store record other than the one immutability_exception record through its three contracted transitions
  - read, write, convert, import, re-key, or retire any current journal Run beyond the contracted read-only route check and byte-identity proof
  - dual-write any Run across the current journal and the target store, or create a second active Run for the bound effort
  - modify the pinned engine runtime/continuity/**, the hooks, .claude/settings.json, or any Skill; introduce any engine code
  - re-implement, extend, or mutate the selected effort's implementation, its Level 1-5 artifacts, or any dashboard-bff service source
  - mutate any backlog item other than the one permitted completion write-back to the bound effort's item, or rewrite that item's planning narrative
  - edit any published suite beyond the four corrected assertions in the two named test files
  - form, refresh, re-validate, re-authorize, version, or edit any Context Pack or Level 4 artifact
  - start, validate, or complete from any non-authorized, stale, rejected, revoked, or digest-mismatched context, scope, lock, or engine asset
  - collapse deterministic, agent-review, and human-review Evidence into one opaque score, or treat an unavailable external result as a pass
  - mint a Guard automatically from a check or an agent suggestion, or create a Waiver automatically or render it as passing Evidence
  - complete the Work on a commit message or model narrative alone, or force completion past the engine's completion gate
  - create or claim any Observation, Lesson, Change Proposal, Decision, learning promotion, automatic rule/Guard/Skill/Pack mutation, universal registry, remote source, universal ranking, Epic orchestration, intake, themes migration, or Console (MI-007 and beyond)
  - install, remove, or upgrade dependencies, modify package.json, or mutate pnpm-lock.yaml
  - use parallel agents for the contracted Run, or migrate any Epic or additional effort
  - execute MI-007 or any broader or unrelated implementation, or scope MI-007 or later slices

verdict:
  type: conjunctive-unconditional-single-result
  criteria:
    - C1 session gates, engine-lock verification, Level 5/4/3/2 digest verification, the revision-2 base and full byte-identity verification, the run-mi005-closed check, and the route check pass fail-closed before mutation
    - C2 the rebinding write, the two formation writes, and the classified Guard are performed exactly as contracted (expectedRevision fail-closed; exactly the enumerated field changes; three unchanged criteria statements bound with the corrected criterion 2/3 Evidence definitions), and the Assurance Plan is formed by the pinned engine from the rebound Work Item
    - C3 every criterion is validated by the pinned engine and produces a linked immutable Evidence artifact of the declared type, spanning distinct deterministic, agent-review, and human-review modes with separate provenance
    - C4 the dashboard-bff suites are classified as validators, the one classified Guard is authored and evaluates true, current gates and the published revision are referenced once with exact provenance and no second verdict, and the coexistence route record is written
    - C5 the Work Item is atomically Evidence-bound completed through the pinned engine with the final verified Checkpoint, the linked Evidence set, and the truthful backlog write-back, the full three-transition revision chain is recorded, and the completion is reversible-proven before application
    - C6 every mandatory failure blocks with the exact typed diagnostic — including missing/stale/invalid/unsupported/unavailable Evidence, rebind conflict, exception overreach, out-of-Scope effect, unresolved Decision, blocking-Guard-false, automatic Guard minting, automatic/disguised Waiver, narrative-alone completion, and Waiver expiry
    - C7 current journal, Levels 1-5 (as bounded by modify_exactly), every byte-identity record, the pinned engine, and every byte outside the permitted sets remain exact; the corrected Level 4/5 suites pass in the post-completion real tree; deterministic index rebuild, audit prefix preservation, cleanup with absence proofs, and the exact uncommitted final manifest pass
  pass_rule: >
    Issue MI-006-R1 UNCONDITIONAL PASS only if C1-C7, S1-S10, every mandatory
    failure, every precondition, validation, preservation, rollback, cleanup,
    and exact-manifest requirement passes conjunctively and no prohibited
    action occurs.
  fail_rule: >
    Any missing, skipped, ambiguous, stale, mismatched, out-of-scope,
    non-deterministic, partial, or failed condition after valid execution
    start is MI-006-R1 UNCONDITIONAL FAIL. No qualified PASS, partial PASS,
    inferred authorization, silent repair, evidence-only override, historical
    reinterpretation, or history rewrite is permitted.

next_iteration_rule:
  on_pass: >
    Record MI-006-R1 separately; every prior result including the MI-006
    UNCONDITIONAL FAIL remains a separate immutable result. The one
    target-routed effort is Evidence-bound completed at Level 6 Assurance
    scope: trusted completion is a proven bounded guarantee, Guard coexistence
    with current checks is proven, and the MI-007 Decision-and-Learning
    portion remains absent. The Nestfolio execution delta remains uncommitted;
    its publication requires separate explicit authorization. MI-007 (Governed
    Learning and Selective Current-Runtime Retirement) becomes the next
    contractable slice; it remains unauthorized until separately contracted,
    reviewed, published, and explicitly executed.
  on_fail: >
    Preserve all separate results and keep MI-007 blocked. Select only a newly
    bounded correction or explicit review supported by the failure evidence.
    Do not broaden scope.

completion_criteria:
  - internally consistent MI-006-R1 contract authored, reviewed by the human program owner, and published on continuity-lab main in one DR-0024 session
  - execution not started in the authoring phase; the only Nestfolio interactions of the authoring session are the recorded bounded targeted grounding reads and the isolated scout copy outside all three repositories (since removed)
  - the single immutability exception, the formation exception, the rebinding write, the Assurance Plan, the corrected criterion-to-Evidence matrix, the Guard classification, the Waiver path, the atomic completion, the coexistence route record, and the bounded published-suite correction are defined by this contract as the migration plan and the MI-006 failure evidence require
  - the existing Work Item is bound to the three unchanged Level 3 criteria; the pinned engine is used unmodified; the MI-006 FAIL, the MI-005 PASS, and every other recorded result remain unrepaired, unrelabeled, and unreinterpreted
  - the completion write-back is bounded to the one effort's backlog tracking fields, is truthful, and is reversible during execution
  - all eleven prior immutable results and the SE-001-PUB and MI-005-PUB publication records remain immutable
  - DR-0025 closure obligations performed at session closure (queue_position 33, queue_summary, index regeneration, --check exit 0)
  - execution handoff saved to ~/continuity-handoffs/ with the exact published revision and a fully resolved launch command
