objective:
  primary_question: >
    Can the one target-routed Work effort be Evidence-bound completed — moved
    to a trusted target completed state through the pinned engine — when its
    Work Item id is permanently occupied by the immutable in_progress MI-005
    record, by granting exactly one bounded, explicit immutability exception
    (the contracted advancement of that single record) and one bounded
    formation exception (contracted direct authoring of a new completion Scope
    and Working Set, the exact preparation mechanism MI-005 itself used and
    evidenced), such that every declared completion criterion has accepted
    typed Evidence spanning deterministic, agent-review, and human-review
    modes, the classified Guard coexists with current checks without automatic
    minting, completion is blocked fail-closed on any missing or invalid
    Evidence, and neither a commit nor a model narrative alone can complete
    the Work — while every OTHER MI-005, VS-001, VS-001A, and Level 1-5 record
    remains byte-identical, run-mi005 is never reopened, and no MI-007
    Decision-and-Learning state is created or claimed?
  completion_boundary: >
    Implement and validate only the Level 6 Assurance portion — Evidence-bound
    completion and Guard coexistence — for the one already selected, already
    implemented, already Level-5-run effort, through the pinned engine
    unmodified. Do not re-implement or mutate the effort's implementation or
    any other backlog source. The permitted canonical mutations are exactly:
    the single immutability-exception advancement of the effort's existing
    Work Item artifact, the engine's atomic completion write-back of this one
    effort's backlog tracking fields, the append-only audit ledger, the
    derived index rebuild, and the bounded completion-aware correction of the
    four published suite assertions enumerated in published_suite_correction.
    Do not create, claim, or record any Observation, Lesson, Change Proposal,
    Decision, learning promotion, Guard minting from an agent suggestion,
    universal registry, remote source, Console, or Level 6
    Decision-and-Learning state (MI-007). Do not modify the pinned engine,
    hooks, or any Skill. Do not read, write, convert, import, re-key, or
    retire any current journal Run beyond the contracted read-only route check
    and byte-identity proof. Do not reopen, reuse, resume, or complete
    run-mi005. Do not begin MI-007 or broader work.

engine_binding:
  rule: >
    The store engine is the pinned read-only implementation at
    runtime/continuity/** (lib including workflow.mjs and store.mjs,
    adapters/claude-code including cli.mjs and the SessionStart/SessionEnd
    hooks, tools, tests) together with the hook registration in
    .claude/settings.json, exactly as pinned and verified by MI-005 and
    re-verified by MI-006 (aggregate engine digest
    7e31ff56a10ca6b1715b29f02132e66c80e321921b41dcb55329db2e0f320a38; hook
    registration digest
    73387f347f43d0f6a154f83ed54c3bdaee0e0b6ba6dbf3120ebf5b8c28834378; settings
    999e828d22fcf1cf1e66eb81260a4f8ff3a36b2387adf117ca84602e65c2c6b7).
    MI-006-R1 introduces no engine code and changes no engine byte. The
    engine's own store API (createStore(root).writeArtifact from the pinned
    runtime/continuity/lib/store.mjs, imported unmodified as a library) is the
    sole permitted mechanism for the three contracted non-engine store writes
    (the rebinding write and the two formation writes), giving each write the
    engine's envelope, digest, and expectedRevision fail-closed conflict
    detection. The Run lifecycle — startRun, validateRun, completeRun — is
    invoked only through the pinned adapter CLI
    (runtime/continuity/adapters/claude-code/cli.mjs) or the pinned workflow
    API, unmodified, with recorded argv/provenance. Before any mutation the
    executor records the exact SHA-256 of every engine file and of
    .claude/settings.json into continuity/level-6/engine-lock.json and
    verifies them against the bound revision; a mismatch blocks fail-closed
    with ENGINE_ASSET_MISMATCH. If the pinned engine cannot satisfy this
    contract without a write outside the permitted sets, execution blocks
    fail-closed with ENGINE_POLICY_MISMATCH and MI-006-R1 closes UNCONDITIONAL
    FAIL without repair or engine modification.
  engine_verified_in_authoring: >
    The authoring session verified against the pinned engine source and the
    committed Nestfolio state at eafa09b8 that the MI-006 recorded root cause
    holds exactly (selectWork writes work-items with expectedRevision 0 and
    the artifact exists at revision 2 in_progress; completeRun's
    updateBacklogItem forces workItem.id to equal the effort backlog id), that
    run-mi005's immutable validation plan carries only the dogfood criterion
    mi005-keyed-effect-materialized (so resuming and completing run-mi005
    would validate the wrong criteria and is NOT the correction path), and
    that the full corrected path — rebinding write with expectedRevision 2,
    formation of the new Scope and Working Set, startRun forming the
    validation plan from the three rebound criteria, validateRun, and
    completeRun with the truthful backlog write-back — executes end-to-end
    through the pinned engine unmodified, proven in an isolated scout copy
    outside all three repositories (since removed).
  level_6_binding_artifact: >
    continuity/level-6/completion-binding.json declares, in canonical JSON:
    the target Work Item identity, store path, pinned revision-2 base digest,
    and the exact contracted revision-by-revision advancement (rev 3 rebinding
    write, rev 4 engine startRun, rev 5 engine completeRun); the bound effort,
    Context Pack, Level 2 lock, Level 3 scope, and repository revision
    digests; the criterion-to-Evidence-mode matrix with the corrected
    criterion 2/3 deterministic Evidence definition; the validator-versus-
    Guard classification with the Guard's full metadata; the Waiver policy;
    the coexistence route record for the referenced current checks and
    external gates; the atomic-completion policy; the backlog write-back
    before/after digests; the four corrected published suite assertions with
    their before/after semantics; and the explicit statement that no MI-007
    Decision-and-Learning state is created. tests/continuity-level-6.test.mjs
    validates this binding deterministically against the repository and the
    produced target artifacts.

