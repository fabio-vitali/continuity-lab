  scope_rule: >
    On PASS the Nestfolio diff from the exact start revision must contain
    exactly: the implementation and test paths changed inside the recorded
    writable boundary, and the fifteen evidence additions above — with no
    staged path and no other modified, deleted, renamed, or additional
    path. Every pre-existing tracked byte outside the recorded writable
