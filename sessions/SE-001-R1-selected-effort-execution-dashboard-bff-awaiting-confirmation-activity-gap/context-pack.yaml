  - execute from any non-authorized, stale, rejected, or revoked Context Pack version
  - mutate the backlog source, any Level 3 artifact, status, priority, dependency, rank, or external object
  - mutate any path outside the recorded writable boundary and exact evidence create set
  - delegate contracted implementation to any Skill, /backlog-next, continuity:invoke, or other product executor procedure
  - install, remove, or upgrade dependencies, modify package.json, or create package-lock.json
  - create automatic bidirectional synchronization or external writes beyond the recovery ledger and diagnostics
  - claim completion, record completion state, or create a Session, Run, Checkpoint, Handoff, effect record, Assurance Plan, Evidence authority, Guard, Waiver, Decision, Observation, Lesson, Change Proposal, Level 5-6 state, registry, remote source, universal ranking, Epic orchestration, intake, or themes migration
  - promote Nestfolio behavior into reusable Pack or Framework Core authority
  - execute MI-005 through MI-007 or any broader or unrelated implementation, or scope MI-005 or later slices

verdict:
  type: conjunctive-unconditional-single-result
  criteria:
    - C1 session gates pass and digest-matched authorized-context delivery authority is verified fail-closed
    - C2 deterministic frozen writable boundary with recorded three-derivation rebuild and complete pre-mutation preservation ledger
    - C3 implementation satisfies every bound completion criterion with recorded fail-before/pass-after gap proof
    - C4 every mandatory failure blocks with the exact typed diagnostic
    - C5 backlog source, Level 1-4 artifacts, MI evidence, dependencies, and every pre-existing byte outside the recorded boundary remain exact
    - C6 authority, route, active Level 4 guarantee, and absent Level 5-6 state are observable, truthful, and unambiguous
    - C7 deterministic rebuilds, source-preserving return and cancel proofs, cleanup, exact final manifest, and the uncommitted unstaged delta with recorded SHA-256 manifest pass
  pass_rule: >
    Issue SE-001-R1 UNCONDITIONAL PASS only if C1-C7, S1-S10, F1-F12, every
    precondition, validation, preservation, rollback, cleanup, and
    exact-manifest requirement passes conjunctively and no prohibited
    action occurs.
  fail_rule: >
    Any missing, skipped, ambiguous, stale, mismatched, out-of-scope,
    non-deterministic, partial, or failed condition after valid execution
    start is SE-001-R1 UNCONDITIONAL FAIL. No qualified PASS, partial PASS,
    inferred authorization, silent repair, evidence-only override,
    historical reinterpretation, or history rewrite is permitted.

next_iteration_rule:
  on_pass: >
    Preserve MI-002-R2, MI-003, MI-003-R1, and MI-003-R2 as four separate
    immutable results and MI-004 as a separately recorded result. Record
    SE-001-R1 separately; SE-001 remains published-superseded with no
    result. The implementation delta becomes publishable only through the
    separately authorized publication with the exact subject "Publish
    SE-001 selected effort implementation and evidence". Completion,
    Assurance, Run, and Learning authority remain absent; MI-005 remains
    unauthorized until separately contracted and executed.
  on_fail: >
    Preserve all separate results and keep MI-005 blocked. Select only a
    newly bounded correction or explicit review supported by the failure
    evidence. Do not broaden scope.

completion_criteria:
  - internally consistent SE-001-R1 contract authored, reviewed, and published in one DR-0024 session
  - every product-level binding carried forward unchanged from SE-001 and bound by exact digest
  - SE-001 superseded without any byte change to its artifacts
  - implementation occurs only in a separately instructed execution session under this contract
  - MI-002-R2 PASS, MI-003 FAIL, MI-003-R1 FAIL, MI-003-R2 PASS, and MI-004 PASS remain separate immutable results
  - execution handoff saved to ~/continuity-handoffs/ with the exact published revision and a fully resolved launch command
