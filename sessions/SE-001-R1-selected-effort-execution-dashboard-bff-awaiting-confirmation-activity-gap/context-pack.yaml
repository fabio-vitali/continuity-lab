context_delivery_authority:
  delivery_rule: >
    SE-001-R1 execution input is exclusively the digest-matched adapter
    view of the authorized Context Pack version 1. Before any mutation the
    executor must verify with recorded evidence: the context-pack.json
    whole-artifact SHA-256 equals the bound context_pack_sha256; the
    validation result records valid 18/18 on that exact digest; the
    authorization record SHA-256 equals the bound
    authorization_record_sha256 and names exactly that identity, version,
    and digest; the adapter view SHA-256 equals the bound
    adapter_view_sha256 and digest-links to the authorized pack; and no
    staleness, rejection, or revocation disposition exists. Absence,
    multiplicity, mismatch, or an inferred substitute blocks fail-closed.
  no_reformation_rule: >
    SE-001-R1 never forms, refreshes, re-validates, re-authorizes, or
    versions any Context Pack, and never edits any Level 4 artifact. A
    stale, revoked, or digest-mismatched context blocks execution; the only
    recovery is a separately contracted later operation.
  truthful_guarantees_rule: >
    Per DR-0019, SE-001-R1 reports Level 4 as the active guarantee level
    and states explicitly that Level 5-6 guarantees (resumable Runs,
    Evidence-bound completion, Assurance, Learning) are absent.
    Implementing the selected effort is not a Continuity-trusted completion
    claim; the backlog source and Level 3-4 artifacts record no completion
    state change in SE-001-R1.

implementation_boundary:
  derivation_rule: >
    Before any mutation, derive the exact writable path set from the
    published, digest-pinned Level 3 scope.json and working-set.json as
    carried and delivered by the authorized Context Pack adapter view. The
    derivation is deterministic (algorithm identity
    se001-writable-boundary@1), records every considered declaration with
    its source digest, expands to exact repository-relative file paths in
    bytewise order, distinguishes existing paths from to-be-created paths,
    and rebuilds byte-identically across three derivations. The recorded
    boundary is frozen before the first mutation.
  boundary_scope_rule: >
    The writable boundary may contain only Nestfolio implementation and
    test paths declared by the bound Scope and Working Set for the selected
    effort. It never contains the backlog source, any continuity/level-1
    through level-4 path, any continuity/evidence path, package.json,
    package-lock.json, CLAUDE.md, any .claude path, any .git path, or any
    path of another effort. A derivation yielding such a path, an empty
    set, or a non-deterministic set blocks fail-closed before mutation.
  mutation_rule: >
    Every SE-001-R1 content mutation must target a recorded
    writable-boundary path or an exact contracted evidence create path.
    Modification of existing bytes is permitted only inside the recorded
    writable boundary and only as required by the bound completion
    criteria. Everything else is immutable, byte-for-byte, for the whole
    execution.
  gap_proof_rule: >
    The implementation must include a validation that demonstrates the
    awaiting-confirmation activity gap named by the bound effort source: in
    an isolated temporary copy at the exact start revision the validation
    fails, demonstrating the gap; after implementation, in the working
    tree, the same validation passes. Both runs are recorded with exact
    commands and digests. If the bound sources prove the gap cannot be
    demonstrated this way, the mismatch blocks fail-closed and SE-001-R1
    closes as UNCONDITIONAL FAIL without repair.

