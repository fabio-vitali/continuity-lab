objective:
  primary_question: >
    Can the already selected backlog effort
    dashboard-bff-awaiting-confirmation-activity-gap be implemented in
    Nestfolio as one bounded, explicitly authorized repository change —
    consuming exactly the digest-matched adapter view of the authorized
    Level 4 Context Pack version 1, mutating only the writable boundary
    deterministically derived from the published Level 3 Scope and Working
    Set as carried by that Context Pack, proving the pre-existing
    awaiting-confirmation activity gap with a fail-before/pass-after
    validation, preserving every byte outside the boundary including all
    published Level 1-4 artifacts and the backlog source, and passing every
    contracted validation — while no Session, Run, Checkpoint, Handoff,
    Assurance, completion, Decision, Learning, or Level 5-6 authority is
    created or claimed and Levels 1-4 continue truthfully?
  completion_boundary: >
    Implement and validate only the bounded repository change described by
    the bound selected-effort source as scoped by the published Level 3
    Scope, Working Set, and completion criteria carried in the authorized
    Context Pack, plus the exact SE-001 evidence set. Do not mutate the
    backlog source, any Level 3 or Level 4 artifact, or any byte outside
    the recorded writable boundary and evidence set. Do not record
    completion, Assurance, Run, or any Level 5-6 state. Do not begin MI-005
    through MI-007 or broader work.

session_gates:
  rule: >
    Per DR-0024, before execution starts: continuity-workspace,
    continuity-lab, and Nestfolio are on main with clean working trees;
    continuity-lab HEAD is the exact published revision named by the
    execution instruction and contains this contract; Nestfolio HEAD is
    a760d6f41ff14491d5b008a7f13234ba0221bcec, the published MI-004 revision
    holding the Level 3 and Level 4 artifacts and the active route. Every
    published Level 1-4 artifact and every recorded historical result is a
    read-only input. A wrong branch, dirty tree, or missing contract stops
    the session before any Nestfolio mutation. No multi-way alignment
    gates, remote-ref checks, or byte-level authoring manifests apply.

executor_identity:
  session_executor: >
    The SE-001-R1 execution session is conducted directly by Claude Code
    operating under the human's explicit execution instruction.
  sub_agent_rule: >
    Per DR-0024 the executor may use its own sub-agents and tools for
    mechanical work at its discretion. Delegating the contracted
    implementation to the product's executor procedures — any Skill,
    /backlog-next, continuity:invoke — remains prohibited; F10 applies.
    Running node for tests, validation, and the published continuity
    tooling's own checks is direct work, not delegation.

required_context_consumption:
  rule: >
    The exclusive execution input for the selected effort is the
    digest-matched adapter view of authorized Context Pack version 1, as
    bound under context_delivery_authority. The executor additionally
    consults, with targeted reads at its discretion: continuity-lab
    docs/90-state/program-state.md, this contract, the bound backlog
    source, and the published Level 3 scope.json and working-set.json as
    carried by the Context Pack. Per DR-0024 no exhaustive complete-read
    protocol applies; product-side digest verification below is unaffected.

