    purpose: Governs canonical ownership, contradiction handling, Decision Records, artifact lifecycle, and review.
  - order: 3
    path: docs/00-governance/design-levels.md
    purpose: Defines L5 migration ownership and prevents silent changes to L1, L3, L4, or L6 concerns.
  - order: 4
