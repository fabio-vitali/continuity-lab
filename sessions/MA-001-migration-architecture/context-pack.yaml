  - order: 11
    path: docs/90-state/artifact-index.md
    purpose: Provides canonical status, ownership, and active versus historical artifact classification.
  - order: 12
    paths:
      - decisions/DR-0012-repository-native-agentic-development-framework.md
      - decisions/DR-0013-bounded-agent-work-core.md
      - decisions/DR-0014-repository-local-canonical-state.md
      - decisions/DR-0015-concrete-integration-ports-and-claude-code-adapter.md
      - decisions/DR-0016-pack-manifests-procedures-and-executor-assets.md
      - decisions/DR-0017-govern-assurance-and-learning-promotion.md
      - decisions/DR-0018-validate-through-vs-001-before-broader-migration.md
      - decisions/DR-0019-cumulative-adoption-with-explicit-guarantee-levels.md
