contract:
  status: authorized
  authored_on: 2026-07-14
  authority:
    - docs/90-state/program-state.md
    - decisions/DR-0022-authorize-ma-001-after-g4-pass.md
    - sessions/PX-001-product-experience/session-handoff.md
  execution_rule: >
    This contract authorizes MA-001 — Migration Architecture only. It does not
    execute MA-001, create the migration plan, decide G5, authorize an
    implementation slice, or permit migration implementation.
  canonical_memory_rule: >
    The uploaded continuity-lab repository is the only canonical project
    memory. Prior chats, hidden executor state, transcripts, local notes, and
    the Nestfolio repository are not canonical inputs.

iteration:
  id: MA-001
  name: Migration Architecture
  type: migration-architecture-design
  design_level: L5
  gate: G5
  status: authorized-not-started

objective:
  primary_question: >
    Can the accepted TA-002 architecture and PX-001 Product Experience be
    introduced incrementally and reversibly from the validated current
    runtime, with independent-value slices, explicit compatibility and
    rollback, preserved authority boundaries, and no big-bang rewrite?
  required_outcome: >
    Produce a complete L5 migration architecture, evaluate it through the
    required scenarios and methods, issue an unconditional G5 PASS or FAIL,
    and authorize exactly one evidence-justified next iteration.

verified_authorization_preconditions:
  - TA-002 is complete and G3 is passed and valid.
  - VS-001 is complete and its historical FAIL remains preserved.
  - VS-001A is complete with PASS and G6 is passed on the combined VS-001 and VS-001A evidence.
  - PX-001 is complete with unconditional PASS and G4 is passed and valid.
  - the accepted Product Experience is canonical.
  - DR-0022 authorizes MA-001 as the sole next iteration.
  - MA-001 has not been executed and no G5 result exists.
  - migration implementation, broader implementation, later vertical slices, Console implementation, universal integrations, hosted-service work, commercial-control-plane work, and broad Nestfolio migration remain blocked.

execution_authorization_check:
  first_read: docs/90-state/program-state.md
  rule: >
    Before any design work or file modification, verify every authorization
    precondition above against canonical Program State. If any condition is
    inconsistent, apply the canonical contradiction rule: stop without
    modifying files, report the inconsistency, identify the owning artifacts,
    and do not silently choose an interpretation.

active_contract_input:
  path: sessions/MA-001-migration-architecture/context-pack.yaml
  rule: >
    Read this active contract after authorization verification and before the
    ordered design evidence. Preserve it during execution and append a clearly
    separated final_result section rather than rewriting the original input,
    method, output, exclusion, or acceptance contract after the outcome is
    known.

ordered_canonical_inputs:
  - order: 1
    path: docs/00-governance/product-development-operating-model.md
