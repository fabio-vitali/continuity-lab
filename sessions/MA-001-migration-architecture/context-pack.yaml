    purpose: Provides validated repository mechanics, failure evidence, historical FAIL, and bounded-slice limitations that migration must preserve accurately.
  - order: 9
    path: docs/70-implementation/vs-001a-claude-code-session-confirmation.md
    purpose: Provides genuine Claude Code session, checkpoint, handoff, fresh-session resume, deduplication, and G6 evidence.
  - order: 10
    path: docs/90-state/program-state.md
