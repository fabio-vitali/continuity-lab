failure_containment:
  pre_installation_failure: >
    Stop without modifying Nestfolio and record unconditional FAIL only in the
    permitted continuity-lab closure artifacts.
  post_installation_failure: >
    Restore the exact starting SKILL.md bytes
    (SHA-256 0de07500cad6a05ee14842edc4375a508d55beb7b318b1a387c0e2b99ff42620,
    33164 bytes), verify restoration, leave all other protected paths unchanged,
    and issue unconditional FAIL. Failure to restore is itself unconditional
    FAIL and must be reported explicitly.

verdict:
  type: conjunctive-unconditional
  pass_rule: >
    PASS is permitted only if the exact intended SKILL.md is recovered by
    byte-for-byte extraction from a proven preserved original MI-001
    implementation artifact, verifies as SHA-256
    9ff3b13cc3f422c6845c8e49a7662ea51f5f12713f4a610f967463973391fa90
    and 33928 bytes before and after installation, is the sole Nestfolio
    implementation change, all 19 locked assets verify against the unchanged
    lock, the independently recomputed aggregate digest equals
    7a4061778f9e89e98cc5c4e3c73ca9990ca4a71838f0cd7af245ffd4d2430602,
    every required command and test succeeds, protected paths are preserved,
    and the exact changed-file manifest contains no unpermitted path.
  fail_rule: >
    Missing or unprovable original-artifact provenance, unavailable exact bytes,
    digest or byte-size mismatch, any reconstruction, any lock change, any
    unpermitted file change, any incomplete or failed verification, any Skill or
    Level 1 invocation, any C1 or C3 claim, any Level 2-6 claim, or any failure
    to preserve or restore protected paths requires unconditional FAIL.
  no_partial_credit: true

explicit_non_goals:
  - invoking /backlog-next
  - proving genuine active-boundary invocation
  - proving direct-current invocation after disable
  - claiming or changing MI-001 C1 or C3
  - changing the Pack lock, Pack manifest, Procedure contract, project binding, activation, CLAUDE.md, package scripts, adapters, services, or tests
  - redesigning or reconstructing the Skill preflight
  - changing backlog, checks, journal, runtime content, or any other Skill asset
  - disabling or removing Level 1
  - Level 2-6 state, guarantee, or implementation
  - broader Nestfolio migration or unrelated correction
  - Console, hosted services, universal integrations, RBAC, analytics, billing, packaging, or commercial control plane

required_outputs:
  continuity_lab:
    - completed MI-001B context pack with appended result
    - preserved executable prompt
    - completed evidence-linked session handoff
    - canonical MI-001B implementation-validation report
    - updated Program State
    - updated Artifact Index
    - updated implementation orientation
    - updated repository orientation
    - updated next-step instructions
  nestfolio_on_pass:
    - exact restored .claude/skills/backlog-next/SKILL.md
    - narrowly scoped MI-001B evidence records
    - exact changed-file manifest
  return:
    - complete updated ZIP archives for every modified repository
    - exact changed-file manifests
    - validation commands and results
    - unconditional PASS or FAIL
    - exactly one selected next iteration or an explicit blocked state if no iteration is justified

next_iteration_rule:
  on_pass: >
    A PASS may select exactly one subsequent genuine active-boundary and
    direct-current Claude Code invocation confirmation iteration with status
    selected-contract-required. It must not author, authorize, or execute that
    confirmation automatically. MI-002 must remain blocked.
  on_fail_unavailable_or_unproven_bytes: >
    Select only a separately contract-required candidate-reconstruction or
    evidence-recovery iteration when canonically justified. Do not reconstruct
    inside MI-001B and do not select MI-002.
  on_other_fail: >
    Select at most one narrowly corrective identity-restoration follow-up or
    architecture review. Do not select MI-002.

blocked_until_completion:
  - every genuine invocation confirmation iteration
  - MI-002 through MI-007
  - all broader implementation and migration
  - Console, hosted services, universal integrations, and commercial work
  - broad or unrelated Nestfolio changes
