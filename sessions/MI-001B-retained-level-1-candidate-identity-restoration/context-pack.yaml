preserved_original_artifact_binding:
  artifact_role: >
    The original modified Nestfolio implementation-candidate archive produced
    and returned by the MI-001 execution, before the later incomplete candidate
    application commit omitted the SKILL.md modification.
  canonical_content_binding:
    source_revision: 3aa8f4773955541415f615abd80a0a9702bcb416
    source_archive_sha256: 0ff27fc97261b3e782d39af2e563c0a785593f0ba4c3ac5474f20bef42ec13be
    required_mi001_manifest_entries: 15
    required_modified_entry: .claude/skills/backlog-next/SKILL.md
    required_skill_sha256: 9ff3b13cc3f422c6845c8e49a7662ea51f5f12713f4a610f967463973391fa90
    required_skill_bytes: 33928
    required_asset_count: 19
    required_aggregate_lock_digest: 7a4061778f9e89e98cc5c4e3c73ca9990ca4a71838f0cd7af245ffd4d2430602
  provenance_rule: >
    The source must be the preserved original MI-001 output artifact itself, or
    a byte-identical preserved copy with a provable chain to that output. A
    filename, recollection, newly assembled directory, reconstructed patch,
    inferred prose, generated preflight, later working tree, or arbitrary file
    that merely happens to hash correctly is not sufficient provenance.
  canonical_limit: >
    The supplied continuity-lab closure records the MI-001 input archive
    identity, the exact MI-001 changed-file manifest, the intended SKILL.md
    digest and byte size, and the complete retained candidate identity, but it
    does not contain the original output archive and does not record an
    archive-level SHA-256 for that output. Therefore execution must establish
    original-artifact provenance from preserved MI-001 delivery evidence before
    extraction. If that provenance cannot be proven, stop without modifying
    Nestfolio and issue unconditional FAIL.
  no_reconstruction_rule: >
    Do not recreate, edit, patch, regenerate, normalize, reformat, or derive
    SKILL.md from memory, chat, diffs, inferred prose, tests, the lock, or a new
    design. Only byte-for-byte extraction from the proven preserved original
    MI-001 implementation artifact is admissible.

required_execution_sequence:
  - id: authorization-and-clean-start
    actions:
      - read docs/90-state/program-state.md first and apply the contradiction rule
      - record the exact clean committed continuity-lab execution revision
      - record the exact clean committed Nestfolio starting revision
      - prove the Nestfolio implementation baseline is b7d597ac and any later difference is limited to MI-001A evidence
      - capture initial worktree status and protected-path hashes
  - id: prove-original-artifact
    actions:
      - identify the preserved original MI-001 implementation candidate artifact
      - record its path or storage reference, immutable archive SHA-256, byte size, timestamps, and available original delivery provenance
      - prove its chain to the MI-001 execution output and the canonical MI-001 source binding
      - stop without Nestfolio modification if provenance is unavailable, ambiguous, reconstructed, or contradictory
  - id: extract-and-verify-before-installation
    actions:
      - extract only .claude/skills/backlog-next/SKILL.md into an isolated temporary location
      - preserve bytes exactly with no newline, encoding, metadata, or formatting transformation
      - verify SHA-256 9ff3b13cc3f422c6845c8e49a7662ea51f5f12713f4a610f967463973391fa90
      - verify exact byte size 33928
      - stop without Nestfolio modification if either check fails
  - id: single-file-installation
    actions:
      - replace only .claude/skills/backlog-next/SKILL.md with the verified extracted bytes
      - do not alter continuity/level-1/pack-lock.json or any other identity asset
      - verify immediately after installation the expected SHA-256 and byte size
      - record that SKILL.md is the sole implementation change
  - id: complete-verification
    actions:
      - verify all 19 locked assets against the unchanged lock
      - independently recompute and verify the aggregate lock digest
      - run continuity:doctor
      - run continuity:inspect
      - run continuity:verify
      - run the Level 1 test suite
      - run the existing /backlog-next Skill tests
      - compare all protected paths against the starting baseline, permitting only the intended SKILL.md change and MI-001B evidence files
      - produce the exact changed-file manifest
  - id: verdict-and-closure
    actions:
      - issue exactly one unconditional PASS or FAIL
      - do not invoke /backlog-next or the Level 1 invoke path
      - do not run genuine invocation confirmation
      - do not claim C1 or C3
      - update only the contract-permitted continuity-lab closure files
      - select at most one subsequent separately contracted iteration under the next-iteration rule

required_commands_and_outputs:
  required_commands:
    - git status --short
    - npm run -s continuity:doctor
    - npm run -s continuity:inspect
    - npm run -s continuity:verify
    - node --test tests/continuity-level-1.test.mjs
    - node --test .claude/skills/backlog-next/test/*.test.mjs
  forbidden_commands_or_actions:
    - npm run continuity:invoke
    - npm run -s continuity:invoke
    - /backlog-next
    - genuine Claude Code Skill invocation confirmation
    - npm run continuity:disable
    - npm run continuity:activate
    - removal or disabling of Level 1
  output_capture:
    - exact command
    - UTC start and end timestamps
    - exit status
    - stdout and stderr
    - tool and runtime versions relevant to reproducibility
    - repository revisions and clean-status records
    - before and after hashes
    - exact changed-file manifest
  environment_rule: >
    Every required verification must succeed. A test environment limitation,
    missing dependency, unsupported runtime, skipped test, or inconclusive
    result does not count as PASS and must not be repaired by changing package
    scripts, dependencies, tests, or implementation inside MI-001B.

