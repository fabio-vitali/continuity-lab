iteration:
  id: MI-001B
  name: Retained Level 1 Candidate Identity Restoration
  type: corrective-candidate-identity-restoration
  design_level: L7
  product_experience_level: 1
  status: authorized-not-started
  completion_gate: unconditional-mi-001b-decision
  sole_purpose: >
    Restore the exact intended MI-001 bytes of
    .claude/skills/backlog-next/SKILL.md so that the retained committed Level 1
    implementation candidate coherently matches its already-recorded lock and
    identity, without redesign, reconstruction, invocation, or broader change.

objective:
  primary_question: >
    Can the exact intended MI-001 SKILL.md bytes be recovered from the proven
    preserved original MI-001 implementation candidate artifact and installed
    as the sole Nestfolio implementation change, producing the already-recorded
    locked identity and passing every bounded verification?
  expected_file:
    path: .claude/skills/backlog-next/SKILL.md
    sha256: 9ff3b13cc3f422c6845c8e49a7662ea51f5f12713f4a610f967463973391fa90
    bytes: 33928
  delivered_mismatched_file:
    sha256: 0de07500cad6a05ee14842edc4375a508d55beb7b318b1a387c0e2b99ff42620
    bytes: 33164

canonical_authorization_preconditions:
  - MA-001 completed with unconditional PASS and G5 remains passed and valid.
  - MI-001 completed with unconditional FAIL.
  - MI-001A completed with unconditional FAIL.
  - MI-001A failed before genuine Skill invocation because the retained committed Nestfolio candidate did not match its locked identity.
  - .claude/skills/backlog-next/SKILL.md was the sole locked-asset digest mismatch.
  - the Level 1 boundary failed closed correctly with ASSET_DIGEST_MISMATCH.
  - /backlog-next was not invoked.
  - Scenario B was not executed.
  - MI-001B is the sole authorized execution iteration with status authorized-not-started.
  - MI-001B has not executed and its result is pending.
  - MI-002 through MI-007 and all broader work remain blocked.

