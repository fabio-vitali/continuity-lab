    - continuity-workspace/output/MI-001D/nestfolio-MI-001D-<result>-<UTC timestamp>.zip on PASS only
  no_other_closure_write: true

next_iteration_rule:
  on_pass: >
    Select only MI-001E — Superseding Candidate Genuine Claude Code Invocation
    Confirmation, status selected-contract-required. MI-001E must receive a
    separate reviewed contract. Do not authorize or execute it in MI-001D, and
    do not authorize MI-002.
  on_fail: >
    Select only MI-001D-R1 — Retained Level 1 Candidate Deliberate Supersession
    Correction, status selected-contract-required, unless the failure is an
    authorization contradiction that stopped before MI-001D started. Do not
    select invocation confirmation or MI-002.

required_outputs:
  - exactly one unconditional MI-001D result after valid execution start
  - completed Context Pack with appended immutable execution closure
  - completed session handoff and canonical MI-001D report
  - updated permitted canonical program artifacts
  - exact continuity-lab and Nestfolio changed-file manifests
  - complete repository ZIP deliverables under continuity-workspace/output/MI-001D
  - exactly one selected contract-required next iteration

