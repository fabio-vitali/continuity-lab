    - continuity/level-1/src/core.mjs
    - continuity/level-1/src/repository-infrastructure.mjs
    - package.json
    - tests/continuity-level-1.test.mjs
  create:
    - continuity/evidence/mi-001d/supersession-record.json
    - continuity/evidence/mi-001d/validation-result.json
    - continuity/evidence/mi-001d/commands/*.json
  scope_rule: >
    Change the smallest subset needed. Every changed path must be in this list
    and must be justified by the 1.0.1 supersession or its deterministic
    evidence. No backlog, check, journal, runtime, dependency lockfile, unrelated
    Skill, or application source may change. Do not commit or push Nestfolio.
  evidence_rule: >
    Evidence files must be deterministic JSON without transcripts, secret data,
    raw Skill contents, or assertions unsupported by captured commands.

required_execution_sequence:
  - id: authorization-and-clean-start
    actions:
      - read docs/90-state/program-state.md first
      - read this Context Pack and prompt from the exact authorized continuity-lab revision
      - verify both repository bindings and clean states before inspection or mutation
      - confirm the four unconditional FAIL results and every blocked-work statement
      - capture tool versions and UTC start time
  - id: baseline-identity-capture
    actions:
      - independently verify the retained 1.0.0 identity fields and all 19 lock entries
      - verify the coherent aggregate lock digest and the one delivered Skill mismatch
      - capture protected-path hashes and exact pre-change Git status
      - prove no original MI-001 artifact or recovered-byte claim is being used
  - id: author-new-superseding-candidate
    actions:
      - create only the deliberate 1.0.1 identity defined by this contract
      - author any required visible Level 1 Skill preflight as new MI-001D content
      - compute a fresh exact 19-asset lock from final 1.0.1 behavior-authority bytes
      - update all bounded identity and diagnostic surfaces consistently
      - preserve Level 2-6 absence and current backlog-next procedure behavior
  - id: deterministic-validation
    actions:
      - independently recompute every asset SHA-256, byte size, count, and aggregate lock digest
      - run doctor, inspect, and verify only; do not run invoke
      - run the Level 1 test suite and existing backlog-next test suite without installing dependencies
      - exercise every mandatory failure fixture in an isolated temporary copy outside Nestfolio and delete it after capture
      - prove disable and re-enable in the isolated copy only
      - prove forbidden higher-level claims fail closed
  - id: rollback-proof
    actions:
      - use the isolated copy to prove removal or rollback restores exact pre-MI-001D protected bytes and no state conversion occurs
      - leave the Nestfolio working tree with the active 1.0.1 candidate only when every validation passes
      - on any failure after mutation, restore exact pre-execution Nestfolio bytes and retain no untracked evidence or temporary files
  - id: single-result-and-closure
    actions:
      - issue exactly one MI-001D UNCONDITIONAL PASS or FAIL
      - after the result, write only the contract-permitted continuity-lab closure
      - generate the required repository ZIPs outside both repositories
      - select exactly one next contract-required iteration under the conditional rule

mandatory_validation:
  success_checks:
    - 1.0.1 identity is consistent across every declared surface
    - all 19 assets verify by independent path, SHA-256, byte-size, and aggregate checks
    - doctor, inspect, and verify return ready with a truthful Level 1 card
    - deterministic Level 1 tests pass
    - existing backlog-next baseline is not worsened; environment-only failures must be byte-for-byte and count-for-count equivalent before and after
    - disable, re-enable, and rollback are proven only in an isolated copy
    - final Nestfolio diff is confined to the permitted manifest
  required_failures:
    - original 1.0.0 retained state fails closed with the recorded Skill digest mismatch
    - missing primary asset
    - locked asset digest or byte-size mismatch
    - aggregate lock digest tamper
    - missing declared prerequisite or repository identity mismatch
    - duplicate Procedure id/version
    - duplicate asset source
    - corrupt lock
    - unenumerated or partially locked asset
    - mixed 1.0.0 and 1.0.1 identity
    - forbidden Level 2-6 or completion claim
    - disabled activation

prohibited_actions:
  - reconstruct, approximate, infer, extract, install, or claim recovery of the original MI-001 output
  - use the expected 9ff3b13c digest as proof that newly authored bytes are original
  - invoke Claude Code, /backlog-next, continuity:invoke, any Skill, or any executor simulation presented as genuine invocation
  - install packages or modify package-lock.json or another dependency lock
  - commit, push, fetch, pull, merge, rebase, reset, checkout, restore, stash, clean, or rewrite history in either repository
  - modify any Nestfolio path outside the permitted scope
  - create Level 2-6 state or guarantees
  - authorize MI-002 or broader work

required_capture:
  - exact commands in execution order with UTC start/end, exit status, stdout, and stderr
  - continuity-lab and Nestfolio revisions, branches, upstreams, and start/end status
  - pre-change 1.0.0 identity and protected-path digests
  - exact authored 1.0.1 identity, final 19-entry lock, and independent aggregate computation
  - explicit statement that 1.0.1 is newly authored and is not recovered MI-001 output
  - every success and required-failure result
  - baseline and post-change backlog-next test comparison
  - isolated disable, re-enable, and byte-exact rollback proof
  - exact final changed-file manifests and repository ZIP identities

verdict:
  type: conjunctive-unconditional-single-result
  pass_rule: >
    Issue MI-001D UNCONDITIONAL PASS only if authorization and bindings pass;
    the retained 1.0.0 defect is independently reproduced; one new 1.0.1
    identity is deliberately authored without a recovery claim; all identity
    surfaces agree; all 19 final assets and the fresh aggregate lock verify;
    every success and required-failure check passes; Level 2-6 absence,
    compatibility, authority, isolated disable/re-enable, exact rollback, and
    scoped final changes are proven; and no prohibited action occurs.
  fail_rule: >
    Any missing, failed, ambiguous, contradictory, unexecuted, out-of-scope, or
    provenance-misrepresented required condition after valid execution start
    requires MI-001D UNCONDITIONAL FAIL. No partial credit or qualified PASS is
    permitted. After mutation, FAIL additionally requires exact restoration of
    the Nestfolio start state before closure.
  no_partial_credit: true

