  continuity_lab:
    contract_authoring_baseline: 86bd2532c85c4cc9e412e0cbc770e0543646cd09
    branch: main
    required_execution_revision: >
      The exact clean, reviewed, explicitly authorized, committed, and pushed
      main revision derived from the MI-001C closure baseline and containing the
      authorized MI-001D contract. Record the full revision. Prove HEAD,
      refs/heads/main, upstream, and refs/remotes/origin/main are identical.
  nestfolio:
    required_start_revision: 63ad0b2da2dfb2192d24e73a9224b65654deadb7
    required_branch: main
    required_state: >
      Clean worktree and index at the exact revision, with local main, upstream,
      and origin/main identical. Do not fetch or otherwise refresh remotes.
    retained_candidate_commit: b7d597ac5361d3c33b6f44a448373f3f9e79b8dc
    evidence_only_closure_commit: 63ad0b2da2dfb2192d24e73a9224b65654deadb7
  network_rule: >
    Do not fetch, pull, browse, query remote services, install dependencies, or
    use any network operation. Existing local remote-tracking refs may be read.

