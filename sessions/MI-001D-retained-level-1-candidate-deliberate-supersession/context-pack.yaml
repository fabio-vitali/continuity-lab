supersession_semantics:
  identity_rule: >
    The replacement must retain the Pack id nestfolio.level-1 and Procedure id
    nestfolio.backlog-next but use a version strictly distinct from 1.0.0. The
    required version for this bounded supersession is 1.0.1 for both Pack and
    Procedure. Every manifest, contract, binding, activation record, diagnostic,
    README, command result, and lock reference must agree on 1.0.1.
  no_recovery_claim_rule: >
    Version 1.0.1 is a new candidate authored after MI-001C. No byte, section,
    digest, manifest, test, or behavior may be described as recovered,
    restored, original, preserved, or byte-identical to the lost MI-001 output
    unless the statement is only the historical fact that no such proof exists.
  skill_rule: >
    Start only from the exact committed 33164-byte Skill at the Nestfolio start
    revision. If a visible Level 1 preflight block is required, author it anew
    from the canonical Level 1 contract and mark it as MI-001D 1.0.1 content.
    Do not derive wording from remembered or guessed lost bytes. Outside the
    explicitly bounded new block, the existing Skill bytes and behavior must be
    preserved unless a separately enumerated compatibility correction is
    necessary and justified in the final evidence.
  historical_identity_rule: >
    Capture the complete pre-change 1.0.0 identity and relevant file digests in
    MI-001D evidence before mutation. Git history remains the byte authority for
    the retained invalid candidate. Never relabel or rewrite 1.0.0 as valid.
  activation_rule: >
    The delivered successful candidate is active at Level 1 and resolves only
    nestfolio.level-1@1.0.1 / nestfolio.backlog-next@1.0.1. A disabled or mixed
    version state cannot pass.

required_candidate_guarantees:
  present:
    - exact Procedure, Pack, project-binding, repository, and executor-asset identity
    - complete SHA-256 lock for every regular file under .claude/skills/backlog-next/**
    - declared prerequisites, permissions, capabilities, and /backlog-next entry point
    - truthful visible Level 1 guarantee card and activation diagnostic
    - fail-closed handling for missing, mismatched, duplicate, corrupt, tampered, or unenumerated assets
    - explicit disable and byte-exact rollback behavior without state conversion
  absent:
    - reusable multi-Pack composition or Level 2 resolution
    - Work, WorkSelection, Working Set, Scope, or completion-criteria authority
    - Context Pack formation or execution authority
    - Session, Run, Checkpoint, Handoff, lease, or effect state
    - Assurance, Evidence, Guard, Waiver, or completion authority
    - Decision, Observation, Lesson, Change Proposal, or learning authority
    - Console, hosted service, universal integration, RBAC, analytics, billing, or commercial control plane

permitted_nestfolio_scope:
  modify_if_required:
    - .claude/skills/backlog-next/SKILL.md
    - CLAUDE.md
    - continuity/level-1/README.md
    - continuity/level-1/activation.json
    - continuity/level-1/cli.mjs
    - continuity/level-1/pack-lock.json
