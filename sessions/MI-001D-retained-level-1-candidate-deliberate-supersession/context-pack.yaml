iteration:
  id: MI-001D
  name: Retained Level 1 Candidate Deliberate Supersession
  type: bounded-level-1-candidate-supersession
  design_level: L6
  product_experience_level: 1
  status: authorized-not-started
  completion_gate: unconditional-mi-001d-result
  sole_purpose: >
    Deliberately replace the invalid retained Level 1 candidate identity with a
    new, independently authored, version-distinct and fully verified Level 1
    candidate, without reconstructing or claiming recovery of the original
    MI-001 output and without invoking the Procedure.

primary_question: >
  Can the invalid retained nestfolio.level-1@1.0.0 candidate be deliberately
  superseded by one new truthful Level 1 candidate whose identity, exact asset
  lock, authority boundaries, compatibility, failure behavior, and byte-exact
  rollback are independently validated, while preserving every historical FAIL
  and all Level 2-6 blocks?

canonical_preconditions:
  - MA-001 remains complete with unconditional PASS and G5 remains valid.
  - MI-001 remains complete with unconditional FAIL; C2, C4, C5, C6, and C7 remain preserved only as historical MI-001 execution facts.
  - MI-001A remains complete with unconditional FAIL before Skill invocation.
  - MI-001B remains complete with unconditional FAIL at the original-output provenance gate before extraction or installation.
  - MI-001C remains complete with unconditional FAIL after finding no directly verified input archive, admissible output, or delivery chain.
  - The original MI-001 output is unavailable and must not be reconstructed, inferred, approximated, or claimed recovered.
  - MI-001D is the sole authorized-not-started iteration; its result is pending and it has not executed.
  - Genuine invocation confirmation, /backlog-next, continuity:invoke, MI-002 through MI-007, and broader work remain blocked.

