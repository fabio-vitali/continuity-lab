mi001e_failure_to_correct:
  scenario_a_provenance_gap: exact Claude Code process-start UTC was not machine-captured
  scenario_b_behavior_gap: >
    The genuine direct Skill invocation occurred while the tracked activation
    and already-written MI-001E evidence made the repository non-clean, so the
    Skill's current clean-tree preflight stopped before a normal result.
  preserved_facts:
    - MI-001E C1, C2, C4, C5, C6, and C7 PASS remain historical facts
    - MI-001E C3 FAIL and unconditional FAIL remain immutable history
    - exact active 1.0.1 and all protected bytes were restored
    - no selected backlog task or repository work was executed

correction_design:
  evidence_spool:
    location: temporary directory outside both repositories
    rule: >
      Capture all R1 evidence outside both repositories until both genuine
      Sessions end and active 1.0.1 plus exact Git-index metadata are restored.
      No continuity/evidence/mi-001e-r1 path may exist during either Skill
      invocation. Validate, deterministically serialize, copy only the permitted
      JSON files into Nestfolio after restoration, then delete and verify absence
      of the temporary spool.
  exact_session_timing:
    rule: >
      A machine wrapper must write the UTC start immediately before launching
      each Claude Code process, obtain the genuine Session identity without
      transcript dependence, write UTC end and exit immediately after process
      termination, and bind those fields to the bounded result record. A null,
      inferred, rounded, reconstructed, or merely bounded start is FAIL.
  disabled_clean_state_containment:
    permitted_git_metadata_operation: >
      Temporarily set the skip-worktree bit only for
      continuity/level-1/activation.json after the exact disable and disabled
      boundary probe, solely so current Skill clean-tree preflight does not
      classify the authorized Level 1 control-file mutation as repository work.
    exact_commands:
      set: git update-index --skip-worktree continuity/level-1/activation.json
      clear: git update-index --no-skip-worktree continuity/level-1/activation.json
    mandatory_proofs:
      - start index flags and index-file SHA-256 captured before mutation
      - activation bytes independently prove disabled while the bit is set
      - HEAD and every tracked content byte remain unchanged
      - git status is clean before Session B because evidence remains external and only the authorized activation path is hidden
      - no other assume-unchanged or skip-worktree flag changes
      - bit cleared immediately after Session B and before activation restore
      - final index flags equal start exactly and final Git status is clean before evidence publication
      - final active activation bytes equal start exactly
    fail_closed: >
      If the single-path containment does not produce these exact conditions,
      clear the bit, restore active activation, verify start-equivalent index
      flags and bytes, issue unconditional FAIL, and do not start Session B.
    authority_boundary: >
      This is an execution-harness metadata containment only. It does not change
      the Skill, its clean-tree rule, the candidate, tracked Git history, or
      repository-work semantics, and it grants no permission to execute work.

genuine_executor_contract:
  executor: installed and already authenticated Claude Code
  sessions: exactly 2
  session_a: fresh process in exact Nestfolio working directory
  session_b: separately started fresh process with no A resume or transcript dependency
  allowed_skill_invocations:
    - Session A: exactly /backlog-next --auto after active Level 1 delegation
    - Session B: exactly /backlog-next --auto directly while activation is disabled and containment is active
  prohibited_substitutes:
    - mock, simulation, adapter-only, shell-only, or Node-only evidence
    - fabricated or manually reconstructed timing or Session identity
    - raw transcript, hidden prompt, chat history, or provider cache as authority
  executor_drift_rule: >
    Capture binary, digest, version, authentication readiness, model when
    observable, and startup source before both Sessions. Any automatic or
    explicit executor version/binary drift between Sessions is unconditional
    FAIL; do not update, downgrade, or repair the executor inside R1.

scenario_a:
  - require exact clean published Nestfolio start and active exact 1.0.1
  - start the timing wrapper before the genuine Claude Code process
  - in Session A run exactly npm run -s continuity:invoke -- -- --auto
  - require ready delegation to exactly /backlog-next --auto
  - in the same Session invoke exactly /backlog-next --auto
  - capture the normal visible bounded result without adopting or executing it
  - terminate Session A and capture exact end, exit, and distinct Session identity

scenario_b:
  - require no in-repository R1 evidence and unchanged protected bytes
  - run exactly npm run -s continuity:disable
  - run the single probe npm run -s continuity:invoke -- -- --auto and require LEVEL1_DISABLED
  - apply and prove the single-path disabled clean-state containment
  - start a distinct timing wrapper before fresh genuine Claude Code Session B
  - invoke exactly /backlog-next --auto directly
  - capture the normal visible bounded result without adopting or executing it
  - terminate Session B and capture exact end, exit, and distinct Session identity
  - clear and verify the index containment before running npm run -s continuity:activate
  - restore exact active 1.0.1 and rerun all required verification

