    disabled under the exact single-path containment, and returns its normal
    visible bounded result.
  C4: No Level 2-6 state, guarantee, or canonical repository-work completion is created or claimed.
  C5: Current content, checks, Skill behavior, diagnostics, and test parity remain unchanged.
  C6: Procedure, Pack, binding, lock, activation, executor, containment, and behavior authority remain observable and unambiguous.
  C7: Disable, containment, restoration, and failure handling preserve exact protected bytes, index flags, and Git history.

