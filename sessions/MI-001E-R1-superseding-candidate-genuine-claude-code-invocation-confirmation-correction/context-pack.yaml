    PASS only when genuine Session A has an exact machine-captured process
    interval, traverses the active exact 1.0.1 boundary, invokes the Skill, and
    returns its normal visible bounded result.
  C2: All 19 assets and the aggregate lock independently match the immutable candidate before and after.
  C3: >
    PASS only when fresh genuine Session B has an exact machine-captured process
