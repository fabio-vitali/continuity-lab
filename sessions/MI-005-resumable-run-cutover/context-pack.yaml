  read_only_sources:
    - .git metadata, exact committed objects, and the Git common directory journal/ tree (route check and byte-identity proof only)
    - package.json, pnpm-lock.yaml, CLAUDE.md, .claude/settings.json
    - .claude/skills/backlog-next/SKILL.md and .claude/skills/backlog-next/test/**
    - runtime/continuity/** (the pinned engine)
    - continuity/level-1/** through continuity/level-4/**
    - continuity/artifacts/**, continuity/bindings/**, continuity/packs/**, continuity/dogfood/** (pre-existing files)
    - .continuity/** pre-existing files, including the tracked VS-001/VS-001A records
    - continuity/evidence/mi-002/**, mi-003/**, mi-004/**, se-001/**, vs001a/** and every other evidence tree
    - docs/backlog/dashboard-bff-awaiting-confirmation-activity-gap.md
    - tests/continuity-level-1.test.mjs through tests/continuity-level-4.test.mjs
  create_fixed_paths_on_pass:
    - continuity/level-5/run-binding.json
    - continuity/level-5/engine-lock.json
    - tests/continuity-level-5.test.mjs
    - continuity/dogfood/mi-005-effect.txt
    - continuity/evidence/mi-005/00-repository-bindings.json
    - continuity/evidence/mi-005/01-store-binding-and-route.json
    - continuity/evidence/mi-005/02-run-preparation-and-rehearsal.json
    - continuity/evidence/mi-005/03-two-session-continuity.json
    - continuity/evidence/mi-005/04-success-scenarios.json
    - continuity/evidence/mi-005/05-mandatory-failures.json
    - continuity/evidence/mi-005/06-preservation-and-rollback.json
    - continuity/evidence/mi-005/07-criterion-matrix-and-verdict.json
    - continuity/evidence/mi-005/commands/01-level5-tests.json
    - continuity/evidence/mi-005/commands/02-engine-tests.json
    - continuity/evidence/mi-005/commands/03-level4-tests.json
    - continuity/evidence/mi-005/commands/04-level3-tests.json
    - continuity/evidence/mi-005/commands/05-level2-tests.json
    - continuity/evidence/mi-005/commands/06-level1-tests.json
    - continuity/evidence/mi-005/commands/07-backlog-next-tests.json
    - continuity/evidence/mi-005/commands/08-final-changed-files.json
  create_engine_write_set_classes: >
    Engine-produced creates are permitted only as new files with MI-005
    identities under: continuity/artifacts/** (new artifact files only),
    .continuity/runs/run-mi005/**, .continuity/derived/execution-views/
    (the two new session views), and .continuity/executor-sessions/
    (the session-mi005-1 and session-mi005-2 hook records). The exact
    paths are frozen by the write-set rehearsal plus the genuine-session
    provenance records and recorded in the final manifest.
  modify_exactly:
    - ".continuity/audit.ndjson — append-only: the recorded pre-execution bytes must remain the exact unmodified prefix of the final file, proven by prefix digest comparison"
    - ".continuity/derived/index.json — derived non-authoritative projection, rewritten only by the pinned engine's deterministic rebuild; the pre-execution snapshot remains recoverable from Git history"
  scope_rule: >
    On PASS the Nestfolio diff from the exact start revision must contain
    exactly: the twenty-one fixed create paths, the frozen engine
    write-set creates, and the two permitted modified paths — with no
    staged path and no other modified, deleted, renamed, or additional
    path. Every other pre-existing tracked byte, including every
    Level 1-4 artifact, every VS-001/VS-001A record, the backlog source,
    and the entire current journal tree, is byte-immutable for the whole
    execution. The delta remains uncommitted and unstaged at execution
    close; publication is separately authorized.
  path_absence_rule: >
    Any pre-existing fixed create path is a collision and blocks
    execution; it must not be overwritten, adopted, repaired, or deleted.

bounded_success_scenarios:
  - id: S1
    requirement: the two-class target store, pinned engine digests, hook registration, and Level 5 binding verify exactly and are recorded in engine-lock.json and run-binding.json
  - id: S2
    requirement: Run run-mi005 is created binding the exact Work reference, Scope digest, Context Pack version 1 digest, Level 2 lock aggregate, repository revision and working-tree fingerprint, and lease policy, with the route check proving no current-journal or target dual Run for the effort
  - id: S3
    requirement: genuine Session 1 starts from the digest-matched adapter start view with hook-recorded provenance (distinct Claude Code session id, startup_source startup) and completes keyed effect mi005-material-effect exactly once
  - id: S4
    requirement: the intermediate Checkpoint is captured and verified and the Handoff is published before Session 1 ends, with machine-captured UTC ordering proof (SessionEnd after Checkpoint and Handoff)
  - id: S5
    requirement: genuine fresh Session 2 (distinct session id, startup_source startup, no transcript dependency) resumes from the verified Checkpoint after passing freshness validation against the exact bound repository/Context Pack/lock/engine digests and acquires the lease
  - id: S6
    requirement: Session 2's replay of effect key mi005-material-effect returns deduplicated without re-execution or record rewrite, and exactly one completed effect record exists at close
  - id: S7
    requirement: the final Checkpoint is captured and verified and the Run closes through the engine's bounded internal closure, with the truthful record that this is Level 5 operational closure only and no Work completion, Assurance, or Level 6 state exists
  - id: S8
    requirement: the derived index is deleted and rebuilt deterministically with zero canonical loss, and the audit ledger's pre-execution bytes are proven to be the exact prefix of its final bytes
  - id: S9
    requirement: the current journal tree is byte-identical before and after execution (digest comparison over every journal run), the drain rule is recorded, and no dual writer existed at any point
  - id: S10
    requirement: the evidence set is complete, deterministic, and canonically serialized; all isolated fixtures and the rehearsal copy are removed with absence proof; the execution delta remains uncommitted and unstaged with a recorded SHA-256 manifest matching scope_rule exactly

mandatory_failure_scenarios:
  - id: F1
    condition: stale repository fingerprint, Context Pack digest, Level 2 lock, pack lock, or engine asset digest at start or resume
    diagnostic: STALE_RUN
  - id: F2
    condition: corrupt, digest-mismatched, schema-invalid, or unverified checkpoint offered for resume
    diagnostic: INVALID_CHECKPOINT
  - id: F3
    condition: effect in unknown state at resume or retry
    diagnostic: UNKNOWN_EFFECT_BLOCKS_RETRY
  - id: F4
    condition: conflicting second live writer attempts start, resume, or mutation while the lease is held
    diagnostic: LEASE_CONFLICT
  - id: F5
    condition: attempt to create or start a target Run for an effort that already has an active current journal Run or another target Run
    diagnostic: DUAL_RUN_ROUTE_CONFLICT
  - id: F6
    condition: attempt to write target state into the current journal, or to import, convert, rewrite, or re-key any current journal Run as target state
    diagnostic: JOURNAL_CONVERSION_PROHIBITED
  - id: F7
    condition: corrupt or deleted derived index or execution view
    diagnostic: reads fail closed with CORRUPT_PROJECTION until the deterministic rebuild from canonical state succeeds; the projection never wins a conflict and no canonical state is lost
  - id: F8
    condition: unexpected Session termination without deliberate pause
    diagnostic: recovery reconstructs the latest valid state, records an interrupted Session, and requires a recovery Checkpoint before continuation; unreconstructable state blocks with UNRECOVERABLE_RUN_STATE
  - id: F9
    condition: start or resume against a non-authorized, stale, rejected, revoked, or digest-mismatched Context Pack version or adapter view
    diagnostic: UNAUTHORIZED_CONTEXT_DELIVERY
  - id: F10
    condition: attempt to delegate contracted work to any Skill, slash command, /backlog-next, continuity:invoke, or other product executor procedure, or to substitute a non-genuine process for either validation Session
    diagnostic: EXECUTOR_DELEGATION_PROHIBITED
  - id: F11
    condition: claim or creation of Work completion, Evidence-bound completion, Assurance Plan authority, Guard, Waiver, Decision, Learning, or Level 6 state
    diagnostic: FORBIDDEN_HIGHER_LEVEL_CLAIM
  - id: F12
    condition: any executor or engine write outside the frozen write-set, fixed create paths, and permitted modify set
    diagnostic: MANIFEST_SCOPE_MISMATCH
  fixture_rule: >
    F1 through F9 are exercised in isolated temporary fixtures outside all
    three repositories with exact expected/observed diagnostics, exit
    codes, fixture digests, and cleanup proof; they never mutate the real
    Run or repositories. F10 through F12 are standing prohibitions whose
    fail-closed behavior is verified structurally.

deterministic_evidence:
  rules:
    - every JSON evidence file uses canonical JSON with recursively sorted object keys, UTF-8, two-space indentation, and one LF terminator
    - every command record contains argv, cwd role, start and end UTC, exit code, stdout SHA-256, stderr SHA-256, and parsed result
    - repository bindings include branch, HEAD, clean state, and observed time for all three repositories, plus the current journal tree digest
    - store-binding evidence records every engine-lock digest verification, the hook registration digest, and the route check result
    - run-preparation evidence records every prepared artifact with digests, the rehearsal write-set with before/after digests, and the freeze proof
    - two-session evidence records both hook-recorded session records verbatim by digest, the execution-view digest matches, the machine-captured UTC ordering, the effect execution and deduplicated replay records, both verified Checkpoints, and the published Handoff
    - scenario evidence records expected diagnostic, observed diagnostic, exit code, fixture digest, and cleanup result
    - criterion evidence references exact source and artifact digests; narrative alone cannot pass a criterion
    - no chat transcript, hidden manual copy, timestamp-dependent artifact ordering, or unrecorded inference is admissible
    - temporary fixtures and copies are outside all three repositories and are removed with absence proof
  required_validation:
    - node --test tests/continuity-level-5.test.mjs returns all tests passing
    - node --test runtime/continuity/test/*.test.mjs exits 0 with zero failures after execution
    - node --test tests/continuity-level-4.test.mjs returns 23/23 after execution
    - node --test tests/continuity-level-3.test.mjs returns 23/23 after execution
    - node --test tests/continuity-level-2.test.mjs returns 23/23 after execution
    - node --test tests/continuity-level-1.test.mjs returns 14/14 after execution
    - node --test .claude/skills/backlog-next/test/*.test.mjs returns 68/68 after execution without invoking the Skill
    - all S1-S10 success scenarios pass
    - all F1-F12 mandatory failure scenarios fail closed with the exact typed diagnostic
    - the current journal tree digest after execution equals the recorded pre-execution digest
    - final Git and digest comparison proves every pre-existing tracked path other than the two permitted modified paths equals the exact start revision, and the two modified paths satisfy their modify_exactly rules
    - the final Nestfolio manifest contains exactly the paths permitted by scope_rule, uncommitted and unstaged, with a recorded SHA-256 manifest
  suite_environment_rule: >
    If any published Level 1-4 suite carries a working-tree purity guard
    that the contracted uncommitted MI-005 delta makes unsatisfiable in
    the working tree, that suite's after-execution run executes in an
    isolated committed validation copy exactly per the SE-001-R3
    corrected-validation-environment mechanics (throwaway commit in a
    temporary copy outside all three repositories, per-path delta digest
    equality, clean copy status, removal with absence proof); the
    pre-mutation runs and all purity-guard-free suites run in the real
    working tree.

preservation_and_rollback:
  before_write: >
    Record exact Git metadata for all three repositories, the complete
    Nestfolio tracked-tree identity, the current journal tree digest, the
    pre-execution bytes and digests of the two permitted modify paths, all
    critical Level 1-4 and VS-001/VS-001A digests, absence of every fixed
    create path, and a verified external recovery ledger outside all
    repositories. Do not copy backlog content or secrets into the recovery
    ledger.
  operational_rollback_proof: >
    In an isolated temporary copy only, prove the operational rollback
    class of the migration plan: pause or cancel the target Run, capture
    the best available Checkpoint and Handoff, release the lease, and show
    that no completed effect is repeated, no unknown effect is retried,
    nothing is written into the current journal, and the Run history
    remains immutable and readable. The real Run is never cancelled on
    PASS.
  execution_failure: >
    If any actual execution condition fails after mutation, restore the
    two permitted modify paths to their recorded pre-execution bytes,
    remove only the newly created MI-005 paths, verify Nestfolio is
    byte-identical and clean at the exact published start revision, retain
    diagnostics outside all repositories, and close MI-005 as
    UNCONDITIONAL FAIL in continuity-lab. Never retain partial Level 5
    authority, never convert the failed target Run into the current
    journal, and never repeat effects whose outcome is unknown.

permitted_continuity_lab_execution_closure:
  modify:
    - README.md
    - CONTINUITY-NEXT-STEPS.md
    - docs/70-implementation/README.md
    - docs/90-state/artifact-index.md
    - docs/90-state/program-state.md
    - scripts/generate-program-indices.mjs (queue tail text only, if the recorded blocked tail requires it)
    - sessions/MI-005-resumable-run-cutover/context-pack.yaml
    - sessions/MI-005-resumable-run-cutover/session-handoff.md
  create:
    - docs/70-implementation/mi-005-resumable-run-cutover.md
    - sessions/MI-005-resumable-run-cutover/execution-changed-files.txt
  rule: >
    The execution closure records only the one MI-005 result and exact
    execution facts, and performs the DR-0025 closure obligations
    (queue_summary update, index regeneration, --check). All MI-002
    through SE-001-PUB artifacts and every VS-001/VS-001A artifact remain
    immutable. Per DR-0024 the closure may be committed and pushed in the
    executing session with a concise subject-only message; the Nestfolio
    execution delta stays uncommitted pending its separate publication
    authorization.

explicitly_immutable:
  continuity_workspace: [all content during execution]
  continuity_lab_during_execution:
    - all MI-002 through MI-004-R1, SE-001, SE-001-R1, SE-001-R2, SE-001-R3, and SE-001-PUB artifacts and reports
    - all VS-001 and VS-001A artifacts and reports
    - the MI-005 prompt and contract-authoring manifest
    - every path outside the exact MI-005 execution-closure scope
  nestfolio:
    - every pre-existing tracked path except the two permitted modify paths under their modify_exactly rules
    - the entire Git common directory journal/ tree
    - package.json, pnpm-lock.yaml, CLAUDE.md, .claude/settings.json, .claude/skills/**
    - runtime/continuity/** and every other runtime/** path
    - docs/backlog/**
    - continuity/level-1/** through continuity/level-4/**
    - continuity/evidence/mi-001*/** through continuity/evidence/se-001/** and continuity/evidence/vs001a/**
    - every pre-existing continuity/artifacts/**, continuity/bindings/**, continuity/packs/**, continuity/dogfood/**, and .continuity/** file
    - tests/continuity-level-1.test.mjs through tests/continuity-level-4.test.mjs

prohibited_actions:
  - execute MI-005 outside authorization_rule
  - inspect or modify Nestfolio content before execution validly starts and session gates pass
  - commit or push the Nestfolio execution delta during execution (isolated-copy throwaway commits under suite_environment_rule and the rehearsal are not real-repository commits); fetch, pull, merge, rebase, reset, checkout, restore, stash, clean, or rewrite history in any real repository during execution
  - modify, repair, relabel, qualify, supersede, re-grade, or reinterpret any recorded historical result or artifact
  - rerun, rewrite, extend, or mutate run-vs001, run-vs001a, or any VS-001/VS-001A record
  - read, write, convert, import, re-key, or retire any current journal Run beyond the contracted read-only route check and byte-identity proof
  - dual-write any Run across the current journal and the target store, or create a second active Run for the bound effort
  - form, refresh, re-validate, re-authorize, version, or edit any Context Pack or Level 4 artifact
  - start or resume from any non-authorized, stale, rejected, revoked, or digest-mismatched context or checkpoint
  - modify the pinned engine, the hooks, .claude/settings.json, or any Skill
  - re-implement, extend, or mutate the selected effort's implementation, its backlog source, or any Level 1-4 artifact
  - repeat a completed keyed effect, retry an unknown effect, or bypass the lease
  - use a sub-agent, background task, simulated process, or the orchestrating session itself as either genuine validation Session, or fabricate provenance records
  - install, remove, or upgrade dependencies, modify package.json, or mutate pnpm-lock.yaml
  - claim Work completion or create Evidence-bound completion, Assurance Plan authority, Guard, Waiver, Decision, Observation, Lesson, Change Proposal, Level 6 state, registry, remote source, universal ranking, Epic orchestration, intake, or themes migration
  - promote Nestfolio behavior into reusable Pack or Framework Core authority
  - use parallel agents for the contracted Run, or migrate any Epic or additional effort
  - execute MI-006 or MI-007 or any broader or unrelated implementation, or scope MI-006 or later slices

verdict:
  type: conjunctive-unconditional-single-result
  criteria:
    - C1 session gates, engine and store binding, Level 4/Level 3/Level 2 digest verification, and route check pass fail-closed before mutation
    - C2 exact Run creation binding, frozen rehearsed write-set, and complete pre-mutation preservation ledger
    - C3 real two-Session start/resume with machine-captured provenance and ordering, verified Checkpoints, published Handoff, and keyed-effect deduplication
    - C4 every mandatory failure blocks with the exact typed diagnostic
    - C5 current journal, backlog source, Levels 1-4, VS-001/VS-001A records, and every byte outside the permitted sets remain exact
    - C6 authority, route, cutover and drain rule, lease, store ownership, and absent Level 6 guarantees are observable, truthful, and unambiguous
    - C7 deterministic index rebuild, audit prefix preservation, operational rollback proof, cleanup with absence proofs, and the exact uncommitted final manifest pass
  pass_rule: >
    Issue MI-005 UNCONDITIONAL PASS only if C1-C7, S1-S10, F1-F12, every
    precondition, validation, preservation, rollback, cleanup, and
    exact-manifest requirement passes conjunctively and no prohibited
    action occurs.
  fail_rule: >
    Any missing, skipped, ambiguous, stale, mismatched, out-of-scope,
    non-deterministic, partial, or failed condition after valid execution
    start is MI-005 UNCONDITIONAL FAIL. No qualified PASS, partial PASS,
    inferred authorization, silent repair, evidence-only override,
    historical reinterpretation, or history rewrite is permitted.

next_iteration_rule:
  on_pass: >
    Record MI-005 separately; every prior result remains a separate
    immutable result. The target operational store holds one closed target
    Run with its immutable history; no active Run persists; Level 5 is a
    proven bounded guarantee for target-routed Runs and Level 6 remains
    absent. The current journal continues to drain its own Runs and
    retires only under a later explicitly contracted operation. MI-006
    (Evidence-Bound Completion and Guard Coexistence) becomes the next
    contractable slice; it remains unauthorized until separately
    contracted, reviewed, published, and explicitly executed.
  on_fail: >
    Preserve all separate results and keep MI-006 and MI-007 blocked.
    Select only a newly bounded correction or explicit review supported by
    the failure evidence. Do not broaden scope.

completion_criteria:
  - internally consistent MI-005 contract authored, reviewed by the human program owner, and published on continuity-lab main in one DR-0024 session
  - execution not started in the authoring phase; Nestfolio uninspected beyond the recorded bounded targeted grounding reads
  - the target operational store, lease policy, effect-key policy, start/resume adapter path, and sharing boundary are defined by this contract as the migration plan requires
  - the two-Claude-Code-session validation scenario is genuine, bounded, and human-launched
  - the cutover boundary routes new Runs to the target store and drains current journal Runs untouched, with dual-write prohibited fail-closed
  - all nine immutable results and the SE-001-PUB publication record remain unrepaired, unrelabeled, and unreinterpreted
  - DR-0025 closure obligations performed at session closure (queue_position 30, queue_summary, index regeneration, --check exit 0)
  - execution handoff saved to ~/continuity-handoffs/ with the exact published revision and a fully resolved launch command
