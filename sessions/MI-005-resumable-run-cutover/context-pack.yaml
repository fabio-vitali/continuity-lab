objective:
  primary_question: >
    Can operational Run authority cut over to the target store without dual
    Run state — that is, can one new target Run for the program's one
    target-routed effort be created in the declared DR-0014 target
    operational store, started by a genuine Claude Code Session from an
    adapter-produced execution view, deliberately interrupted at a verified
    Checkpoint with a published Handoff, and resumed by a separately
    launched fresh genuine Claude Code Session from repository-local state
    alone — with a material keyed effect executed once and deduplicated on
    replay, single-writer lease protection, freshness validation against the
    exact bound repository/Context Pack/lock/engine digests, append-only
    audit, deterministic derived-index rebuild, and machine-captured
    executor provenance — while every existing current journal Run
    continues to drain untouched under the current journal's own authority,
    no Run is ever dual-written or converted between stores, and no
    Evidence-bound completion, Assurance, or Level 6 authority is created
    or claimed?
  completion_boundary: >
    Implement and validate only the Level 5 resumable-run boundary for one
    new target Run of the already selected, already implemented effort. Do
    not re-implement or mutate the effort, its backlog source, or any
    Level 1-4 artifact. Do not read, write, convert, import, or retire any
    current journal Run beyond the contracted read-only route check and
    byte-identity proof. Do not record Work completion, Assurance,
    Evidence-bound completion, Guard, Waiver, Decision, Learning, or
    Level 6 state. Do not rerun or rewrite run-vs001 or run-vs001a. Do not
    use parallel agents for the contracted Run. Do not begin MI-006,
    MI-007, or broader work.

session_gates:
  rule: >
    Per DR-0024, before execution starts: continuity-workspace,
    continuity-lab, and Nestfolio are on main with clean working trees;
    continuity-lab HEAD is the exact published revision containing this
    contract (same-session execution uses the revision just pushed;
    later-session execution uses the revision named by prompt.md);
    Nestfolio HEAD is 363283bcc97b1e04710db0e7f759ffffddb18b69, the
    published SE-001 implementation revision (subject "Publish SE-001
    selected effort implementation and evidence"). Every published
    Level 1-4 artifact, every VS-001/VS-001A artifact, and every recorded
    historical result is a read-only input. A wrong branch, dirty tree, or
    missing contract stops the session before any Nestfolio mutation. No
    multi-way alignment gates, remote-ref checks, or byte-level authoring
    manifests apply.

executor_identity:
  session_executor: >
    The MI-005 execution session is conducted directly by Claude Code
    operating under authorization_rule. It orchestrates preparation,
    verification, failure scenarios, evidence, and closure with its own
    tools.
  sub_agent_rule: >
    Per DR-0024 the orchestrating executor may use its own sub-agents and
    tools for mechanical work at its discretion. Delegating contracted work
    to the product's executor procedures — any Skill, /backlog-next,
    continuity:invoke — remains prohibited. Running node for tests,
    validation, the pinned engine's CLI, and the published continuity
    tooling's own checks is direct work, not delegation.
  genuine_session_rule: >
    The two validation Sessions defined under
    two_session_validation_scenario must be real, separately launched
    Claude Code processes with hook-recorded provenance (distinct Claude
    Code session ids, startup_source startup, no transcript resume, exact
    machine-captured UTC). They are launched by the human program owner in
    the Nestfolio repository. A sub-agent, background task, simulated
    process, forged record, or the orchestrating session itself
    substituting for either Session is UNCONDITIONAL FAIL. Missing
    machine-captured session timing independently requires FAIL (MI-001E
    precedent).

target_operational_store:
  definition_rule: >
    The MI-005 target operational store is the DR-0014 two-class
    repository-local store already implemented and validated by
    VS-001/VS-001A and present unchanged at the bound Nestfolio revision.
    MI-005 defines its authority for target Runs, pins its implementation
    by digest, and adds only new records with new identities. This
    satisfies the migration-plan prerequisite that the target operational
    store is defined by the MI-005 contract, using the validated mechanics
    as architectural evidence without rerunning them.
  durable_class: >
    Versioned reviewable artifacts under continuity/artifacts/** (work-item
    references, working sets, scopes, runs, checkpoints, handoffs, context
    references, pack locks, validation plans/results, engine-internal
    evidence, observations, lessons). Immutable versions are corrected only
    through new versions and explicit supersession. MI-005 creates only new
    files here; every pre-existing file is byte-immutable.
  operational_class: >
    The declared inspectable operational state store under .continuity/
    (runs/<run-id>/ holding the CAS-mutated run head, single-writer lease,
    and keyed-effects ledger; derived/ holding the rebuildable index and
    digest-linked execution views; executor-sessions/ holding hook-recorded
    executor provenance; audit.ndjson as the append-only operation audit
    ledger). Location, format, and ownership are exactly the
    VS-001-implemented layout. The store is worktree-local and untracked
    during execution; the immutable close state of every MI-005 record is
    committed at publication as the durable export (VS-001A precedent), so
    backup and export behavior is Git itself.
  engine_binding: >
    The store engine is the pinned read-only implementation at
    runtime/continuity/** (lib, adapters/claude-code including cli.mjs and
    the SessionStart/SessionEnd hooks, tools, tests) together with the hook
    registration in .claude/settings.json. Before any mutation the executor
    records the exact SHA-256 of every engine file and of
    .claude/settings.json into continuity/level-5/engine-lock.json and
    verifies them against the bound revision. The engine is never modified;
    if the pinned engine cannot satisfy a contracted policy without
    violating this contract's write boundary, execution blocks fail-closed
    with ENGINE_POLICY_MISMATCH and MI-005 closes UNCONDITIONAL FAIL
    without repair.
  level_5_binding_artifact: >
    continuity/level-5/run-binding.json declares, in canonical JSON: the
    target Run identity and store paths; the bound effort, Context Pack,
    Level 2 lock, and repository revision digests; the lease policy; the
    effect-key policy; the freshness policy; the cutover and drain
    declaration; the sharing boundary; and the explicit statement that
    Level 6 guarantees are absent. tests/continuity-level-5.test.mjs
    validates this binding deterministically against the repository.

lease_policy:
  - one single-writer lease per Run; acquisition only at start or at resume after freshness validation passes
  - the lease records holder identity (Continuity session id, Claude Code session id where applicable, process id, host, acquired-at UTC)
  - a conflicting second live writer is rejected fail-closed with LEASE_CONFLICT; reads are lease-free
  - the lease is released at deliberate pause, at Run close, and by recovery after unexpected stop
  - dead-process reclamation is permitted only same-host with the staleness check and the reclamation recorded in the audit ledger
  - no lease is ever taken on, or copied from, any current journal Run

effect_key_policy:
  - every material repeatable side effect receives a deterministic effect key before execution
  - effect lifecycle states are planned, started, completed, failed, compensated, and unknown
  - a completed keyed effect is replayed as deduplicated without re-execution and without rewriting its record
  - an unknown effect blocks automatic retry and resume until explicitly reconciled by the human
  - retry is permitted only for effects classified retryable and only under the same effect key
  - the sole contracted material effect is key mi005-material-effect creating continuity/dogfood/mi-005-effect.txt with the exact content declared in run-binding.json; effort-implementation effects are prohibited (the effort is already implemented and published)

cutover_and_drain_boundary:
  new_run_cutover: >
    The target Run run-mi005 is a new Run with a new target identity,
    created only in the target operational store. No current journal Run is
    ever read into, imported, converted, rewritten, relabeled, or
    re-keyed as target state, and no target state is ever written into the
    current journal.
  drain_rule: >
    The current journal at the Git common directory journal/ path remains
    the sole operational authority for every Run it already contains
    (30 run directories at contract time, 29 holding parked awaiting
    decisions). Those Runs finish or remain parked under the current
    journal and its own tooling. MI-005 performs zero writes under the
    journal path; its only reads are the contracted read-only route check
    and the before/after byte-identity proof over the journal tree.
    Current-journal retirement is out of MI-005 scope.
  dual_writer_prohibition: >
    One effort has at most one active Run across both stores. Before Run
    creation the executor enumerates the current journal run identities
    read-only and records that none is an active current Run for the bound
    effort, and that no other target Run exists. Any conflict blocks
    fail-closed with DUAL_RUN_ROUTE_CONFLICT before any mutation. The
    route record is written into run-binding.json and re-verified at
    resume.

start_resume_adapter_path: >
  The start/resume path is exactly the validated VS-001A mechanism, reused
  read-only with new identities: a Claude Code Session launched in
  Nestfolio with CONTINUITY_ACTION (start or resume), CONTINUITY_RUN_ID,
  CONTINUITY_SESSION_ID, and for start CONTINUITY_WORKING_SET_ID causes
  the registered SessionStart hook to invoke the pinned adapter CLI, which
  produces a digest-linked execution view, verifies its SHA-256, injects
  it into the session context, and records machine-captured provenance
  under .continuity/executor-sessions/. Start delivers the Run's exact
  next action; resume performs freshness validation (repository
  fingerprint, Context Pack digest, Level 2 lock aggregate, pack-lock and
  engine asset digests) and acquires the lease before delivering the
  resume view. Sessions without the Continuity environment leave the
  lifecycle untouched. The execution views are derived, rebuildable, and
  carry no authority of their own.

sharing_boundary: >
  At every durable boundary the active Run is represented by an immutable
  verified Checkpoint and a published Handoff referencing it, with no
  transcript dependency: the deliberate interruption of Session 1
  publishes Handoff plus verified Checkpoint before the Session ends, and
  the Run close records a final verified Checkpoint. A Checkpoint records
  at least Run revision and state, repository revision and working-tree
  fingerprint, completed keyed effects, exact next action, pending
  decisions and blockers, Context Pack and lock digests, and adapter and
  session provenance. Only a verified Checkpoint may be used for resume.
  At publication the complete immutable close state is committed, so the
  Run history transfers with the repository.

two_session_validation_scenario:
  phase_0_prepare: >
    The orchestrating executor verifies all preconditions, writes
    engine-lock.json and run-binding.json, performs the read-only route
    check, and prepares the target Run: a read-only target Work reference
    for the bound effort (exact source revision and digests, per the
    migration plan's backlog-to-Work-reference transformation, with no
    status authority over any source), working set ws-mi005, the Scope
    reference binding the published Level 3 scope digest
    db7a45278e8f4a270552e3ae1db3695b70e07d1624b27bcdc28f6417883a5ad6, the
    context reference binding Context Pack version 1 by exact digest, the
    pack-lock reference, and the Run run-mi005 brought to ready with the
    contracted bounded step plan and effect classification.
  phase_1_first_session: >
    The human program owner launches genuine Claude Code Session 1 in
    Nestfolio with CONTINUITY_ACTION=start, CONTINUITY_RUN_ID=run-mi005,
    CONTINUITY_SESSION_ID=session-mi005-1,
    CONTINUITY_WORKING_SET_ID=ws-mi005. The hook records provenance,
    digest-matches and injects the start view. Session 1 executes exactly
    the delivered next actions: performs keyed effect mi005-material-effect
    once, captures the intermediate Checkpoint and has it verified,
    publishes the Handoff, deliberately interrupts the Session, and ends.
    The SessionEnd hook must record the end after the verified Checkpoint
    and published Handoff.
  phase_2_fresh_resume: >
    The human program owner separately launches genuine fresh Claude Code
    Session 2 in Nestfolio with CONTINUITY_ACTION=resume,
    CONTINUITY_RUN_ID=run-mi005, CONTINUITY_SESSION_ID=session-mi005-2 —
    a distinct Claude Code session id with startup_source startup and no
    transcript dependency. Resume freshness validation passes against the
    exact bound digests and the lease is acquired. Session 2 replays
    effect key mi005-material-effect and must observe deduplicated without
    rewrite, captures the final Checkpoint and has it verified, closes the
    Run through the engine's internal bounded closure over the contracted
    run criteria, and ends.
  phase_3_validate_and_close: >
    The orchestrating executor verifies every record, ordering proof, and
    digest; executes the mandatory failure scenarios in isolated fixtures;
    proves derived-index rebuild and audit prefix preservation; proves
    current-journal byte-identity; runs every required suite; freezes and
    verifies the final manifest; and closes MI-005 with the conjunctive
    verdict.
  truthful_closure_rule: >
    Engine-internal Run closure is Level 5 operational Run state only. It
    is not Evidence-bound Work completion, which remains MI-006 authority.
    The selected effort's backlog source, Level 3 Work artifacts, and
    Level 4 artifacts record no status change; no Work Item becomes
    completed; Level 6 guarantees are explicitly recorded as absent.

write_set_rehearsal: >
  Before any real-tree mutation, the orchestrating executor rehearses the
  complete mechanics — preparation, start, effect, checkpoint, handoff,
  interruption, resume, deduplication, final checkpoint, close, index
  rebuild — in an isolated temporary copy of Nestfolio outside all three
  repositories, driving the pinned adapter CLI directly (the rehearsal
  needs no genuine Sessions; genuine provenance is required only in the
  real execution). The rehearsal records the exact produced write-set:
  every created path and every modified path with before/after digests.
  The write-set is frozen and must satisfy nestfolio_scope exactly; a
  rehearsal write outside the permitted classes blocks the real execution
  fail-closed with ENGINE_POLICY_MISMATCH. The real execution must
  produce exactly the frozen write-set plus the contracted evidence and
  executor-provenance records; any deviation is MANIFEST_SCOPE_MISMATCH.
  The copy is removed with absence proof.

required_preconditions:
  - the session gates in session_gates pass before any Nestfolio mutation
  - every engine file and .claude/settings.json verify against the recorded engine-lock digests at the bound revision
  - the published Level 4 artifacts verify against every bound digest, record valid 18/18, and carry no stale, rejected, or revoked disposition
  - the published Level 3 artifacts verify internally and the route remains active for the bound selected effort
  - the bound selected-effort source is byte-identical to its recorded SHA-256 at the bound Nestfolio revision
  - the Level 2 lock verifies with aggregate 73bbb7c9199a79e00208115f1f7ba469be7e42e1bd20d1d72bfc726ac048df26
  - the read-only route check records no active current journal Run for the bound effort and no existing target Run, and records the current journal tree digest
  - all fixed create paths under nestfolio_scope are absent at the published start and no path under .continuity/runs/run-mi005 or continuity/level-5 exists
  - package-lock.json changes and dependency operations are not needed (pnpm-lock.yaml is byte-immutable)
  - Level 4 tests return 23/23, Level 3 tests 23/23, Level 2 tests 23/23, retained Level 1 tests 14/14, and backlog-next tests 68/68 before mutation without invoking any Skill
  - the pinned engine's own test suite (node --test runtime/continuity/test/*.test.mjs) exits 0 with zero failures before mutation
  - the write-set rehearsal completed in the isolated copy and its frozen write-set satisfies nestfolio_scope exactly

