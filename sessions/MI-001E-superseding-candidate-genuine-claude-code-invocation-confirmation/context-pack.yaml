  evidence_rule: >
    Evidence must be deterministic JSON without credentials, tokens, secrets,
    raw transcripts, full hidden prompts, unrelated repository content, or
    unsupported assertions. Bounded visible Skill results and genuine Session
    identifiers are permitted only to prove the contracted invocations.

prohibited_actions:
  - modify, repair, redesign, relock, reversion, or upgrade the 1.0.1 candidate
  - invoke any Skill other than the two exact contracted /backlog-next --auto invocations
  - execute the backlog task or any repository work selected by backlog-next
  - run continuity:invoke outside Scenario A and the single disabled-state probe in Scenario B
  - use more than two Claude Code Sessions or resume Scenario A for Scenario B
  - inspect or depend on raw Claude transcripts, hidden prompts, chat history, or provider cache
  - reconstruct, approximate, infer, extract, install, or claim recovery of the original MI-001 output
  - install packages or modify package-lock.json or another dependency lock
  - commit, push, fetch, pull, merge, rebase, reset, checkout, restore, stash, clean, or rewrite history in either repository
  - modify any Nestfolio path outside the permitted execution scope
  - create Level 2-6 state or guarantees
  - authorize MI-002 or any broader work

required_capture:
  - exact commands in execution order with UTC start and end, exit status, bounded stdout, and stderr
  - continuity-lab and Nestfolio revisions, branches, upstreams, remote refs, and start and end status
  - Claude Code binary, version, authentication readiness, two distinct Session identities, startup sources, working directories, and model when observable
  - exact 1.0.1 identity, all 19 lock entries, and independent aggregate computation
  - explicit statement that 1.0.1 is newly authored and is not recovered MI-001 output
  - exact active-boundary delegation and genuine Scenario A result
  - exact disable, disabled probe, genuine Scenario B direct result, and restoration
  - every C1-C7 result and explicit Level 2-6 absence
  - exact protected hashes, test parity, final activation, and changed-file manifests
  - temporary recovery-copy manifest, aggregate digest, restoration disposition, and deletion proof
  - repository ZIP paths, entry counts, byte sizes, integrity results, and SHA-256 identities

verdict:
  type: conjunctive-unconditional-single-result
  pass_rule: >
    Issue MI-001E UNCONDITIONAL PASS only if authorization and exact bindings
    pass; the committed 1.0.1 identity and all 19 locked assets verify; genuine
    Session A proves active Level 1 invocation and normal visible result;
    distinct fresh genuine Session B proves direct current invocation after
    disable and normal visible result; active 1.0.1 is restored byte-exactly;
    C2, C4, C5, C6, and C7 remain valid; all final changes are permitted
    deterministic evidence only; and no prohibited action occurs.
  fail_rule: >
    Any missing, failed, ambiguous, contradictory, inadmissible, skipped,
    unexecuted, out-of-scope, or provenance-misrepresented required condition
    after valid execution start requires MI-001E UNCONDITIONAL FAIL. No partial
    credit or qualified PASS is permitted. Any temporary or unexpected mutation
    must be restored to the exact start state before closure.
  no_partial_credit: true

