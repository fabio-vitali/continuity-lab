  required_before_after_proof:
    - Git revision, branch, upstream, remote ref, index, and worktree comparison
    - exact changed-file manifest
    - SHA-256 and byte-size comparison for every protected regular file
    - complete 19-asset lock and aggregate digest comparison
    - Level 1 and backlog-next test parity
    - exact active activation restoration
  regression_rule: >
    Any changed protected byte, unpermitted path, failed previously passing
    check, lost direct behavior, false guarantee, repository-work execution, or
    non-restored activation state is unconditional FAIL. Restore exact
    pre-execution bytes without destructive Git history commands before closure;
    do not fix or redesign the defect inside MI-001E.
  failure_containment_rule: >
    Before either Claude Code Session, create a byte-exact temporary recovery
    copy outside both repositories for every protected path and activation.
    If an unexpected tracked or untracked mutation occurs, issue unconditional
    FAIL, restore only the exact affected paths from that copy, verify every
    digest, and remove the temporary copy. Do not use Git checkout, restore,
    reset, clean, stash, or history rewriting.

admissible_evidence:
  required:
    - real Claude Code process or authenticated product Session output
    - two distinct observable genuine Session identities
    - machine-captured command, UTC time, exit, bounded stdout and stderr, and repository-revision records
    - structured active-boundary and direct-invocation result records
    - exact before and after manifests, hashes, lock identity, and activation proof
    - normal visible bounded Skill results with no raw transcript dependency
  insufficient_or_prohibited:
    - unit tests alone
    - mocks, simulations, or fabricated or manually rewritten transcripts
    - adapter-only, shell-only, or Node-only invocation
    - screenshots without machine-verifiable provenance
    - hidden executor state, chat, transcript, or cache as authority
    - execution of the backlog item selected by the Skill
    - a claim that the Skill would have run

criteria:
  C1: >
    PASS only when genuine Session A traverses the active exact 1.0.1 Level 1
    boundary, invokes /backlog-next --auto, and returns its normal visible result.
  C2: >
    The complete exact 19-asset lock and aggregate digest remain independently
    verified against the committed 1.0.1 candidate.
  C3: >
    PASS only when distinct fresh genuine Session B invokes /backlog-next
    --auto directly after Level 1 disable and active 1.0.1 is then restored.
  C4: No Level 2-6 state, guarantee, or canonical repository-work completion is created or claimed.
  C5: Current content, checks, backlog-next behavior, and test parity remain unchanged.
  C6: Procedure, Pack, binding, lock, activation, executor, and behavior authority remain observable and unambiguous.
  C7: Disable, restoration, and any failure containment preserve exact protected bytes and Git history without state conversion.

