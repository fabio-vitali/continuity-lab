required_executor:
  product: Claude Code
  availability: installed
  authentication: already authenticated and able to start a genuine repository session
  session_count: 2
  session_rule: >
    Use two separately started genuine Claude Code processes or product
    Sessions with distinct observable Session identifiers. Scenario B must not
    resume Scenario A or depend on its transcript, chat, hidden state, cache, or
    unexported context.
  required_provenance:
    - exact Claude Code version output
    - exact executable path and resolved binary identity
    - exact command and working directory used to start each Session
    - distinct Session identifiers and startup source or equivalent genuine-session provenance
    - model identifier when observable
    - existing authentication readiness without credentials or tokens
    - UTC Session start, invocation, visible result, Session end, disable, restoration, and closure timestamps
    - exact exit status and bounded relevant visible output for each invocation
  stop_rule: >
    If a real installed and already authenticated Claude Code executor,
    distinct genuine Session provenance, or safe bounded output capture is
    unavailable after valid execution start, issue MI-001E UNCONDITIONAL FAIL.
    Do not substitute a shell harness, Node process, test adapter, mock,
    simulation, fabricated transcript, or claim that the Skill would have run.

scope_invariants:
  - MI-001E validates the exact committed 1.0.1 candidate; it does not redesign, repair, upgrade, or reimplement it.
  - .claude/skills/backlog-next/** remains executable and instruction behavior authority.
  - the Pack manifest owns membership and declarations only.
  - the Procedure contract owns identity, declared inputs and outputs, prerequisites, permissions, stop conditions, and result shape.
  - the project binding owns only Nestfolio-specific path, repository prerequisites, and adapter mapping.
  - the Pack lock owns exact selected asset paths and digests.
  - the active Level 1 boundary and the direct-current route must invoke the same exact locked Skill with --auto.
  - Claude Code hidden state, transcript, chat, provider cache, and unexported output are never canonical authority.
  - neither invocation may execute the selected backlog task or modify repository work.
  - no Level 2-6 guarantee, state, or canonical repository-work completion may be created, implied, or claimed.

required_execution_sequence:
  - id: metadata-authorization-and-clean-start
    actions:
      - use Git metadata only to verify both exact clean pushed repository bindings before reading repository content
      - read docs/90-state/program-state.md as the first repository content
      - read this Context Pack and prompt from the exact committed authorization revision
      - confirm all canonical preconditions, blocked work, and prohibited actions
      - capture tool versions, environment, and UTC execution start
  - id: immutable-candidate-preflight
    actions:
      - capture exact clean status and protected-path hashes before evidence creation
      - create a byte-exact temporary recovery copy of protected paths outside both repositories and record its manifest and digest
      - independently verify the complete 1.0.1 identity and all 19 locked assets
      - run doctor, inspect, verify, Level 1 tests, and backlog-next tests without installing dependencies
      - prove active Level 1 guarantees and explicit Level 2-6 absence
      - stop with unconditional FAIL before invocation on any candidate mismatch or regression
  - id: scenario-a-active-level-1
    actions:
      - start genuine Claude Code Session A in the exact Nestfolio repository
      - from that Session run the existing bounded continuity:invoke path with --auto and capture its exact /backlog-next --auto delegation
      - in the same Session invoke exactly /backlog-next --auto
      - capture the normal visible bounded Skill result and genuine Session provenance
      - record that the Skill remained behavior authority and no selected repository work was executed
      - end Session A before any disable action
  - id: scenario-b-direct-current-after-disable
    actions:
      - capture a second clean/protected-path baseline excluding already-created MI-001E evidence
      - disable Level 1 using only the existing continuity:disable activation mechanism
      - prove the target boundary fails closed with LEVEL1_DISABLED and reports direct /backlog-next as the current route
      - start a separately invoked fresh genuine Claude Code Session B with no Scenario A transcript dependency
      - invoke exactly /backlog-next --auto directly
      - capture the normal visible bounded Skill result and genuine Session provenance
      - end Session B and restore active Level 1 using only continuity:activate
      - rerun doctor, inspect, verify, tests, lock verification, hashes, and exact changed-file comparison
  - id: single-result-and-closure
    actions:
      - issue exactly one MI-001E UNCONDITIONAL PASS or FAIL
      - preserve or restore the exact active 1.0.1 candidate and every protected byte before closure
      - write only contract-permitted deterministic evidence and continuity-lab closure
      - generate complete repository ZIPs outside both repositories
      - select exactly one next contract-required iteration under the conditional rule

required_genuine_scenarios:
  scenario_a:
    id: active-level-1-invocation
    exact_target_command: npm run -s continuity:invoke -- -- --auto
    exact_skill_invocation: /backlog-next --auto
    required_result:
      - ready active Level 1 boundary and exact 1.0.1 identity
      - structured delegation to /backlog-next --auto
      - genuine same-Session Skill invocation
      - normal visible bounded Skill result
      - exact invocation and Session provenance
      - no repository mutation except MI-001E evidence
  scenario_b:
    id: direct-current-invocation-after-disable
    exact_disable_command: npm run -s continuity:disable
    exact_disabled_probe: npm run -s continuity:invoke -- -- --auto
    exact_skill_invocation: /backlog-next --auto
    exact_restore_command: npm run -s continuity:activate
    required_result:
      - target invocation blocked with LEVEL1_DISABLED before Skill execution
      - genuine direct invocation in a distinct fresh Session
      - normal visible bounded Skill result
      - exact invocation and Session provenance
      - restored active 1.0.1 state and byte-exact protected content

