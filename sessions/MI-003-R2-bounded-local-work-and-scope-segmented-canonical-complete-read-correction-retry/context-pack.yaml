selection_authority:
  silent_selection: prohibited
  initial_selected_item: null
  candidate_phase: >
    The separately authorized execution may read the exact bounded backlog and
    ranking sources and deterministically produce the candidate projection and
    inclusion/exclusion rationale. It may not activate a route or write any
    selected Work artifact before a human selection is received.
  human_selection_rule: >
    The user must explicitly identify exactly one candidate by source path,
    stable source-local identity, Nestfolio source revision, and source SHA-256.
    The selection may be supplied in the initial execution instruction or in a
    later message after candidate review. The executor must verify an exact
    match to the candidate projection. Absence, multiplicity, mismatch, or an
    inferred substitute blocks selection. Human selection authorizes only the
    Level 3 representation and route; it never authorizes implementation of the
    selected backlog effort.
  target_authority_after_selection: >
    The current backlog remains authority for planning content and status.
    Target Work owns only the immutable local execution representation. No
    automatic source write-back or bidirectional synchronization exists.

required_preconditions:
  - all three exact Git bindings pass before any repository content read
  - every canonical logical-path session passes the segmented complete-read protocol in exact order
  - all permitted Nestfolio create paths are absent at the published start
  - package-lock.json is absent and no dependency operation is needed
  - MI-002 Level 2 tests return 23/23 before mutation
  - retained Level 1 tests return 14/14 before mutation
  - backlog-next tests return 68/68 before mutation without invoking the Skill
  - exact two-Pack/two-Procedure Level 2 identity and both aggregate locks verify
  - current backlog and ranking sources are readable and digestible at the exact Nestfolio revision
  - candidate derivation is deterministic and records all considered source entries
  - one explicit human selection exactly matches one eligible candidate
  - selected effort has no unresolved hard dependency, stale source, ambiguous mapping, or active current/target route conflict
  - Scope, exclusions, outputs, criteria, required evidence modes, and rollback boundary are explicit before route activation

