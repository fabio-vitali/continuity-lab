    On PASS the Nestfolio diff from the exact start revision must contain
    exactly the twenty-two added paths above, with no modified, deleted,
    renamed, staged, or additional path. Existing tracked bytes are immutable.
  path_absence_rule: >
    Any pre-existing permitted create path is a collision and blocks execution;
    it must not be overwritten, adopted, repaired, or deleted.

artifact_semantics:
  serialization: canonical JSON with recursively sorted object keys, UTF-8, two-space indentation, and one LF terminator
  candidates: >
    Rebuildable non-authoritative projection over every in-scope backlog source,
    recording source path, stable identity, source digest, source revision,
    declared status, dependency disposition, rank inputs, eligibility,
    inclusion/exclusion rationale, and derivation algorithm identity.
  work_selection: >
    Immutable record of the exact human selection, candidate digest, source
    tuple, actor statement, rationale, accepted target route, expected source
    revision, and rollback boundary.
  work: >
    Local execution representation containing objective, source reference,
    outputs, criteria, Evidence requirements, Procedure references, current
    status, and explicit absent higher-level guarantees.
  working_set: exactly one selected Work identity and revision; no Epic orchestration
  scope: >
    Versioned include paths, immutable/excluded paths, permitted effects,
    prohibited effects, non-goals, outputs, criteria, validation requirements,
    dependency facts, source revision, and digest.
  route: >
    Exact Work/source identity and revision, route target, active PX level 3,
    owning command family, no active Run store, human actor statement,
    transition time, rationale, rollback boundary, and no-conflict result. The
    route must never be inferred from file presence.
  work_brief: >
    Deterministic read-only projection of Work, Working Set, Scope, route,
    Procedure references, source authorities, criteria, absent guarantees, and
    exact digests. It is not a Context Pack and carries no execution
    authorization.

bounded_success_scenarios:
  - id: S1
    requirement: exact source inventory and deterministic candidate rebuild produce byte-identical candidates.json
  - id: S2
    requirement: every included and excluded source entry has a typed rationale and exact source identity
  - id: S3
    requirement: one explicit human selection matches exactly one eligible candidate
  - id: S4
    requirement: WorkSelection, Work, Working Set, and Scope are internally referentially and digest consistent
  - id: S5
    requirement: Scope states exact includes, exclusions, outputs, criteria, Evidence requirements, and prohibited effects
  - id: S6
    requirement: route identifies one target Level 3 local authority while current backlog remains planning authority
  - id: S7
    requirement: Work Brief rebuild is byte-identical and truthfully states absent Level 4-6 guarantees
  - id: S8
    requirement: isolated return and cancel transitions preserve source and target history and disable the target route
  - id: S9
    requirement: Level 2, retained Level 1, and backlog-next test suites remain exact
  - id: S10
    requirement: final source backlog, package, dependencies, lower levels, MI-002 evidence, Git index, and all pre-existing tracked bytes remain unchanged

mandatory_failure_scenarios:
  - id: F1
    condition: stale source revision or source digest
    diagnostic: STALE_WORK_SOURCE
  - id: F2
    condition: unresolved hard dependency or blocked dependency target
    diagnostic: HARD_DEPENDENCY_UNRESOLVED
  - id: F3
    condition: corrupt, incomplete, or non-deterministic candidate projection
    diagnostic: CANDIDATE_PROJECTION_INVALID
  - id: F4
    condition: active current route, target route, lease, or ownership conflict
    diagnostic: DUAL_ROUTE_CONFLICT
  - id: F5
    condition: missing or ambiguous source identity, status, rank input, or field mapping
    diagnostic: AMBIGUOUS_WORK_MAPPING
  - id: F6
    condition: no explicit human selection, multiple selections, or selection tuple mismatch
    diagnostic: SELECTION_AUTHORITY_MISSING
  - id: F7
    condition: Scope is empty, internally contradictory, or expands beyond the selected effort
    diagnostic: INVALID_OR_UNBOUNDED_SCOPE
  - id: F8
    condition: output, criterion, Evidence requirement, exclusion, or rollback boundary is missing
    diagnostic: INCOMPLETE_WORK_CONTRACT
  - id: F9
    condition: route is inferred from file presence or omits authority and conflict fields
    diagnostic: ROUTE_AUTHORITY_INVALID
  - id: F10
    condition: attempt to mutate backlog or any other pre-existing tracked byte
    diagnostic: SOURCE_MUTATION_PROHIBITED
  - id: F11
    condition: attempt to execute the selected effort or invoke Claude Code or any Skill
    diagnostic: WORK_EXECUTION_PROHIBITED
  - id: F12
    condition: claim or creation of Context, Run, Assurance, completion, Decision, Learning, Level 4-6, external-write, or universal-ranking authority
    diagnostic: FORBIDDEN_HIGHER_LEVEL_CLAIM

deterministic_evidence:
  rules:
    - every JSON evidence file uses the contracted canonical serialization
    - every command record contains argv, cwd role, start and end UTC, exit code, stdout SHA-256, stderr SHA-256, and parsed result
    - repository bindings include branch, HEAD, local origin/main, upstream, remote main, clean state, and observed time
    - repository binding evidence records that Program State was the first and sole logical path and remained sole until its complete proof closed
    - canonical-read evidence records every path plan, chunk range, channel completeness result, contiguous coverage proof, and final whole-path proof
    - source inventory includes every considered path and blob SHA-256 without copying unrelated source content into evidence
    - scenario evidence records expected diagnostic, observed diagnostic, exit code, fixture digest, and cleanup result
    - criterion evidence references exact source and artifact digests; narrative alone cannot pass a criterion
    - no chat transcript, hidden manual copy, timestamp-dependent candidate ordering, or unrecorded inference is admissible
    - temporary fixtures are outside all three repositories and are removed with absence proof
  required_validation:
    - node --test tests/continuity-level-3.test.mjs returns all tests passing
    - node --test tests/continuity-level-2.test.mjs returns 23/23
    - node --test tests/continuity-level-1.test.mjs returns 14/14
    - node --test .claude/skills/backlog-next/test/*.test.mjs returns 68/68
    - all S1-S10 success scenarios pass
    - all F1-F12 mandatory failure scenarios fail closed with the exact typed diagnostic
    - candidates.json and work-brief.json each rebuild byte-identically from canonical sources
    - isolated return and cancel each restore the exact source-preserving disabled-route condition
    - final Git and digest comparison proves every pre-existing tracked path equals the exact start revision
    - final Nestfolio manifest contains exactly twenty-two additions and no other status

preservation_and_rollback:
  before_write: >
    Record exact Git metadata, the complete tracked-tree identity, all critical
    lower-level and MI-002 digests, absence of every create path, and a verified
    external recovery ledger outside all repositories. Do not copy backlog
    content or secrets into the recovery ledger.
  success_rollback_proof: >
    In isolated temporary copies only, exercise return and cancel from the
    selected target representation. Each transition must preserve the original
    source tuple and all immutable target revisions, disable target routing, and
    require a new explicit selection revision before reactivation. Do not mutate
    the real backlog source or create a current-route write.
  execution_failure: >
    If any actual execution condition fails after mutation, remove only the
