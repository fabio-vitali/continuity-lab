verdict:
  type: conjunctive-unconditional-single-result
  criteria:
    - C1 exact repository bindings, segmented canonical complete-read proof, and explicit human selection authority
    - C2 deterministic complete candidate derivation with exact inclusion and exclusion rationale
    - C3 internally exact WorkSelection, Work, Working Set, Scope, criteria, and Work Brief
    - C4 every mandatory failure blocks with the exact typed diagnostic
    - C5 current backlog, all pre-existing bytes, MI-002, Level 2, Level 1, dependencies, and direct paths remain exact
    - C6 planning, local execution, route, Git, Procedure, and absent-guarantee authority is observable and unambiguous
    - C7 deterministic rebuild, source-preserving return and cancel, cleanup, and exact final manifest pass with no Level 4-6 authority
  pass_rule: >
    Issue MI-003-R2 UNCONDITIONAL PASS only if C1-C7, S1-S10, F1-F12,
    every precondition, every path and segment proof, validation, preservation,
    rollback, cleanup, and exact-manifest requirement passes conjunctively and no
    prohibited action occurs.
  fail_rule: >
    Any missing, skipped, ambiguous, stale, reordered, interleaved, truncated,
    clipped, mismatched, out-of-scope, non-deterministic, partial, or failed
    condition after valid execution start is MI-003-R2 UNCONDITIONAL FAIL. No
    qualified PASS, partial PASS, inferred selection, silent repair,
    evidence-only override, historical reinterpretation, or history rewrite is
    permitted.

next_iteration_rule:
  on_pass: >
    Preserve MI-003 and MI-003-R1 as separate historical UNCONDITIONAL FAIL
    results and record R2 separately. Preserve the selected Level 3
    representation as bounded candidate state. MI-004 remains unauthorized
    until separately contracted, reviewed, published, and explicitly executed.
  on_fail: >
    Preserve all three separate results and keep MI-004 blocked. Select only a
    newly bounded correction or explicit architecture review supported by the
    failure evidence. Do not broaden scope.

