iteration:
  id: MI-003-R2
  name: Bounded Local Work and Scope Segmented Canonical Complete-Read Correction Retry
  type: bounded-level-3-local-work-authority-complete-read-correction-retry
  px_level: 3
  status: authorized-not-started
  correction_only: true
  predecessor_results:
    - MI-003 UNCONDITIONAL FAIL
    - MI-003-R1 UNCONDITIONAL FAIL
  selected_item: null
  execution_status: not-started

objective:
  primary_question: >
    Can one coherent current Nestfolio backlog effort be selected through an
    explicit human decision and represented as exact local Work, WorkSelection,
    Working Set, Scope, criteria, route, and Work Brief artifacts, while the
    current backlog remains planning authority, target state owns only the local
    execution representation, candidate projections rebuild deterministically,
    and rollback is source-preserving and reversible?
  completion_boundary: >
    Implement and validate only the Level 3 selection and local-authority
    boundary for one explicitly selected effort. Do not perform the selected
    effort, mutate its backlog source, form or authorize a Context Pack, create
    durable Run or Assurance authority, or begin MI-004 or broader work.
  retry_boundary: >
    Retry the unchanged original MI-003 objective only. The sole correction is
    a deterministic, non-interleaved, segmented proof that every canonical
    logical path was completely consumed without allowing tool-output
    truncation to count as completion. No other MI-003-R1 or MI-003 rule,
    criterion, scenario, scope, validation, rollback, or prohibition changes.

