iteration:
  id: PX-001
  name: Product Experience
  type: product-experience-design
  design_level: L4
  gate: G4
  status: authorized-not-started

objective:
  primary_question: >
    Can the validated repository-native Continuity loop be given a viable
    product experience — onboarding, primary workflows, progressive
    disclosure, adoption levels, error and recovery UX, human decision UX,
    and context explainability — without violating the accepted TA-002
    architecture?
  required_outcome: >
    Produce conceptually testable product-experience evidence for the complete
    validated loop, issue an unconditional G4 PASS or FAIL, and authorize
    exactly one next iteration without pre-authorizing it in this contract.

product_premise:
  description: >
    Continuity is a repository-native framework for coding agents working on
    medium-to-complex repositories. Claude Code is the first and primary
    executor. Nestfolio is the first dogfooding environment.
  operational_loop: >
    select work → form context → execute through skills and agents → checkpoint
    or resume → validate → attach evidence → update work state → record learning
    → continue
  human_role: >
    Humans remain operators, reviewers, decision authorities, and
    collaborators. Human-readable inspection and handoff are useful product
    qualities, not an agentless product position.

verified_authorization_preconditions:
  - TA-002 is complete and the revised Target Architecture is accepted.
  - G3 is passed and valid.
  - VS-001 is complete and its historical FAIL is preserved.
  - VS-001A is complete with PASS.
  - G6 is passed on the combined VS-001 and VS-001A evidence.
  - PX-001 is the sole authorized next iteration.
  - the former PX-001 context pack, prompt, and handoff are superseded historical material and must not be run
  - MA-001, migration architecture, broader implementation, later vertical slices, and unrelated migration work remain blocked

