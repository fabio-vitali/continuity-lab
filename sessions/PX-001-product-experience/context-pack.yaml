contract:
  queue_position: 8
  queue_summary: "PX-001 — complete; PASS; G4 valid"
  status: authorized
  authored_on: 2026-07-14
  authority:
    - docs/90-state/program-state.md
    - sessions/VS-001A-claude-code-session-confirmation/session-handoff.md
  replaces: >
    The TA-001-derived PX-001 context pack and prompt, which remain historical
    only through Git history and must not be restored or executed.
  execution_rule: >
    This contract authorizes PX-001 only. It does not execute PX-001, decide
