included_information:
  - accepted product and architecture semantics needed to design user-visible workflows
  - validated VS-001 and VS-001A behavior, evidence, limitations, and failure cases
  - repository-native authority, revisions, digests, leases, effect keys, checkpoints, handoffs, validation, and recovery rules
  - product-level adoption risks, comparative baselines, and dogfooding requirements
  - the fact that Nestfolio is the first dogfooding environment and that project-specific behavior belongs in its Pack or binding

historical_material_policy:
  included_only_for_provenance:
    - the superseded TA-001-derived PX-001 context pack, prompt, and unused handoff as they existed before this contract
  authority: none
  rule: >
    Do not restore, copy, merge, or execute their product interpretation. Git
    history is the preservation mechanism.

deliberately_excluded_information:
  - raw or summarized prior chats
  - the Nestfolio repository or any request to upload it
  - hidden Claude Code state, transcripts, or vendor memory as canonical input
  - TA-001 as an active architecture baseline
  - migration architecture and implementation sequencing
  - implementation code, package layout, final schemas, command implementation, or another vertical slice
  - broad Nestfolio migration or unrelated Nestfolio work
  - commercial packaging, pricing, hosted governance, market-category design, or a commercial control plane
  - universal executor, issue-tracker, CI/CD, policy, incident, catalog, or platform integrations
  - agentless product positioning

required_design_scope:
  - installation and onboarding
  - useful first value within ten minutes
  - work selection and Session/Run start
  - visible Working Set, Scope, exclusions, constraints, completion criteria, and current authority
  - Context Pack formation, inspection, validation, authorization, delivery, rejection, expiration, revocation, refresh, reformation, and supersession
  - Claude Code start, interruption, checkpoint, handoff, fresh-session resume, validation, evidence attachment, completion, cancellation, and return-to-backlog
  - context explainability for included and excluded sources, authority, revisions, provenance, uncertainty, contradictions, stale inputs, omissions, and missing Evidence
  - human Decisions, judgment Evidence, deterministic checks, waivers, overrides, and explicit decision boundaries
  - failure, recovery, retry, stale-state, lease-conflict, invalid-Evidence, unavailable-provider, unknown-effect, and corrupted-derived-state experiences
  - progressive adoption from Skills-only use to the complete validated loop
  - CLI responsibilities and interaction contracts
  - an explicit Decision to require, defer, or reject a local non-authoritative Console
  - useful human-only inspection, review, transfer, and handoff workflows without repositioning the product as agentless
  - Nestfolio dogfooding UX while keeping Nestfolio-specific behavior in a project Pack or binding

questions_in_scope:
  - What is the smallest installation and repository activation path?
  - What produces useful first value within ten minutes at each adoption level?
  - Which user-visible objects and states are primary, and which remain progressively disclosed?
  - How does a user understand why work, context, a procedure, a Guard, or Evidence was selected or excluded?
  - When is context authorization explicit, policy-driven, rejected, stale, revoked, expired, refreshed, or re-formed?
  - How are material human judgments requested, recorded, deferred, rejected, waived, and resumed?
  - What must the CLI own, and what must it never conceal or make authoritative?
  - Is a local Console necessary for comprehension or recovery, merely useful later, or unjustified?
  - Which flows should be inspectable or transferable by a human without an active agent session?
  - How does progressive adoption avoid forcing the full Run model before the user receives value?
  - Which Nestfolio interactions validate the generic experience without becoming Framework Core requirements?

questions_out_of_scope:
  - changing accepted TA-002 ownership, lifecycle, dependency, persistence, or authority boundaries except through an explicit blocking contradiction
  - designing migration stages, compatibility layers, rollback architecture, or extraction order
  - selecting implementation language, frameworks, libraries, storage technologies, or final repository paths
  - implementing CLI commands, Console code, hooks, Skills, adapters, validators, stores, or schemas
  - implementing another slice or extending VS-001/VS-001A
  - designing universal integrations or multi-executor parity
  - designing a hosted service, organization control plane, RBAC, analytics, billing, or commercial packaging
  - broad redesign of Nestfolio workflows

required_scenarios:
  - id: first-install-clean-repository
    description: A developer installs or invokes Continuity in an existing medium-complexity repository and reaches a useful diagnostic or action within ten minutes.
  - id: skills-only-adoption
    description: A developer begins with one Claude Code Skill or Procedure and minimal durable state, while seeing the next optional adoption step.
  - id: select-and-start-work
    description: A developer selects one Work Item or Working Set, inspects Scope and completion criteria, forms and authorizes context, and starts Claude Code.
  - id: inspect-context-before-start
    description: A user sees included and excluded sources, revisions, authority, uncertainty, contradictions, stale inputs, and missing Evidence before authorizing or rejecting context.
  - id: reject-and-reform-context
    description: A user rejects an invalid or unsafe Context Pack, changes the relevant input or Scope, and reforms a new version without mutating the rejected version.
  - id: context-expiration-and-refresh
    description: An authorized Context Pack becomes stale, expired, revoked, or superseded and the experience explains whether refresh, reformation, or abandonment is required.
  - id: uninterrupted-claude-run
    description: Claude Code executes a bounded Run, checkpoints, validates, attaches criterion-linked Evidence, updates work state, and completes.
  - id: interrupted-fresh-session-resume
    description: A Session ends or crashes after a verified Checkpoint/Handoff and a separately started fresh Claude Code Session resumes without the old transcript.
  - id: unknown-or-retryable-effect
    description: A material effect is failed, retryable, completed, deduplicated, or outcome-unknown, and the user is prevented from unsafe automatic replay.
  - id: stale-repository-or-scope
    description: Repository drift, changed Scope, changed Work, or changed Pack assets stale the Run or Context Pack and require visible reconciliation.
  - id: lease-conflict
    description: Two Sessions attempt conflicting mutation and the second receives a clear ownership, transfer, read-only, or reconciliation path.
  - id: invalid-or-missing-evidence
    description: Evidence is missing, stale, invalid, unsupported, or mapped to the wrong criterion and completion remains blocked absent an explicit waiver.
  - id: unavailable-provider-or-validator
    description: An external reference, provider, permission, validator, or Claude capability is unavailable and the experience distinguishes retry, degraded continuation, waiver, and hard block.
  - id: corrupted-derived-state
    description: A read model or index is corrupt or missing and can be rebuilt without implying canonical state loss; ambiguous canonical corruption fails closed.
  - id: contradictory-authority
    description: Canonical sources, Decisions, Guards, or external references conflict and the user must resolve an explicit Decision rather than receive a silent winner.
  - id: human-judgment-boundary
    description: A judgment-based review, Scope expansion, Guard waiver, unsafe retry, Lesson acceptance, or governance change requires the correct human authority.
  - id: candidate-lesson-review
    description: An Observation becomes a candidate Lesson but cannot automatically change a Skill, Guard, validator, rule, Pack, or binding.
  - id: human-inspection-and-handoff
    description: A human can inspect current work, context, checkpoint, evidence, decisions, and exact next action or take over without hidden executor state.
  - id: nestfolio-dogfood
    description: The experience can be dogfooded in Nestfolio while project conventions remain visibly supplied by the Nestfolio Pack or binding.
  - id: small-team-existing-systems
    description: A small team keeps existing issue and CI authorities while Continuity owns only its repository-local agent-work representation and evidence links.
  - id: monorepo-bounded-scope
    description: A monorepo user understands path, ownership, dependency, and write-scope boundaries without loading or authorizing the entire repository.

required_methods:
  - authorization and contradiction check before design work
  - scenario-driven end-to-end journey design
  - state-transition UX mapping against accepted TA-002 lifecycles
  - cognitive walkthrough of first install and ten-minute first value
  - progressive-disclosure analysis for novice, routine, diagnostic, and expert views
  - progressive-adoption analysis from Skills-only through the complete loop
  - authority, provenance, confidence, uncertainty, contradiction, and omission communication analysis
  - human-decision and judgment-boundary mapping
  - failure-mode, recovery, retry, and safe-default matrix
  - CLI-versus-Console responsibility analysis
  - comparative baseline analysis against disciplined Claude Code Skills, repository instructions, backlog files, Git, issues, CI, and manual handoffs
  - conceptual usability and takeover tests for every required scenario
  - explicit architecture-conformance matrix linking each experience choice to TA-002 ownership and invariants
  - explicit rejection/deferment analysis for serious alternatives

constraints_and_invariants:
  - preserve the accepted TA-002 architectural boundaries unless a blocking contradiction is raised explicitly and PX-001 stops affected design instead of silently changing L3
  - repository-local canonical artifacts and the declared operational store remain the only Continuity authorities for their owned state
  - hidden executor state, chat, transcript, UI cache, Console state, or provider cache is never canonical authority
  - no second source of truth
  - Claude Code remains the first and primary executor; theoretical multi-executor parity must not displace practical value
  - Context Packs, Handoffs, Checkpoints, Evidence, Decisions, Scope, Work, and Runs retain their accepted lifecycle and immutability rules
  - authorized Context Packs are immutable; rejection, refresh, expiration, revocation, staleness, and supersession create explicit state or a new version
  - completion remains criterion-linked and Evidence-bound, with visible explicit waivers only under declared authority
  - deterministic Evidence, agent judgment, human judgment, external references, and unavailable validation remain distinguishable
  - material human judgment and governance-changing actions preserve the human decision floor
  - no automatic Lesson-to-Guard, Lesson-to-Skill, Lesson-to-validator, Lesson-to-rule, or Observation-to-authority promotion
  - Goal and Guard remain separate
  - Nestfolio-specific behavior remains in a Nestfolio Pack or binding unless repeated evidence and a Decision justify promotion
  - the CLI and any Console are non-authoritative interfaces over canonical state and application commands
  - installation and first value must not require a hosted service, enterprise migration, universal integration, or complete adoption of the Run model
  - progressive adoption must not produce incompatible state models or dead-end artifacts
  - conceptual UX may expose deferred capability but must not imply it already exists or authorize implementation

prohibited_actions:
  - execute PX-001 during contract authoring
  - create implementation code or executable assets
  - create another implementation vertical slice
  - create migration architecture or broad Nestfolio migration
  - modify Product Foundation, accepted Target Architecture, VS-001/VS-001A reports, or DR-0012 through DR-0018 unless PX-001 later raises a blocking contradiction under governance
  - create a commercial control plane or hosted-service requirement
  - require universal executor or platform integrations
  - position Continuity as an agentless product
  - treat automatic learning promotion as acceptable
  - make a CLI, Console, Claude transcript, or hidden state authoritative
  - pre-authorize MA-001 or any later iteration before the G4 result

open_questions:
  - What is the minimum supported installation and repository initialization path?
  - What is the smallest useful artifact, diagnostic, or action that proves ten-minute value under the corrected full-loop product premise?
  - Which adoption levels are distinct, reversible, and cumulative rather than separate products?
  - Which objects and warnings must always be visible before execution, and which can be progressively disclosed?
  - What authorization policy is safe by default for formed Context Packs?
  - How are context expiration, staleness, revocation, refresh, and reformation differentiated for users?
  - What takeover validation proves that a fresh human or Claude Code Session understands the correct next action?
  - How should uncertainty, missing Evidence, unavailable authority, and contradictory sources be expressed without false confidence?
  - What operations require confirmation, explicit Decision, waiver, or capability grant?
  - Is a local non-authoritative Console required for first value, required only for diagnosis/recovery, deferred, or rejected?
  - Which human-only inspection and handoff flows add real value without creating an agentless positioning requirement?
  - How can Nestfolio dogfooding reveal generic experience defects without promoting its conventions into Framework Core?

required_deliverables:
  - path: docs/40-product-experience/product-experience.md
    action: create
    purpose: Own the accepted product workflows, interaction model, progressive disclosure, adoption levels, explainability, human decisions, errors, recovery, CLI, Console disposition, and conceptual tests.
  - path: decisions/DR-*.md
    action: create-as-needed
    purpose: Record accepted or rejected high-impact product-experience choices, using the next available identifiers and explicit supersession where applicable.
  - path: docs/90-state/program-state.md
    action: update
    purpose: Record the unconditional G4 result and exactly one authorized next iteration.
  - path: docs/90-state/artifact-index.md
    action: update
    purpose: Record new and changed artifact status, ownership, and supersession.
  - path: sessions/PX-001-product-experience/context-pack.yaml
    action: update
    purpose: Preserve this executed contract and append the final result, G4 decision, changed files, and next-iteration authorization without rewriting the original requirements.
  - path: sessions/PX-001-product-experience/prompt.md
    action: preserve-or-update-non-normatively
    purpose: Preserve the exact executed instruction; only add a clearly separated completion note if governance requires it, never rewrite the historical command after execution.
  - path: sessions/PX-001-product-experience/session-handoff.md
    action: replace-superseded-placeholder
    purpose: Close PX-001 with result, evidence, decisions, changed files, unresolved contradictions, and the sole next authorized iteration.

output_contract:
  product_experience_document:
    - distinguish observations, hypotheses, proposals, accepted decisions, rejected alternatives, constraints, and open questions
    - define actors, entry points, prerequisites, visible state, commands, transitions, outputs, decision points, failure behavior, recovery, and authority for every primary workflow
    - define installation, onboarding, ten-minute first value, and progressive adoption levels with measurable conceptual success criteria
    - define the complete Claude Code loop from work selection through continuation
    - define Context Pack explainability and lifecycle in user-visible terms without changing TA-002 semantics
    - define human decision and judgment UX, including waivers and unsafe-operation boundaries
    - define a comprehensive failure/recovery matrix and the user-visible difference between retryable, blocked, stale, invalid, unavailable, conflicting, and corrupt states
    - define CLI responsibilities and explicitly decide whether a local non-authoritative Console is required, deferred, or rejected
    - define human inspection and handoff workflows where useful
    - define Nestfolio dogfooding flows and the Framework Core versus project-binding boundary
    - include a conceptual test result for every required scenario and a conformance mapping to TA-002
  decision_records:
    - create a Decision Record for every accepted or rejected high-impact experience choice that changes durable direction
    - do not use Decision Records for minor wording, screen layout, or local interaction detail
    - do not modify DR-0012 through DR-0018 unless an explicit blocking contradiction requires a higher-level revision proposal
  state_updates:
    - record PX-001 as complete only after all completion criteria are evaluated
    - record G4 as unconditional PASS or FAIL with decisive rationale
    - authorize exactly one next iteration and keep every other later iteration blocked
  session_closure:
    - list every changed file
    - preserve superseded and rejected material through Git history and explicit status, not duplicate active copies
    - demonstrate that a competent fresh agent can continue from repository artifacts without prior chat

completion_criteria:
  - installation and onboarding are concrete, bounded, and repository-native
  - at least one credible useful first-value path completes conceptually within ten minutes without hosted services, enterprise migration, or universal integration
  - work selection, Working Set, Scope, Context Pack, Run/Session, Checkpoint, Handoff, validation, Evidence, completion, and continuation workflows are coherent end to end
  - every accepted TA-002 state relevant to users has a visible meaning, entry condition, allowed action, and recovery or exit path
  - Context Pack inclusion, exclusion, authority, revisions, provenance, uncertainty, contradictions, stale inputs, omissions, and missing Evidence are explainable and actionable
  - context inspection, authorization, rejection, expiration, revocation, refresh, reformation, staleness, and supersession are differentiated without mutating authorized versions
  - fresh-session Claude Code resume is understandable without transcript dependence or hidden authority
  - deterministic checks, agent judgment, human judgment, external Evidence, failures, unavailability, and waivers are visibly distinct
  - human decision boundaries cover Scope expansion, conflicting authority, unsafe retries, waivers, governance changes, and learning promotion
  - required failure and recovery experiences are complete, fail safely, and do not create false completion or duplicate effects
  - progressive adoption begins with practical Skills-only value and reaches the validated complete loop without incompatible artifacts or forced migration
  - CLI responsibilities are explicit and non-authoritative
  - the local Console is explicitly required, deferred, or rejected with rationale and boundaries
  - useful human inspection and handoff flows are included without making agentless adoption a product requirement
  - Nestfolio dogfooding is concrete and keeps project-specific behavior outside Framework Core
  - every required scenario has a conceptual result, observed risk, and unresolved issue or acceptance conclusion
  - serious alternative experiences are accepted, deferred, or rejected explicitly
  - no accepted experience choice silently violates TA-002; any blocking contradiction is raised and handled under cross-level governance
  - docs/40-product-experience/product-experience.md and any required Decision Records are complete enough for a fresh agent to continue
  - Program State and Artifact Index are updated consistently
  - the PX-001 Context Pack records the final result and the superseded handoff placeholder is replaced
  - G4 is recorded as unconditional PASS or FAIL
  - exactly one next iteration is authorized, with no automatic assumption that it is MA-001

completion_decision:
  required: true
  gate: G4
  allowed_values:
    - PASS
    - FAIL
  conditional_or_partial_pass_allowed: false
  pass_semantics: >
    PASS only if every completion criterion is satisfied, the full validated
    operational loop has a coherent and conceptually tested experience, no
    blocking contradiction with TA-002 remains, and the experience offers a
    credible ten-minute first-value path plus safe failure and recovery UX.
  fail_semantics: >
    FAIL if any essential workflow, authority boundary, explainability need,
    recovery path, adoption path, or human-decision boundary cannot be made
    viable within accepted TA-002 constraints, or if a blocking contradiction
    remains unresolved. A FAIL must preserve usable design evidence and state
    the exact corrective question.
  decision_rule: >
    Do not convert missing work, unresolved contradictions, or important
    deferrals into a conditional PASS. Deferred non-essential implementation
    details are allowed only when ownership and user-visible semantics are
    already decided.
  next_iteration_rule: >
    After PASS or FAIL, authorize exactly one evidence-justified next
    iteration. Do not preselect or automatically authorize MA-001. The PX-001
    contract itself authorizes no work beyond PX-001.

blocked_until_px001_completion:
  - MA-001 and all migration architecture
  - broader implementation
  - later vertical slices
  - universal executor or platform integrations
  - hosted-service or commercial-control-plane work
  - broad or unrelated Nestfolio migration

result:
  decision: pending
  gate_g4: pending
  completed_on: null
  sole_authorized_next_iteration: null

final_result:
  decision: PASS
  gate_g4: passed
  completed_on: 2026-07-14
  decisive_rationale: >
    Every completion criterion is satisfied. The accepted TA-002 loop has a
    coherent end-to-end experience, a credible ten-minute Skills-first value
    path, cumulative adoption with truthful guarantee levels, explainable and
    immutable Context Pack handling, transcript-independent Claude Code
    continuity, explicit human judgment boundaries, Evidence-bound completion,
    and fail-safe recovery. No blocking TA-002 contradiction remains.
  blocking_contradictions: []
  resolved_apparent_contradictions:
    - Context Pack expiration is represented as stale with an explicit expired reason, not a new Core lifecycle state.
    - Context Pack rejection is an explicit non-authorization disposition on a candidate, not a new Core lifecycle state.
    - Context refresh and reformation always create a new version and never mutate an authorized Context Pack.
    - the local Console is deferred because CLI, Claude Code, and human-readable artifacts satisfy the required workflows without a second authority
  non_structural_implementation_questions:
    - installation and packaging mechanism
    - exact canonical serialization paths and schemas
    - final CLI spelling, JSON schema, and exit codes
    - authorization-policy and expiration configuration syntax
    - context partition rendering and checkpoint defaults
    - provider-specific recovery helpers and human identity format
    - export-bundle format and Console re-evaluation thresholds
  decisions_created:
    - decisions/DR-0019-cumulative-adoption-with-explicit-guarantee-levels.md
    - decisions/DR-0020-explicit-human-context-authorization-by-default.md
    - decisions/DR-0021-defer-local-non-authoritative-console.md
    - decisions/DR-0022-authorize-ma-001-after-g4-pass.md
  primary_deliverable: docs/40-product-experience/product-experience.md
  changed_files:
