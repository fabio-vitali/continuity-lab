    start_revision: a760d6f41ff14491d5b008a7f13234ba0221bcec
    start_role: exact published MI-004 revision at which the defect is observable
  rule: >
    Stop on any contradiction. Do not rewrite published history anywhere.
    An unpushed local correction commit that fails validation is not
    published history and must be removed during failure recovery.

authoring_time_verified_facts:
  tool_digest_binding: >
    Verified during contract authoring at the start revision: no published
    Level 4 artifact records a digest of
    continuity/level-4/bin/continuity-context.mjs. The sole reference is the
    non-digest descriptive string "deliverer" in adapter-view.json.
    checkStaleness probes exactly seven pack-recorded dependency digests
    (source tuple, level-3 work/scope/route, level-2 lock, level-1 lock,
    package.json) and neither the tool nor the suite. A bounded tool change
    therefore cannot create a stale or digest-mismatch condition; the
    execution phase must re-verify stale-check clean after the correction.
  test_only_preference_resolution: >
    A test-only change cannot restore truthful verification: S1 requires the
    rebuilt context-pack and formation-trace to be byte-identical to the
    committed artifacts, which record source_revision b9d7264082322e0…, so
    the suite must keep forming at that bound revision, while the defective
    HEAD-equality check lives in the tool. The bounded stage-2 tool change
    below is therefore required, and is permitted exactly because the tool
    is not digest-bound by any published Level 4 artifact.
  s9_pinned_map: >
    The suite's PINNED identity map covers Level 1-3 artifacts, the
    backlog-next Skill source, package.json, the backlog source, and the
    Level 1-3 suites only; it pins neither tests/continuity-level-4.test.mjs
    nor the Level 4 tool, so the correction cannot break S9.
  f1_fixture_independence: >
    The F1 fixture exercises checkStaleness digest drift and does not depend
    on the stage-2 revision check; it must keep producing
    STALE_CONTEXT_DEPENDENCY unchanged after the correction.
  pre_correction_identities:
    continuity/level-4/bin/continuity-context.mjs:
      sha256: 6bbfadd2be2708a0a1397e6e4ebf45076a57f07bf8608855d567d63a131dd841
      bytes: 40260
    tests/continuity-level-4.test.mjs:
      sha256: 117f6ac7fa44bd9ecbd88023ac21823a09fccbb18732ed0f139c68323b4180f1
      bytes: 14691

correction_design:
  pre_edit_reproduction:
    - require Nestfolio clean at a760d6f41ff14491d5b008a7f13234ba0221bcec
    - run node --test tests/continuity-level-4.test.mjs once before editing
    - require exactly 21 pass and 2 fail
    - require the two failures to be exactly S1 (STALE_CONTEXT_DEPENDENCY at
      stage 2) and F3 (observed STALE_CONTEXT_DEPENDENCY instead of
      CONTEXT_CONTRADICTION_UNRESOLVED)
    - stop on any additional, missing, or different failure
  tool_change: >
    In continuity/level-4/bin/continuity-context.mjs stage 2
    "bind-workspace-and-revision" only: replace the HEAD-equality
    requirement with a bound-revision containment requirement. The bound
    revision must resolve to an existing commit object in the repository and
    must be contained in the current HEAD's ancestry (ancestor-or-equal,
    git merge-base --is-ancestor semantics). On violation block with the
    same typed diagnostic STALE_CONTEXT_DEPENDENCY and a message naming the
    bound revision and the current HEAD. The recorded stage-2 result string
    must remain exactly "nestfolio bound at <rev>" so the rebuilt
    formation-trace stays byte-identical to the committed artifact. No other
    behavior, stage, diagnostic, schema, or export changes.
  test_change: >
    In tests/continuity-level-4.test.mjs only: derive the suite's bound
    revision from the committed published artifact instead of a duplicated
    literal — REV becomes the value of
    continuity/level-4/context-recipe.json bound_inputs.repository_revision
    read at runtime. Every S1-S10 and F1-F12 fixture keeps receiving that
    committed bound revision of record; no scenario's meaning, breadth, or
    expected diagnostic changes.
  truthfulness_property: >
    After the correction the suite verifies the published Level 4 state
    truthfully at a760d6f41ff14491d5b008a7f13234ba0221bcec and at any later
    revision whose history contains the bound revision of record, because
    formation reads committed bytes at the bound revision and stage 2
    verifies containment instead of equality with a moving HEAD. A repository
    that does not contain the bound revision still blocks fail-closed with
    STALE_CONTEXT_DEPENDENCY.
  interim_check: >
    With the two edits uncommitted, node --test
    tests/continuity-level-4.test.mjs must return exactly 22 pass and 1 fail
    with the sole failure S10 — the truthful report that two tracked paths
    are modified in the working tree. Any other failure set stops the
    correction before commit.
  commit_then_validate: >
    Commit exactly the two corrected paths in Nestfolio with the exact
    subject "Correct MI-004 Level 4 suite revision binding" (subject-only,
    no body, no trailer). Run every required validation below at the
    corrected committed revision with a clean tree. Push only after every
    required validation passes.
  failure_recovery: >
    If any required validation fails before push: retain diagnostics,
    command records, and streams at ~/continuity-recovery/mi-004-r1/,
    reset the unpublished local commit back to
    a760d6f41ff14491d5b008a7f13234ba0221bcec, verify the tree is
    byte-identical and clean at that revision, and close MI-004-R1 with
    UNCONDITIONAL FAIL in continuity-lab. Published history is never
    rewritten.

