iteration:
  id: MI-004-R1
  name: Level 4 Publication-Dependent Suite Revision-Binding Correction
  type: bounded-publication-dependent-suite-correction
  status: complete
  correction_only: true
  predecessor_results: >
    MI-004 UNCONDITIONAL PASS (immutable, recorded 23/23 at its original
    execution condition); SE-001-R1 UNCONDITIONAL FAIL (immutable, sole cause
    is the publication-dependent defect corrected here). Neither result is
    repaired, relabeled, or reinterpreted by this correction.

objective:
  primary_question: >
    Can the published Level 4 suite be made to verify truthfully at the
    published revision a760d6f41ff14491d5b008a7f13234ba0221bcec and at any
    later revision containing it, by rebinding the S1 formation check and
    every failure-scenario fixture to the committed bound revision recorded
    by the published Level 4 artifacts instead of the moving HEAD, without
    changing one byte of any published Level 4 JSON artifact, any Level 1-3
    artifact, any MI evidence, or the backlog source?
  completion_boundary: >
    Correct exactly two Nestfolio paths (the Level 4 tool stage-2 revision
    check and the Level 4 suite revision constant), validate all five suites
    at the corrected committed revision, publish exactly one Nestfolio
    correction commit, and close MI-004-R1 in continuity-lab. No
    selected-effort implementation, no SE-001-R2 contract, no MI-005.

established_defect:
  source: >
    SE-001-R1 UNCONDITIONAL FAIL evidence (canonical report and external
    diagnostics at ~/continuity-recovery/se-001-r1/). Sole, structural,
    publication-dependent.
  facts:
    - tests/continuity-level-4.test.mjs hard-codes
      REV = 'b9d7264082322e09cfd233819b79f128ef912e31' (the Level 3
      publication revision at which MI-004 executed with its delta
      uncommitted)
    - formCandidate stage 2 "bind-workspace-and-revision"
      (continuity/level-4/bin/continuity-context.mjs) requires
      git rev-parse HEAD to equal the bound revision and otherwise blocks
      with STALE_CONTEXT_DEPENDENCY
    - after the MI-004 publication commit created
      a760d6f41ff14491d5b008a7f13234ba0221bcec, HEAD can never again equal
      the pinned revision in the published tree
    - observed at the published revision: suite 21/23; S1 blocks with
      STALE_CONTEXT_DEPENDENCY; the F3 fixture observes
      STALE_CONTEXT_DEPENDENCY instead of CONTEXT_CONTRADICTION_UNRESOLVED
      (cascade of the same cause)
  bound_revision_of_record: >
    The committed bound revision recorded by the published artifacts is
    b9d7264082322e09cfd233819b79f128ef912e31, recorded canonically at
    continuity/level-4/context-recipe.json bound_inputs.repository_revision
    and as source_revision throughout context-pack.json and
    formation-trace.json. Formation already reads every source as committed
    bytes at that revision (git rev-parse <rev>:<path>); the only HEAD
    dependence is the stage-2 equality check.

