objective:
  primary_question: >
    Can the proven immutable nestfolio.level-1@1.0.1 Pack and its
    nestfolio.backlog-next@1.0.1 Procedure be composed predictably with one new
    reusable read-only repository Procedure under an exact workspace lock, with
    deterministic compatibility, permission, capability, conflict, digest,
    self-validation, comparison, activation-history, and rollback behavior,
    without introducing Work, Context, Run, Assurance, Learning, a registry
    service, or Nestfolio semantics into reusable code?
  independent_value: >
    A maintainer can inspect one composed Level 2 lock, identify the exact
    source and permissions of both Procedures, resolve each identity to one
    exact executor asset, run the reusable read-only Procedure, and return
    atomically to the proven Level 1 lock without hidden drift.

