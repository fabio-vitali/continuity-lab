    reusable_procedure_spec: continuity/level-2/packs/continuity.repository-tools/1.0.0/procedures/continuity.repository-status.json
    reusable_executor_asset: .claude/skills/continuity-repository-status/SKILL.md
    cli: continuity/level-2/cli.mjs
    implementation: continuity/level-2/src/**
    tests: tests/continuity-level-2.test.mjs
  exact_package_entry_points:
    - continuity:pack:list
    - continuity:pack:install
    - continuity:pack:resolve
    - continuity:pack:verify
    - continuity:procedure:compare
    - continuity:procedure:run
  required_logical_artifacts:
    - Level 2 activation record and guarantee card
    - immutable reusable Pack manifest and Procedure spec
    - exact executor asset for continuity.repository-status@1.0.0
    - composed workspace lock and previous-lock reference
    - compatibility, conflict, self-validation, compare, and activation-history results
    - bounded resolver, repository infrastructure, application service, and adapter mapping
  dependency_direction:
    - portable identity, digest, capability, permission, and result values have no Nestfolio dependency
    - application coordination depends on portable contracts only
    - repository infrastructure owns hashing, bounded Git observation, compare-and-swap, and atomic replacement
    - Claude Code mapping depends on the resolved lock and declared assets only
    - Nestfolio binding depends on Pack contracts and cannot modify portable semantics

required_scenarios:
  success:
    - verify the exact retained 1.0.1 baseline before any candidate change
    - self-validate each selected Pack independently and then validate the composed lock
    - resolve both exact Procedure identities repeatedly and obtain byte-identical ordered results
    - run continuity.repository-status through the resolved adapter path in the bound repository with no write or network effect
    - run the same reusable Procedure against a temporary neutral Git fixture outside both repositories and obtain the same result schema without Nestfolio configuration
    - inspect and compare the retained Level 1 lock with the proposed Level 2 lock, including permissions and resolved assets
    - activate Level 2 atomically from the exact expected predecessor digest and prove every routine target entry point uses the composed lock
    - in an isolated candidate copy, roll back byte-exactly to the retained Level 1 route and then reapply the identical Level 2 lock
    - preserve /backlog-next behavior-authority bytes and its existing direct path while proving the composed mapping resolves exactly that asset
    - display Level 2 active guarantees and Level 3-6 deliberate absences
  mandatory_failure:
    - duplicate Pack identity with divergent bytes
    - duplicate Procedure identity with divergent spec or asset
    - competing Procedure entry point or asset-path claim
    - missing manifest, Procedure spec, executor asset, or declared prerequisite
    - individual digest or byte-size drift
    - aggregate lock digest tamper
    - unenumerated or multiply sourced asset
    - unsupported executor or adoption-level compatibility
    - missing required capability
    - undeclared or widened permission
    - newly selected deprecated Pack
    - stale expected predecessor lock digest
    - interrupted or partial lock replacement
    - reusable Pack reference to any prohibited Nestfolio semantic or path
    - attempted Work, Context, Run, Assurance, Learning, completion, registry, or remote-source claim

validation_and_evidence:
  criteria:
    C1: >
      One composed lock resolves exactly the two selected immutable Pack versions
      and two Procedure identities deterministically, with one asset mapping per
      identity and no override.
    C2: >
      Every manifest, Procedure spec, executor asset, individual digest and size,
      permission, capability, compatibility field, and aggregate lock digest
      self-validates before and after activation.
    C3: >
      continuity.repository-status is read-only and contains no Nestfolio-only
      semantics; it returns the same result schema in the bound repository and a
      neutral temporary Git fixture without network or repository writes.
    C4: >
      Every mandatory conflict, digest, capability, permission, compatibility,
      deprecation, stale-CAS, partial-write, and forbidden-claim scenario fails
      closed with an unambiguous typed diagnostic.
    C5: >
      The immutable nestfolio.level-1@1.0.1 Pack, all 19 behavior assets, the
      nestfolio.backlog-next@1.0.1 contract and mapping, its tests, and direct
      current behavior remain exact and usable.
    C6: >
      Level 2 authority, Pack sources, project binding, reusable behavior,
      adapter mapping, Git authority, active and absent guarantees, and command
      route are observable and unambiguous.
    C7: >
      Atomic activation, prior-lock comparison, isolated rollback/reapply, and
      abandonment preserve exact Level 1 bytes and complete lock/activation
      history without creating Level 3-6 state.
  required_evidence:
    - exact clean pushed repository bindings and bounded inspection manifest
    - before and after retained-Level-1 identity and 19-asset verification
    - complete selected Pack, Procedure, and asset manifests with SHA-256 and byte sizes
    - independently recomputed canonical lock and aggregate digest
    - repeated deterministic resolution output for both Procedures
    - Pack self-validation and composition-validation results
    - reusable/project separation scan and neutral-fixture execution result
    - exact permission, capability, compatibility, conflict, and deprecation reports
    - every mandatory failure result from an isolated temporary fixture
    - compare-and-swap, interrupted-write, activation-history, rollback, and reapply evidence
    - Level 2 guarantee card and explicit Level 3-6 absence proof
    - exact changed-file manifests for continuity-lab and Nestfolio
    - criterion-to-evidence matrix for C1 through C7
  evidence_format: deterministic JSON plus one canonical English implementation report
  evidence_spool_rule: >
    Generate fixture and command evidence outside both repositories until final
    candidate verification and rollback recovery pass. Copy only the contracted
    deterministic MI-002 evidence into Nestfolio at closure; delete and verify
    absence of all temporary fixtures and recovery copies.

rollback_abandonment_and_recovery:
  rollback: >
    Deactivate the Level 2 routine route and restore the exact predecessor
    package entry points and Level 1 activation bytes from a verified external
    recovery copy. Preserve the proposed composed lock, comparison, failures,
    and activation attempt in reviewable evidence; never rewrite Pack versions.
  abandonment: >
    Record unconditional MI-002 FAIL, restore and verify the exact retained
    active Level 1 route, preserve all evidence, and select a bounded MI-002
    corrective contract or architecture review. Do not select MI-003.
  recovery:
    - derived validation or comparison output may be regenerated from immutable sources and exact lock material
    - stale expected predecessor digest requires a fresh proposal; it may not be forced
    - partial candidate files are preserved for diagnosis outside the active route and the prior lock remains authoritative
    - ambiguous source, lock, or authority state blocks activation and requires a later explicit human control decision
  retirement: >
    No current asset is retired by MI-002. The retained Level 1 route remains the
    rollback target, and /backlog-next behavior remains directly available.

