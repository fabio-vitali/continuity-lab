selected_level_2_composition:
  project_pack:
    identity: nestfolio.level-1@1.0.1
    class: project-pack
    procedure: nestfolio.backlog-next@1.0.1
    semantics_owner: Nestfolio project binding
  reusable_pack:
    identity: continuity.repository-tools@1.0.0
    class: reusable-engineering-pack
    procedure:
      identity: continuity.repository-status@1.0.0
      entry_point: /continuity-repository-status
      behavior_authority: .claude/skills/continuity-repository-status/**
      primary_executor_asset: .claude/skills/continuity-repository-status/SKILL.md
      canonical_spec: continuity/level-2/packs/continuity.repository-tools/1.0.0/procedures/continuity.repository-status.json
      objective: >
        Report bounded read-only Git repository identity and status facts for
        human or agent inspection without selecting Work, authorizing a Scope,
        starting a Run, validating completion, or mutating repository state.
      inputs:
        - explicit repository working directory
      reads:
        - Git repository root metadata
        - HEAD object identity
        - current branch or detached-HEAD state
        - configured upstream identity when present
        - ahead/behind counts when an upstream is locally resolvable
        - tracked, untracked, staged, and unstaged status names
      writes: []
      network: forbidden
      expected_result:
        - exact Procedure and Pack identity
        - repository root and HEAD object identity
        - branch and upstream state
        - clean or dirty classification with bounded path list
        - structured success or typed failure
      required_capabilities:
        - local-process-execution
        - git-read-metadata
      prohibited_semantics:
        - Nestfolio backlog, lane, epic, deploy, validator, routing, Guard, or Lesson rules
        - repository-content interpretation
        - Work selection or completion
        - external-system access or mutation
  composition_cardinality:
    packs: 2
    procedures: 2
    overrides: 0
    registries: 0
    remote_sources: 0
  extraction_rule: >
    The reusable Procedure is newly authored from generic Git metadata semantics;
    no Nestfolio behavior, source module, Skill text, current runtime module, or
    project rule is extracted, moved, generalized, or promoted. Therefore this
    slice does not assert cross-project evidence for any existing Nestfolio
    behavior and creates no Core-promotion claim.

level_2_guarantees:
  active_on_pass:
    - exactly two immutable Pack versions selected by one composed workspace lock
    - exactly one resolved Pack, Procedure spec, and executor-asset mapping per Procedure identity
    - deterministic exact-version resolution with no ranges or network lookup
    - exact SHA-256 digest and byte-size verification for every selected manifest, Procedure spec, and executor asset
    - Pack self-validation and composed-lock aggregate verification
    - explicit compatibility, prerequisite, capability, permission, deprecation, and conflict diagnostics
    - atomic compare-and-swap lock activation with exact activation history
    - explicit comparison and byte-exact rollback to the retained Level 1 route
    - truthful Level 2 guarantee header and explicit Level 3-6 absence
  explicitly_absent:
    level_3:
      - product-owned Work selection, Work Item, Working Set, Scope, route, completion criteria, or backlog authority
    level_4:
      - Context Pack, Formation Trace, validation, authorization, refresh, expiration, or revocation
    level_5:
      - Session, Run, effect, lease, Checkpoint, Handoff, interruption recovery, or resume
    level_6:
      - Assurance Evidence authority, validation plan, Guard, Waiver, completion transition, Decision, Observation, Lesson, or promotion
    broader:
      - remote or organization-wide Pack registry
      - signing, marketplace, trust service, dependency solver, or semantic-version range solver
      - arbitrary override language or silent last-write-wins behavior
      - external write integration, Console, hosted service, RBAC, analytics, billing, or commercial packaging

composition_and_resolution_contract:
  source_model:
    - every Pack source is a tracked local immutable version directory or the exact retained Level 1 source
    - every source locator, file path, SHA-256 digest, byte size, and declared permission is lock material
    - the workspace lock lists exact root Pack versions; no registry or implicit discovery participates
  deterministic_order:
    - normalize Pack identities by exact id then exact version
    - normalize Procedure identities and asset paths lexicographically by UTF-8 byte sequence
    - serialize lock material as canonical JSON with sorted object keys and LF termination
    - compute every file SHA-256 from bytes and one aggregate SHA-256 over canonical resolved lock material
  compatibility:
    - each Pack declares supported adoption level, executor family, required local capabilities, and permission set
    - exact compatibility is checked before lock activation and again before resolution or execution
    - absent or unrecognized compatibility fields block; no permissive default is allowed
  conflicts:
    - duplicate Pack id/version with different bytes blocks
    - duplicate Procedure id/version with different contract or asset bytes blocks
    - one Procedure identity resolving to multiple assets blocks
    - two Procedures claiming one adapter entry point or writable asset path blocks
    - undeclared asset, capability, permission, or source path blocks
    - incompatible executor, adoption level, prerequisite, or deprecation state blocks
    - no override is permitted in MI-002; every conflict must be removed by an explicit candidate change before a new lock is proposed
  deprecation:
    - deprecation and supersession metadata are inspectable lock inputs
    - a newly selected deprecated Pack blocks activation in this slice
    - an already active exact deprecated Pack may only be inspected or rolled back; it is never silently upgraded
  atomicity:
    - lock proposal binds the exact prior active-lock digest
    - activation uses compare-and-swap and one atomic workspace-file replacement
    - prior-digest mismatch or interrupted replacement leaves the prior active lock authoritative and reports a typed failure
    - activation history records before and after lock digests, actor, command, UTC, and result without creating Run or Assurance state

authority_and_coexistence:
  composed_lock: >
    On a future PASS activation, the new Level 2 workspace lock is the sole
    target authority for Pack and Procedure resolution through Level 2 command
    entry points.
  source_versions: immutable content authorities for their own declarations and assets
  project_binding: sole owner of Nestfolio paths, backlog semantics, and /backlog-next mapping
  reusable_pack: sole owner of the generic repository-status Procedure contract and asset
  adapter: maps each resolved Procedure to its declared executor asset; it cannot change resolution or lifecycle semantics
  legacy_level_1_route: >
    Retained only as an explicit rollback target. While Level 2 activation is
    active, routine Continuity package entry points must route through the Level
    2 resolver. Direct /backlog-next remains current behavior outside target
    Pack resolution and is not a second target lock authority.
  external_authority: Git remains authoritative for repository objects and status facts

implementation_shape:
  rule: >
    Exact serialization details may be finalized during an authorized MI-002
    implementation, but the identities, semantics, algorithms, authority,
    failure rules, and path boundary in this contract may not change.
  new_level_2_root: continuity/level-2/**
  exact_repository_paths:
    activation: continuity/level-2/activation.json
    guarantee_card: continuity/level-2/README.md
    composed_lock: continuity/level-2/packs.lock.json
    activation_history: continuity/level-2/activation-history.ndjson
