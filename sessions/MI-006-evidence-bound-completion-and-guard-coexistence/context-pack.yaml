    - .continuity/** pre-existing files, including the tracked VS-001/VS-001A/MI-005 records
    - continuity/evidence/mi-002/** through continuity/evidence/mi-005/**, se-001/**, vs001a/** and every other evidence tree
    - the dashboard-bff service source and tests referenced by the deterministic validators (read-only; never modified)
    - tests/continuity-level-1.test.mjs through tests/continuity-level-5.test.mjs
  create_fixed_paths_on_pass:
