objective:
  primary_question: >
    Can the one target-routed Work effort be Evidence-bound completed — moved
    to a trusted target completed state through the pinned engine — only when
    every declared completion criterion has accepted typed Evidence or an
    explicit authorized Waiver, with a criterion-to-Evidence matrix spanning
    at least a deterministic mode and at least one non-deterministic mode
    (agent review and human review), while the current Nestfolio checks
    (dashboard-bff unit and integration suites, commit and ship gates, audit
    tooling) and external systems (Git) remain the sole authorities for their
    own underlying results; a current check becomes a target Guard only
    through explicit owner, applicability, evaluation mode, required Evidence,
    severity, exception policy, and lifecycle classification, never automatic
    conversion; completion is blocked fail-closed on any stale, failed,
    missing, invalid, unsupported, or unavailable Evidence, on any
    out-of-Scope effect, on any unresolved Decision, and on any failing
    blocking Guard; a distinct authorized Waiver path exists and is separate
    from a pass, is scoped and evidence-linked, and reopens the block on
    expiry; and it is proven that neither a commit nor a model narrative
    alone can complete the Work — while no Decision authority, Observation,
    Lesson, Change Proposal, learning promotion, or other MI-007 or Level 6
    Decision-and-Learning state is created or claimed?
  completion_boundary: >
    Implement and validate only the Level 6 Assurance portion — Evidence-bound
    completion and Guard coexistence — for the one already selected, already
    implemented, already Level-5-run effort, through the pinned engine
    unmodified. Do not re-implement or mutate the effort's implementation, its
    Level 1-5 artifacts, or any other backlog source. The sole permitted
    canonical planning mutation is the engine's atomic completion write-back
    of this one effort's backlog tracking fields. Do not create, claim, or
    record any Observation, Lesson, Change Proposal, Decision, learning
    promotion, Guard minting from an agent suggestion, universal registry,
    remote source, Console, or Level 6 Decision-and-Learning state (MI-007).
    Do not modify the pinned engine, hooks, or any Skill. Do not read, write,
    convert, import, re-key, or retire any current journal Run beyond the
    contracted read-only route check and byte-identity proof. Do not reopen,
    reuse, or complete run-mi005. Do not begin MI-007 or broader work.

engine_binding:
  rule: >
    The store engine is the pinned read-only implementation at
    runtime/continuity/** (lib including workflow.mjs and store.mjs,
    adapters/claude-code including cli.mjs and the SessionStart/SessionEnd
    hooks, tools, tests) together with the hook registration in
    .claude/settings.json, exactly as pinned and verified by MI-005. The
    engine already implements the complete Evidence-bound completion loop —
    validation-plan formation from Work Item criteria, typed validators,
    immutable validation-result and evidence artifacts, the completion gate
    (COMPLETION_GATE_BLOCKED on any non-passed criterion or missing linked
    Evidence), lease-gated atomic completion, and the backlog completion
    write-back. MI-006 uses this machinery unmodified: it introduces no engine
    code and changes no engine byte. Before any mutation the executor records
    the exact SHA-256 of every engine file and of .claude/settings.json into
    continuity/level-6/engine-lock.json and verifies them against the bound
    revision; a mismatch blocks fail-closed with ENGINE_ASSET_MISMATCH. If the
    pinned engine cannot satisfy a contracted Assurance policy without
    violating this contract's write boundary, execution blocks fail-closed
    with ENGINE_POLICY_MISMATCH and MI-006 closes UNCONDITIONAL FAIL without
    repair or engine modification.
  level_6_binding_artifact: >
    continuity/level-6/completion-binding.json declares, in canonical JSON:
    the target Work Item identity and store paths; the bound effort, Context
    Pack, Level 2 lock, Level 3 scope, and repository revision digests; the
    criterion-to-Evidence-mode matrix; the validator-versus-Guard
    classification with each Guard's full metadata; the Waiver policy; the
    coexistence route record for the referenced current checks and external
    gates; the atomic-completion policy; and the explicit statement that no
    MI-007 Decision-and-Learning state (Observation, Lesson, Change Proposal,
    learning promotion) is created. tests/continuity-level-6.test.mjs
    validates this binding deterministically against the repository and the
    produced target artifacts.

session_gates:
  rule: >
    Per DR-0024, before execution starts: continuity-workspace,
    continuity-lab, and Nestfolio are on main with clean working trees;
    continuity-lab HEAD is the exact published revision containing this
    contract (same-session execution uses the revision just pushed;
    later-session execution uses the revision named by prompt.md);
    Nestfolio HEAD is eafa09b81a600bd58fe8f4639298a182039d21f5, the published
    MI-005 Level 5 evidence revision (subject "Publish MI-005 resumable run
    cutover Level 5 evidence"). Every published Level 1-5 artifact, every
    VS-001/VS-001A/MI-005 record, and every recorded historical result is a
    read-only input except the single permitted backlog completion write-back.
    A wrong branch, dirty tree, or missing contract stops the session before
    any Nestfolio mutation. No multi-way alignment gates, remote-ref checks, or
    byte-level authoring manifests apply.

executor_identity:
  session_executor: >
    The MI-006 execution session is conducted directly by Claude Code
    operating under authorization_rule. It orchestrates preparation, Work
    Item and Guard authoring, Assurance Plan formation, validation, Evidence
    production, completion, failure scenarios, evidence, and closure with its
    own tools, driving the pinned adapter CLI and the pinned engine directly.
  sub_agent_rule: >
    Per DR-0024 the orchestrating executor may use its own sub-agents and
    tools for mechanical work at its discretion. Delegating contracted work
    to the product's executor procedures — any Skill, /backlog-next,
    continuity:invoke — remains prohibited and is a mandatory failure (F10).
    Running node for tests, validation, the pinned engine's CLI, and the
    published continuity tooling's own checks is direct work, not delegation.
  no_separate_genuine_session_rule: >
    MI-006 does NOT require a separately launched human-provenanced Claude
    Code validation Session (the resume-genuineness claim was intrinsic to
    MI-005 only). The completion gate's rigor comes from the engine, which
    requires every criterion to be status passed with a linked immutable
    Evidence artifact of the declared type; a narrative that does not produce
    the required typed Evidence cannot flip a criterion to passed. The
    orchestrating executor produces the deterministic Evidence directly (real
    suite runs) and the agent-review Evidence as its own typed artifact
    recorded with the executor's provenance; the human-review Evidence is an
    explicit program-owner authorization record with machine-captured UTC
    (MI-004 authorization precedent). Agent-review and human-review Evidence
    remain distinct typed modes and are never collapsed into the deterministic
    mode or into one opaque score (DR-0017).

assurance_plan:
  formation_rule: >
    MI-006 authors the effort's target Work Item binding
    (continuity/bindings/nestfolio/work-items/) carrying the three unchanged
    Level 3 criteria, and forms the Assurance Plan (validation plan) through
    the pinned engine from that Work Item. Each criterion is mapped to exactly
    one typed validator and one required Evidence mode. The completion policy
    is the engine's all-required-criteria-pass-with-evidence. The plan binds
    the exact effort source revision and digest, the Level 3 scope digest, the
    Level 4 Context Pack version 1 digest, and the Level 2 lock aggregate.
  criterion_to_evidence_matrix:
    - criterion: 1
      statement: investigation determines expected-versus-actual recent-activity behavior for L2 AWAITING_CONFIRMATION decisions
      validation_mode: agent-review plus human-review
      evidence: >
        A typed agent-review Evidence artifact recording the executor's
        investigation finding (expected behavior, actual behavior, and whether
        a real gap exists), plus a typed human-review Evidence artifact: the
        program owner's explicit authorization accepting the investigation
        finding. Neither a commit message nor an unrecorded narrative
        satisfies this criterion.
    - criterion: 2
      statement: if a real gap is confirmed, the signal is sourced from the DecisionPacket AWAITING_CONFIRMATION status via the existing row CDC, never from the removed dead event
      validation_mode: deterministic plus agent-review
      evidence: >
        A deterministic command Evidence artifact from the dashboard-bff
        integration suite asserting the awaiting-confirmation projection is
        sourced from the DecisionPacket status CDC path, plus a typed
        agent-review Evidence artifact confirming the sourcing is the existing
        CDC row path and not the removed dead event. If the investigation
        finds no real gap, this criterion is satisfied by the recorded
        no-gap finding and the deterministic proof that no dead-event source
        was introduced.
    - criterion: 3
      statement: dashboard-bff unit and integration suites remain green and the removed USER_CONFIRMATION_REQUESTED handler is not reintroduced
      validation_mode: deterministic
      evidence: >
        A deterministic command Evidence artifact from the green dashboard-bff
        unit and integration suites, plus a deterministic file/absence
        Evidence artifact proving the removed USER_CONFIRMATION_REQUESTED
        handler is absent. This criterion's absence condition is additionally
        the subject of the classified target Guard defined under
        guard_classification.
  external_evidence_reference: >
    The Git published-implementation revision (363283bc) and the current
    commit/ship gate results are referenced once, read-only, as an
    external-authority provenance record (locator, digest, freshness) inside
    the coexistence route record. MI-006 declares no second Git or CI verdict,
    duplicates no external object, and never treats an unavailable external
    result as a pass.
  mode_distinctness_rule: >
    Deterministic, agent-review, and human-review Evidence are recorded as
    distinct typed modes with separate provenance and authority and are never
    merged into one score (DR-0017). The completion matrix must cover at least
    the deterministic mode and at least one of agent-review or human-review;
    this contract requires all three across the three criteria.

guard_classification:
  rule: >
    MI-006 classifies the relevant current checks explicitly. The dashboard-bff
    unit and integration suites are classified as validators / project rules
    (deterministic Evidence sources referenced by the Assurance Plan); they
    keep their own authority and are NOT automatically Guards. The current Git
    commit and ship gates remain the underlying authorities for their own
    results and are referenced once with exact provenance; they are not
    converted into Guards. To prove the target Guard classification mechanism,
    MI-006 classifies exactly one concrete condition as a target Guard with
    full metadata following the existing guard-binding schema
    (schema_version, id, version, status, condition, rationale, applicability,
    evaluation_mode, severity, owner, exception_policy) and stores it under
    continuity/bindings/nestfolio/guards/. No current check is automatically
    minted into a Guard; any attempt to convert a check to a Guard without
    this explicit classification is a mandatory failure (F-AUTO-GUARD).
  classified_guard:
    id: nestfolio-dashboard-bff-no-dead-user-confirmation-requested-handler
    condition: >
      The dashboard-bff service does not reintroduce the removed dead
      USER_CONFIRMATION_REQUESTED event handler; the awaiting-confirmation
      signal, if surfaced, is sourced only from the DecisionPacket
      AWAITING_CONFIRMATION status via the existing row CDC.
    rationale: >
      This is a condition that must REMAIN true over time (a Guard per
      DR-0005), distinct from the completion criteria that must BECOME true.
      Reintroducing the dead event is a regression the effort's whole point
      was to prevent.
    applicability: Work Item dashboard-bff-awaiting-confirmation-activity-gap and the dashboard-bff service
    evaluation_mode: deterministic
    severity: blocking
    owner: fabio.vitali (human program owner)
    exception_policy: >
      No automatic exception. A temporary exception requires an explicit
      authorized, scoped, evidence-linked Waiver; expiry reopens the block.
  goal_versus_guard_note: >
    The three completion criteria are Goal-shaped (conditions to make true for
    this Work Item). The classified Guard is Guard-shaped (a condition to keep
    true). DR-0005 forbids collapsing them into one entity or lifecycle; MI-006
    keeps completion criteria and the Guard as separate objects with separate
    authority.

waiver_path:
  rule: >
    MI-006 demonstrates the distinct authorized Waiver path WITHOUT waiving any
    real effort criterion (all three real criteria must be satisfied by
    accepted Evidence for the genuine completion). The Waiver mechanism is
    exercised in an isolated temporary fixture outside all three repositories,
    on a synthetic criterion, proving that a Waiver: is explicit and authorized
    by a declared human authority; is scoped and time-bounded; is
    evidence-linked; is recorded as DISTINCT from a pass (never rendered as
    passing Evidence); and, on expiry, reopens the blocked criterion. A Waiver
    is never created automatically (auto-waiver is a mandatory failure).

completion_execution:
  scope: >
    On PASS, MI-006 performs the first real Evidence-bound Work completion of
    the program through the pinned engine in the real Nestfolio working tree
    (human program owner authorization Q1: complete the effort for real). The
    completion is atomic: the engine's completeRun transitions the target Work
    Item to completed, the working set to completed, records the final verified
    Checkpoint, links every accepted Evidence artifact, and writes back the one
    backlog item's tracking fields (status shipped, closed date, validation
    gate referencing run-mi006 and the final Checkpoint). This is the sole
    permitted mutation of a canonical planning source.
  preconditions_for_completion: >
    Completion runs only after: every criterion is status passed with a linked
    immutable Evidence artifact of the declared type; the classified Guard
    evaluates true; no effect is out of the Level 3 Scope; no Decision is
    unresolved; the active mutating lease is held by the completing session;
    and the backlog item's current bytes equal the Work Item's declared
    source.sha256 (a mismatch blocks fail-closed as STALE). Any unmet
    precondition blocks with the engine's COMPLETION_GATE_BLOCKED (or the
    exact typed diagnostic) and MI-006 does not force completion.
  backlog_writeback_truthfulness: >
    The backlog write-back is truthful: the effort's implementation genuinely
    shipped at Nestfolio 363283bc and its evidence is published. The write-back
    updates only the tracking fields the engine writes; it does not rewrite the
    planning narrative, re-rank, or synchronize any other backlog item, and it
    is fully reversible during execution (the whole delta stays uncommitted and
    the pre-write backlog bytes are recorded for byte-exact rollback).

target_run:
  rule: >
    MI-006 creates one new bounded Level 6 target Run run-mi006 in the DR-0014
    target operational store, bound to the effort's target Work Item, working
    set ws-mi006, the Level 3 Scope digest, the Level 4 Context Pack version 1
    digest, the Level 2 lock aggregate, and the bound repository revision and
    working-tree fingerprint. run-mi006 is a distinct Run with a new identity;
    run-mi005 is closed and is never reopened, reused, converted, or completed.
    The dual-run route check proves no active current-journal Run and no other
    active target Run exists for the effort before Run creation
    (DUAL_RUN_ROUTE_CONFLICT otherwise). run-mi006's contracted work is exactly
    the Assurance and completion of the effort; it performs no effort
    re-implementation and no material side effect beyond the contracted
    Assurance, Evidence, and completion records.
  lease_and_audit: >
    Completion requires the single-writer lease (LEASE_REQUIRED otherwise); the
    lease is released at completion. The audit ledger is append-only: the
    recorded pre-execution bytes remain the exact prefix of the final file. The
    derived index is a rebuildable non-authoritative projection.

write_set_rehearsal: >
  Before any real-tree mutation, the orchestrating executor rehearses the
  complete mechanics — Work Item and Guard authoring, Run creation, Assurance
  Plan formation, validation, Evidence production, the classified-Guard
  evaluation, the completion including the backlog write-back, index rebuild,
  and rollback — in an isolated temporary copy of Nestfolio outside all three
  repositories, driving the pinned adapter CLI and engine directly. The
  rehearsal records the exact produced write-set: every created path and every
  modified path with before/after digests, including the backlog write-back
  path. The write-set is frozen and must satisfy nestfolio_scope exactly; a
  rehearsal write outside the permitted classes blocks the real execution
  fail-closed with ENGINE_POLICY_MISMATCH. The real execution must produce
  exactly the frozen write-set plus the contracted evidence records; any
  deviation is MANIFEST_SCOPE_MISMATCH. The copy is removed with absence proof.

