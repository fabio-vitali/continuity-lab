    - continuity/evidence/mi-006/01-engine-lock-and-route.json
    - continuity/evidence/mi-006/02-work-item-and-assurance-plan.json
    - continuity/evidence/mi-006/03-criterion-evidence-and-modes.json
    - continuity/evidence/mi-006/04-guard-classification-and-coexistence.json
    - continuity/evidence/mi-006/05-completion-and-atomicity.json
    - continuity/evidence/mi-006/06-mandatory-failures.json
    - continuity/evidence/mi-006/07-waiver-path.json
    - continuity/evidence/mi-006/08-preservation-and-rollback.json
    - continuity/evidence/mi-006/09-criterion-matrix-and-verdict.json
    - continuity/evidence/mi-006/commands/01-level6-tests.json
    - continuity/evidence/mi-006/commands/02-engine-tests.json
    - continuity/evidence/mi-006/commands/03-level5-tests.json
    - continuity/evidence/mi-006/commands/04-level4-tests.json
    - continuity/evidence/mi-006/commands/05-level3-tests.json
    - continuity/evidence/mi-006/commands/06-level2-tests.json
    - continuity/evidence/mi-006/commands/07-level1-tests.json
    - continuity/evidence/mi-006/commands/08-backlog-next-tests.json
