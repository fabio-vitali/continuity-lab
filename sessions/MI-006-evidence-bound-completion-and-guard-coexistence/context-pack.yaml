  - the session gates in session_gates pass before any Nestfolio mutation
  - every engine file and .claude/settings.json verify against the recorded engine-lock digests at the bound revision (ENGINE_ASSET_MISMATCH otherwise)
  - the published Level 4 artifacts verify against every bound digest, record valid 18/18, and carry no stale, rejected, or revoked disposition
  - the published Level 3 artifacts verify internally and the route remains active for the bound selected effort
  - the bound selected-effort backlog source is byte-identical to its recorded SHA-256 at the bound Nestfolio revision and equals the Work Item's declared source.sha256
  - the Level 2 lock verifies with aggregate 73bbb7c9199a79e00208115f1f7ba469be7e42e1bd20d1d72bfc726ac048df26
  - the published Level 5 run-binding and engine-lock verify and run-mi005 is closed (no active target Run for the effort)
  - the read-only route check records no active current journal Run for the bound effort and no other active target Run, and records the current journal tree digest
  - all fixed create paths under nestfolio_scope are absent at the published start and no path under .continuity/runs/run-mi006, continuity/level-6, the effort Work Item binding, or the classified Guard binding exists
  - package-lock.json changes and dependency operations are not needed (pnpm-lock.yaml is byte-immutable)
  - before mutation, without invoking any Skill: Level 5 tests 7/7, engine suite 9/9 (exit 0), Level 4 23/23, Level 3 23/23, Level 2 23/23, retained Level 1 14/14, and backlog-next 68/68
  - the dashboard-bff unit and integration suites run green at the bound revision and are recorded as deterministic Evidence sources
  - the write-set rehearsal completed in the isolated copy and its frozen write-set satisfies nestfolio_scope exactly

