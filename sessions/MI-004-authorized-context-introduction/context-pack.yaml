artifact_semantics:
  serialization: canonical JSON with recursively sorted object keys, UTF-8, two-space indentation, and one LF terminator
  context_recipe: >
    Explicit declaration of the formation inputs: bound Work, WorkSelection,
    Working Set, Scope, route, and Level 2 lock identities and digests, the
    declared read-only source scope, exclusion policy, delivery boundary, and
    formation algorithm identity.
  formation_trace: >
    Immutable per-stage record of the DR-0011 pipeline: every considered
    source with locator, owner, revision, digest, freshness, inclusion or
    exclusion reason, selected slice boundary, diagnosed gaps, contradictions,
    omissions, and unresolved questions, plus the exact resulting candidate
    digest.
  context_pack: >
    Immutable digest-identified execution input contract binding exact Work,
    WorkSelection, Working Set, Scope, route, repository, Pack lock, and
    source revisions and digests; the complete source and exclusion ledger;
    recorded gaps, contradictions, and uncertainty; the objective and exact
    execution instruction boundary; and the explicit statement that Level 5-6
    guarantees are absent. It carries no execution authorization by itself.
  validation_result: >
    Recorded structural, Scope, lock, capability, contradiction, and
    completeness validation of the exact candidate digest, with per-rule
    results; validation cannot pass by narrative.
  authorization_record: >
    Immutable record of the exact human authorization: actor statement,
    authorized Context Pack identity, version, and digest, authorization time,
    permitted scope of use, and rollback boundary. Rejection dispositions are
    recorded with the same identification rigor.
  adapter_view: >
    Deterministic digest-linked delivery projection of the authorized Context
    Pack: exactly what the executor would receive, the omitted
    inspect-only material with reasons, and delivery provenance. It is derived
    state, rebuildable byte-identically, and carries no authority of its own.

bounded_success_scenarios:
  - id: S1
    requirement: the DR-0011 formation pipeline runs with recorded per-stage results and formation-trace and context-pack artifacts rebuild byte-identically across three derivations
  - id: S2
    requirement: every considered source has a typed inclusion or exclusion entry with owner, authority, exact revision, and SHA-256
  - id: S3
    requirement: validation covers structural, Scope, lock, capability, contradiction, and completeness rules with recorded per-rule results on the exact candidate digest
  - id: S4
    requirement: exactly one explicit human authorization matches the one validated Context Pack version and digest and produces an immutable authorization record
  - id: S5
    requirement: an explicit rejection disposition preserves the candidate non-authorized with rationale, proven in an isolated temporary copy
  - id: S6
    requirement: revocation of an authorized version disables delivery and returns the effort to Level 3, preserving all versions, proven in an isolated temporary copy
  - id: S7
    requirement: the adapter view rebuilds byte-identically, digest-matches the authorized Context Pack, and truthfully states absent Level 5-6 guarantees
  - id: S8
    requirement: a changed source digest marks the pack stale with the exact changed dependency and blocks delivery, proven in an isolated temporary copy
  - id: S9
    requirement: Level 3, Level 2, retained Level 1, and backlog-next test suites remain exact
  - id: S10
    requirement: final backlog source, Level 3 artifacts, package, dependencies, lower levels, MI-002 and MI-003 evidence, Git index, and all pre-existing tracked bytes remain unchanged

mandatory_failure_scenarios:
  - id: F1
    condition: stale bound Work, Scope, route, lock, or source revision or digest
    diagnostic: STALE_CONTEXT_DEPENDENCY
  - id: F2
    condition: required source missing, unreadable, or unresolvable
    diagnostic: CONTEXT_SOURCE_UNAVAILABLE
  - id: F3
    condition: contradictory sources without a recorded resolution
    diagnostic: CONTEXT_CONTRADICTION_UNRESOLVED
  - id: F4
    condition: corrupt or digest-mismatched formation input artifact
    diagnostic: CONTEXT_INPUT_CORRUPT
  - id: F5
    condition: required material exceeds the declared bounded delivery and cannot be safely delivered
    diagnostic: CONTEXT_DELIVERY_UNBOUNDED
  - id: F6
    condition: no explicit human authorization, multiple or mismatched authorization tuples, or any attempted automatic authorization
    diagnostic: CONTEXT_AUTHORIZATION_MISSING
  - id: F7
    condition: attempt to deliver a draft, formed, validated-but-unauthorized, stale, rejected, or revoked version
    diagnostic: UNAUTHORIZED_CONTEXT_DELIVERY
  - id: F8
    condition: adapter view digest does not match the authorized Context Pack
    diagnostic: CONTEXT_DELIVERY_MISMATCH
  - id: F9
    condition: attempt to edit an authorized Context Pack version in place
    diagnostic: CONTEXT_IMMUTABILITY_VIOLATION
  - id: F10
    condition: attempt to mutate the backlog source, any Level 3 artifact, or any other pre-existing tracked byte
    diagnostic: SOURCE_MUTATION_PROHIBITED
  - id: F11
    condition: attempt to execute the selected effort or invoke Claude Code or any Skill
    diagnostic: WORK_EXECUTION_PROHIBITED
  - id: F12
    condition: claim or creation of Session, Run, Checkpoint, Handoff, effect, Assurance, completion, Decision, Learning, or Level 5-6 authority
    diagnostic: FORBIDDEN_HIGHER_LEVEL_CLAIM

deterministic_evidence:
  rules:
    - every JSON evidence file uses the contracted canonical serialization
    - every command record contains argv, cwd role, start and end UTC, exit code, stdout SHA-256, stderr SHA-256, and parsed result
    - repository bindings include branch, HEAD, local origin/main, upstream, remote main, clean state, and observed time
    - repository binding evidence records that Program State was the first and sole logical path and remained sole until its complete proof closed
    - canonical-read evidence records every path plan, chunk range, channel completeness result, contiguous coverage proof, and final whole-path proof
    - the formation trace includes every considered source and blob SHA-256 without copying unrelated source content into evidence
    - scenario evidence records expected diagnostic, observed diagnostic, exit code, fixture digest, and cleanup result
    - authorization evidence records the exact human statement, authorized digest, and match verification
    - criterion evidence references exact source and artifact digests; narrative alone cannot pass a criterion
    - no chat transcript, hidden manual copy, timestamp-dependent artifact ordering, or unrecorded inference is admissible
    - temporary fixtures are outside all three repositories and are removed with absence proof
  required_validation:
    - node --test tests/continuity-level-4.test.mjs returns all tests passing
    - node --test tests/continuity-level-3.test.mjs returns 23/23
    - node --test tests/continuity-level-2.test.mjs returns 23/23
    - node --test tests/continuity-level-1.test.mjs returns 14/14
    - node --test .claude/skills/backlog-next/test/*.test.mjs returns 68/68
    - all S1-S10 success scenarios pass
    - all F1-F12 mandatory failure scenarios fail closed with the exact typed diagnostic
    - context-pack.json, formation-trace.json, and adapter-view.json each rebuild byte-identically from canonical sources
    - isolated rejection, revocation, and staleness fixtures each restore the exact source-preserving Level 3 condition
    - final Git and digest comparison proves every pre-existing tracked path equals the exact start revision
    - final Nestfolio manifest contains exactly twenty-two additions and no other status

preservation_and_rollback:
  before_write: >
    Record exact Git metadata, the complete tracked-tree identity, all
    critical Level 1-3 and MI-002/MI-003 digests, absence of every create
    path, and a verified external recovery ledger outside all repositories.
    Do not copy backlog content or secrets into the recovery ledger.
  success_rollback_proof: >
    In isolated temporary copies only, exercise rejection, revocation, and
    staleness transitions from the authorized Level 4 representation. Each
    transition must preserve the original source tuple, every Level 3
    artifact, and all immutable Context Pack versions, disable Level 4
    delivery, and return the effort to Level 3 without any false context
    guarantee. Do not mutate the real Level 3 artifacts or backlog source.
  execution_failure: >
    If any actual execution condition fails after mutation, remove only the
