context_formation_authority:
  formation_pipeline: >
    Context formation must follow the explicit DR-0011 pipeline with recorded
    per-stage results: frame objective and output contract; bind workspace and
    revision; load the exact Level 2 Pack lock; discover candidate sources
    within the declared read-only scope; resolve authority, revision,
    freshness, and access limitations; select bounded source slices with
    recorded rationale; record explicit exclusions; diagnose contradictions,
    staleness, omissions, and pending decisions; assemble an immutable
    candidate Context Pack and Formation Trace; validate; apply the explicit
    authorization policy; export without changing canonical state.
  authorization_default: >
    Per DR-0020 the sole authorization path in MI-004 is explicit human review
    and authorization of the exact validated Context Pack version and digest.
    No deterministic auto-authorization policy exists, may be created, may be
    accepted, or may be exercised during MI-004.
  human_authorization_rule: >
    After formation and validation, the executor must present the validated
    Context Pack identity, version, whole-artifact SHA-256 digest, source and
    exclusion ledger summary, and recorded gaps, and stop. The user must then
    explicitly authorize exactly one validated Context Pack version by its
    identity, version, and exact SHA-256 digest in a later message. Absence,
    multiplicity, mismatch, or an inferred substitute blocks authorization.
    Human authorization authorizes only the Level 4 context authority and
    digest-matched delivery view; it never authorizes implementation of the
    selected backlog effort, any Run, or any Level 5-6 state.
  rejection_revocation_staleness: >
    Rejection is an explicit non-authorization disposition that preserves the
    candidate and its rationale. Revocation applies after authorization,
    disables delivery, and returns the effort to Level 3. Expiration and
    dependency change are exposed as stale with explicit reasons. Authorized
    Context Pack versions are never edited in place; refresh and reformation
    create new versions.
  target_authority: >
    The current backlog remains planning authority; the Level 3 artifacts
    remain the local execution representation; the authorized Context Pack
    version and Formation Trace become target authority only for target
    execution input. No current prompt, chat summary, or generated preview
    becomes canonical context.

