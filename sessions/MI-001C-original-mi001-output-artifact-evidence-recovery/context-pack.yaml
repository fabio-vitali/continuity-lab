    - /Users/fabiovitali/WebstormProjects/nestfolio
  permitted_git_surfaces:
    - relevant commit and tag history reachable from refs
    - relevant reflogs and stash refs
    - relevant index entries
    - relevant reachable and unreachable object-database objects
  traversal_rules:
    - enumerate only the two permitted filesystem roots, without crossing a filesystem boundary
    - do not follow symbolic links, aliases, Finder aliases, mount redirects, or archive members outside those roots
    - inspect only regular files and metadata already present before execution
    - use Git read-only plumbing with GIT_OPTIONAL_LOCKS=0; never materialize an object into either worktree
    - reject archive absolute paths, parent traversal, duplicate normalized paths, case-colliding paths, unsafe links, encrypted members, and malformed structure
  expressly_prohibited_sources:
    - /Users/fabiovitali/Downloads
    - every other home-directory location
    - browser data, histories, caches, profiles, and download databases
    - cloud storage, email, chat, remote services, and network search
    - every project outside the three authorized workspace roots
    - unrelated history, objects, content, or paths in either Git repository
  network_rule: >
    Do not fetch, pull, clone, browse, query remotes, or use any network service.
    Existing local origin/main refs may be read but not refreshed.

read_only_operation:
  immutable_evidence_rule: >
    Candidate discovery, classification, provenance analysis, archive
    inspection, input/output comparison, and SKILL.md verification are strictly
    read-only. Do not create temporary extraction files, update access-control
    metadata, rename, copy, move, recompress, normalize, repair, quarantine, or
    delete any evidence source. Do not modify either Git index, worktree, refs,
    reflogs, stashes, or object database.
  git_forbidden_mutations:
    - git add, commit, push, pull, fetch, merge, rebase, reset, checkout, switch, restore, stash, clean, gc, repack, prune, update-ref, replace, notes, or worktree mutation
    - git fsck --lost-found or any command that writes recovered objects
  archive_forbidden_mutations:
    - extraction to disk
    - archive repair, recompression, comment editing, member editing, or metadata rewriting
  skill_rule: >
    Stream the candidate member directly from the archive to hashing and byte
    counting commands. Never extract it to disk, install it, compare it by
    editing, or write its contents to stdout, logs, evidence files, or a
    repository.
  closure_boundary: >
    Only after the read-only operation has converged on its one unconditional
    result may the executor write the contract-permitted continuity-lab closure
    documents and generate the continuity-lab repository ZIP outside both
    repositories. These closure writes do not alter any searched evidence
    source and must not be used retroactively as provenance.

candidate_identity_and_provenance:
  required_classifications:
    original_output_proven: >
      The exact archive bytes returned by the original MI-001 execution, with a
      complete delivery chain supported by evidence that pre-existed MI-001C.
    byte_identical_preserved_copy_proven: >
      Archive bytes whose SHA-256 is identical to the independently proven
      original output and whose copy or retention edge is supported by
      pre-existing evidence from the bounded sources.
    recreated_or_derived: >
      Any later Git archive, repository ZIP, recompression, reassembly,
      reconstruction, edited copy, normalized archive, or independently
      generated archive, even when its extracted file bytes and manifest happen
      to match the expected values.
    ambiguous_or_unproven: >
      Any candidate supported only by filename, location, timestamp,
      recollection, expected content, matching SKILL.md hash, self-authored ZIP
      comment, newly generated evidence, or an incomplete or circular chain.
    non_candidate: >
      Any file whose format, repository role, or content is incompatible with
      the original modified Nestfolio output.
  delivery_chain_rule: >
    PASS requires an ordered chain from the recorded MI-001 execution output
    event to the candidate's current bytes. Every node must record path or Git
    object identity, archive SHA-256, byte size, relevant timestamps and
    metadata; every edge must cite independent pre-existing evidence from the
    bounded sources. Content conformity proves identity constraints but cannot
    prove delivery. The MI-001B continuity-lab source archive and every archive
    produced after MI-001 solely from Git or expected content are explicitly
    recreated or non-candidate, never original-output proof.
  ambiguity_rule: >
    Multiple admissible candidates are acceptable only when they have the same
    archive SHA-256 and converge on one proven original-output chain. Conflicting
    archive hashes, incompatible chains, missing edges, or circular evidence
    require unconditional FAIL.

deterministic_automation:
  discovery_order:
    - enumerate permitted filesystem roots in bytewise lexical path order
    - enumerate continuity-lab relevant refs, reflogs, stashes, index entries, then object database
    - enumerate Nestfolio relevant refs, reflogs, stashes, index entries, then object database
  candidate_order: >
    Deduplicate by archive SHA-256 and evaluate candidates in ascending SHA-256,
    then bytewise lexical evidence-location order. Never ask the user to select
    or interpret a candidate during execution.
  required_ledger_fields:
    - evidence location or Git object id
    - discovery surface
    - format and byte size
    - SHA-256
    - available timestamps, extended attributes, ZIP comment, and delivery metadata
    - archive integrity and safe-structure result
    - original-versus-recreated classification with cited evidence
    - canonical input binding result
    - exact 15-entry delta result
    - streamed SKILL.md SHA-256 and byte-size result when safely available
    - final admissibility disposition
  no_early_success_rule: >
    Inventory and classify every discovered candidate before selecting an
    admissible artifact. A content match cannot short-circuit provenance review.

required_execution_sequence:
  - id: authorization-and-clean-start
    actions:
      - read docs/90-state/program-state.md first and apply the contradiction rule
      - verify and record all three repository revisions, branches, upstream state, and cleanliness
      - prove the committed MI-001C contract is present at continuity-lab HEAD and origin/main
      - confirm every blocked-work statement before candidate discovery
  - id: canonical-binding-verification
    actions:
      - prove the canonical MI-001 source revision and input archive SHA-256 and comment agree across canonical records
      - prove the source commit and tree exist in the Nestfolio object database
      - locate and directly verify the bound input archive within the permitted evidence sources
      - if direct input-archive verification is impossible or contradictory, record the failed binding, complete the bounded read-only inventory and classifications, and converge on FAIL
  - id: deterministic-candidate-discovery
    actions:
      - inventory only the permitted filesystem roots without following links
      - inspect only relevant read-only Git refs, reflogs, stashes, index entries, and object-database objects
      - identify archive candidates by content signature and format, not filename alone
      - compute immutable identity and metadata without copying or extracting
  - id: classify-provenance-and-delivery
    actions:
      - distinguish the original MI-001 output from every recreated or derived archive
      - build and validate the complete delivery chain for each potentially admissible candidate
      - reject content-only, circular, self-asserted, ambiguous, reconstructed, or post-hoc provenance
  - id: verify-candidate-content
    actions:
      - test archive integrity and safe normalized structure without extraction
      - compare candidate output directly with the verified canonical input archive
      - require the exact 15-entry changed-file manifest and statuses
      - stream .claude/skills/backlog-next/SKILL.md without installing or writing it
      - require SHA-256 9ff3b13cc3f422c6845c8e49a7662ea51f5f12713f4a610f967463973391fa90 and exactly 33928 bytes
  - id: single-result-and-closure
    actions:
      - complete the candidate ledger and issue exactly one unconditional PASS or FAIL
      - write only the contract-permitted continuity-lab closure after the result
      - generate only the required complete continuity-lab closure ZIP under continuity-workspace/output/MI-001C
      - select exactly one next iteration under the conditional next-iteration rule

required_capture:
  - exact commands in execution order
  - UTC start and end timestamps for each command
  - exit status, stdout, and stderr
  - Git, ZIP, hashing, operating-system, shell, Node, and npm versions used
  - repository revisions, branches, upstreams, and clean-status records
  - deterministic inventory and candidate ledger
  - input archive identity and source-tree binding evidence
  - original delivery chain and original-versus-recreated classification
  - exact computed 15-entry changed-file manifest
  - streamed SKILL.md SHA-256 and exact byte count
  - proof that all searched evidence and both repositories remained unchanged

verdict:
  type: conjunctive-unconditional-single-result
  pass_rule: >
    Issue MI-001C UNCONDITIONAL PASS only if authorization is valid; the
    canonical MI-001 source revision and exact input archive are directly
    verified; one original output archive or byte-identical preserved copy has
    a complete, non-circular, pre-existing delivery chain; the archive is safe
    and intact; direct input/output comparison yields exactly the required 15
    entries and statuses; streamed SKILL.md is SHA-256
    9ff3b13cc3f422c6845c8e49a7662ea51f5f12713f4a610f967463973391fa90
    and 33928 bytes; all candidates have been classified; and no evidence source,
    Git state, worktree content, or Skill was modified or installed.
  fail_rule: >
    Missing direct input-archive verification; no candidate; unproven,
    ambiguous, circular, reconstructed, or contradictory delivery provenance;
    recreated-only candidates; unsafe or corrupt archive structure; source,
    comment, manifest, status, digest, or byte-size mismatch; incomplete search;
    manual intervention; extraction or installation; any prohibited inspection
    or mutation; or any inconclusive required check requires MI-001C
    UNCONDITIONAL FAIL.
  emission_rule: >
    After valid authorization starts the operation, every outcome must converge
    on exactly one unconditional MI-001C result. Candidate-level dispositions
    are evidence checks, not additional verdicts. No partial, provisional,
    qualified, or per-candidate overall verdict is permitted.
  no_partial_credit: true

