source_id: nestfolio-runtime
type: git-repository
repository: https://github.com/fabio-vitali/nestfolio
role: current-implementation-and-evidence
canonical_for:
  - current runtime source code
  - current tests
  - project-specific runtime bindings
not_canonical_for:
  - future product thesis
  - future target architecture
  - product-development process
reviewed_revision: TO_BE_SET_BEFORE_RI-001
revision_command: git -C /path/to/nestfolio rev-parse HEAD
notes:
  - Record the exact reviewed revision before RI-001.
  - Do not copy the runtime into continuity-lab.
  - Do not use an unrecorded moving branch as architectural evidence.
